    range_low:
      value: "5.0"
      unit:
        id: UO:0000017
        name: micrometer
    range_high:
      value: "8.0"
      unit:
        id: UO:0000017
        name: micrometer
    measured_entity:
      id: GO:0005929
      name: Cilium
    measurement_method: Acetylated alpha-tubulin immunostaining with confocal microscopy
    measurement_date: "2024-03-15"

