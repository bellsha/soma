    observation_type: ciliary_active_area_percentage
    quantity_measured:
      value: "78.5"
      unit:
        id: UO:0000187
        name: percent
    range_low:
      value: "60.0"
      unit:
        id: UO:0000187
        name: percent
    range_high:
      value: "90.0"
