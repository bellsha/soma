# In vitro airway epithelial cell measurements
# Demonstrates measurements from primary human bronchial epithelial cells (HBECs)
# cultured at air-liquid interface (ALI), commonly used in asthma/toxicology research
# Uses OntologyReference pattern with id + name for readability

# ============ Phenotype Measurements (Ciliary, ASL, MCC, Goblet Cell) ============
phenotype_measurements:
  # Ciliary Function
  - id: owg:cilia-001-control
    name: CBF - Control ALI culture Day 21
    description: Ciliary beat frequency in untreated control ALI culture
    observation_type: ciliary_beat_frequency
    quantity_measured:
      value: "12.8"
      unit:
        id: UO:0000106
        name: hertz
    range_low:
      value: "9.0"
      unit:
        id: UO:0000106
        name: hertz
    range_high:
      value: "15.0"
      unit:
        id: UO:0000106
        name: hertz
    measured_entity:
      id: GO:0005929
      name: Cilium
    measurement_method: High-speed video microscopy (200 fps)
    measurement_date: "2024-03-15"

  - id: owg:cilia-001-pm25-exposed
    name: CBF - PM2.5 exposed ALI culture Day 21
    description: Ciliary beat frequency after 24h PM2.5 exposure (50 ug/mL)
    observation_type: ciliary_beat_frequency
    quantity_measured:
      value: "8.2"
      unit:
        id: UO:0000106
        name: hertz
    range_low:
      value: "9.0"
      unit:
        id: UO:0000106
        name: hertz
    range_high:
      value: "15.0"
