# =============================================================================
# Montgomery et al. (2020) - Genome-Wide Analysis Reveals Mucociliary
# Remodeling of the Nasal Airway Epithelium Induced by Urban PM2.5
# =============================================================================
#
# Source: Am J Respir Cell Mol Biol. 2020;63(2):172-184
# DOI: 10.1165/rcmb.2019-0454OC
# PMCID: PMC7397762
#
# Study Design:
#   - In vitro: Primary human nasal airway epithelial cells (AECs) at ALI
#   - Donors: GALA II childhood asthma study (healthy + asthmatic)
#   - Exposure: PM2.5 organic extract (OE) from California urban sites
#   - Doses: Low (0.045 ug/cm2), Moderate (0.45 ug/cm2), High (4.5 ug/cm2)
#   - Acute protocol: 2 stimulations 24h apart, harvest 24h after second
#   - Chronic protocol: 5 stimulations over 5 days
#
# Key findings from paper:
#   - Moderate OE: 424 DEGs (281 up, 143 down), CYP1A1 LFC=6.21
#   - AhR signaling activation, IL-1 inflammatory program
#   - MUC5AC upregulation (LFC=0.90), mucus secretory cell enrichment
#   - High OE: 1296 DEGs, ciliary gene downregulation
#   - Chronic OE: MUC5AC+ cells FC=2.88, FOXJ1+ nuclei 75% decrease
#   - SPDEF protein 1.5-fold increase, mucin secretion remodeling
#
# =============================================================================

# =============================================================================
# PROTOCOLS
# =============================================================================

protocols:
  - id: "PROTOCOL:montgomery-rnaseq-001"
    name: "Whole transcriptome RNA-seq protocol"
    equipment_required:
      - "Illumina NovaSeq 6000"
      - "KAPA mRNA HyperPrep kit (Roche)"

  - id: "PROTOCOL:montgomery-qpcr-001"
    name: "qRT-PCR validation protocol"
    equipment_required:
      - "Real-time PCR system"

  - id: "PROTOCOL:montgomery-wb-001"
    name: "Western blot for SPDEF protein"
    equipment_required:
      - "SDS-PAGE apparatus"
      - "Densitometry imaging system"

  - id: "PROTOCOL:montgomery-if-001"
    name: "Immunofluorescence for MUC5AC/MUC5B/FOXJ1"
    equipment_required:
      - "Confocal microscope"
      - "Anti-MUC5AC antibody"
      - "Anti-MUC5B antibody"
      - "Anti-FOXJ1 antibody"
      - "Anti-acetylated alpha-tubulin antibody"
      - "DAPI"

  - id: "PROTOCOL:montgomery-elisa-001"
    name: "Colorimetric ELISA for mucin secretion"
    equipment_required:
      - "Plate reader (490 nm)"
      - "Anti-MUC5AC ELISA"
      - "Anti-MUC5B ELISA"

  - id: "PROTOCOL:montgomery-abpas-001"
    name: "Alcian blue-PAS staining for mucins"
    equipment_required:
      - "Histological staining reagents (AB-PAS)"
      - "Light microscope"

