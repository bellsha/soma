      id: "OX:001-output"
      name: "OX:001 measurement results"
      reactive_oxygen_species:
        value: "2.5"
        unit:
          id: "UO:0000193"
          name: "fold change"
      lipid_peroxidation:
        value: "1.8"
        unit:
          id: "UO:0000193"
          name: "fold change"
      malondialdehyde_level:
        value: "3.2"
        unit:
          id: "UO:0000063"
          name: "nanomole per milligram protein"
      protein_carbonyl_content:
        value: "2.1"
        unit:
          id: "UO:0000063"
          name: "nanomole per milligram protein"
      glutathione_ratio:
        value: "0.65"
        unit:
          id: "UO:0000190"
          name: "ratio"
      eight_ohdg_level:
        value: "12.5"
        unit:
          id: "UO:0000275"
          name: "nanogram per milligram creatinine"
      superoxide_dismutase_activity:
        value: "0.75"
        unit:
          id: "UO:0000193"
          name: "fold change"
      catalase_activity:
        value: "0.82"
        unit:
          id: "UO:0000193"
          name: "fold change"
