# Comprehensive example: Air Pollution and Asthma Exacerbation Study
# This file demonstrates the full data model with studies, cohorts, participants,
# and various measurement types including exposures, biomarkers, and phenotypes

# ============ Study Definition ============
studies:
  - id: owg:study-APEX-2024
    name: Air Pollution and Exacerbation Study (APEX)
    description: >-
      A prospective cohort study examining the relationship between ambient
      air pollution exposure and asthma exacerbations in urban adults,
      with mechanistic investigation of oxidative stress and airway inflammation.
    study_type: Cohort
    population: Adults aged 18-65 with physician-diagnosed asthma
    enrollment_period: "2024-01-01 to 2024-12-31"
    geographic_location: Los Angeles, CA, USA
    data_source: Other
    principal_investigator: Dr. Jane Smith

# ============ Cohort Definition ============
cohorts:
  - id: owg:cohort-APEX-main
    name: APEX Main Cohort
    description: Primary study cohort of adult asthma patients
    part_of_study: owg:study-APEX-2024
    cohort_size: 150
    inclusion_criteria: >-
      Adults 18-65 years; physician-diagnosed asthma;
      FEV1 >= 60% predicted; non-smoker for >= 1 year;
      residence in study area for >= 1 year

# ============ Participants ============
participants:
  - id: owg:participant-APEX-001
    name: APEX-001
    description: Study participant with moderate persistent asthma
    part_of_cohort: owg:cohort-APEX-main
    participant_id: APEX-001
    age: 34
    sex: Female
    species: Homo sapiens

  - id: owg:participant-APEX-002
    name: APEX-002
    description: Study participant with mild intermittent asthma
    part_of_cohort: owg:cohort-APEX-main
    participant_id: APEX-002
    age: 28
    sex: Male
    species: Homo sapiens

  - id: owg:participant-APEX-003
    name: APEX-003
    description: Study participant with severe persistent asthma
    part_of_cohort: owg:cohort-APEX-main
    participant_id: APEX-003
    age: 52
    sex: Female
    species: Homo sapiens

# ============ Exposure Measurements ============
exposure_measurements:
  # Participant APEX-001
  - id: owg:exp-APEX-001-pm25-baseline
    name: PM2.5 exposure - APEX-001 Baseline
    description: 7-day average PM2.5 personal exposure at baseline
    observation_type: PM2_5Exposure
    quantity_measured:
      value: 22.4
      unit: UO:0000301
      unit_label: "ug/m3"
    measured_entity:
      id: ENVO:01000415
      name: PM2.5
    participant: owg:participant-APEX-001
    measurement_method: Personal exposure monitor (RTI MicroPEM)
    measurement_date: "2024-03-01"
    sample_type: Air

  - id: owg:exp-APEX-001-ozone-baseline
    name: Ozone exposure - APEX-001 Baseline
    description: 8-hour max ozone at residential address
    observation_type: OzoneExposure
    quantity_measured:
      value: 0.072
      unit: UO:0000170
      unit_label: "ppm"
    measured_entity:
      id: CHEBI:25812
      name: Ozone
    participant: owg:participant-APEX-001
    measurement_method: EPA AQS monitor data (nearest monitor)
    measurement_date: "2024-03-01"
    sample_type: Air

  # Participant APEX-002
  - id: owg:exp-APEX-002-pm25-baseline
    name: PM2.5 exposure - APEX-002 Baseline
