    observation_type: LipidPeroxidation
    quantity_measured:
      value: 185.0
      unit: UO:0000274
      unit_label: "pg/mg creatinine"
    range_low:
      value: 50.0
      unit: UO:0000274
      unit_label: "pg/mg creatinine"
    range_high:
      value: 150.0
      unit: UO:0000274
      unit_label: "pg/mg creatinine"
