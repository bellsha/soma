# =============================================================================
# Liu et al. (2024) - PM2.5 Exposure Inhibits Transepithelial Anion
# Short-circuit Current by Downregulating P2Y2 Receptor/CFTR Pathway
# =============================================================================
#
# Source: Int J Med Sci. 2024;21(10):1929-1944
# DOI: 10.7150/ijms.96777
#
# Study Design:
#   - In vitro: Calu-3 human airway epithelial cells, submerged monolayer
#     on transwell plates (Corning 3801)
#   - In vivo: Male Balb/c mice (6-8 weeks), OVA-induced asthma model
#   - PM2.5 source: Guangzhou, China (July-November 2019)
#   - In vitro exposure: PM2.5 100 ug/mL in serum-free DMEM/F12
#   - Treatment groups: Control, ATP (10 uM), PM2.5, ATP+PM2.5, Suramin (100 uM)
#   - In vivo: OVA sensitization (days 1,7,14) + challenge (days 21-27)
#     with PM2.5 (100 ug/mL), ATP (50 mg/kg), or Suramin (50 mg/kg) via nasal instillation
#
# Key findings:
#   - PM2.5 downregulates P2Y2R and CFTR protein expression (p<0.05)
#   - PM2.5 inhibits ATP-induced short-circuit current (Isc)
#   - PM2.5 reduces ASL volume
#   - PM2.5 decreases cytoplasmic calcium mobilization
#   - In vivo: PM2.5+OVA increases airway hyperresponsiveness (sRaw)
#   - In vivo: PM2.5+OVA increases Th2 cytokines (IL-4, IL-5, IL-13)
#   - In vivo: PM2.5+OVA increases goblet cell hyperplasia (PAS staining)
#   - In vivo: PM2.5+OVA decreases P2Y2R and CFTR in lung tissue (IHC, WB)
#
# =============================================================================

# =============================================================================
# PROTOCOLS
# =============================================================================

protocols:
  - id: "PROTOCOL:liu-ussing-001"
    name: "Ussing chamber short-circuit current protocol"
    description: "Ussing chamber electrophysiology (Kingtech, Beijing). K-H solutions with mannitol (luminal) and glucose (basal). Equilibrated at 37C, 95% O2/5% CO2. Electrode validation: current >60 uA required."
    equipment_required:
      - "Ussing chamber (Kingtech, Beijing)"
      - "Electrophysiology detection equipment"
      - "K-H solution A (NaCl 120mM, NaHCO3 25mM, KH2PO4 3.3mM, K2HPO4 0.128mM, MgCl2 1.2mM, CaCl2 1.2mM, mannitol 10mM)"
      - "K-H solution B (glucose 10mM replacing mannitol)"

  - id: "PROTOCOL:liu-wb-001"
    name: "Western blot for P2Y2R and CFTR"
    description: "RIPA lysis, BCA quantification, 10% SDS-PAGE (40ug/lane), PVDF transfer, 5% skim milk block 1.5h. Primary: P2Y2R (Abcam ab272891, 1:1000), CFTR (CST 78335S, 1:1000). Secondary: anti-rabbit IgG HRP (CST 7074S, 1:2500). ChemiScope imaging."
    equipment_required:
      - "SDS-PAGE apparatus"
      - "PVDF membrane (Millipore)"
      - "ChemiScope imaging (Clinx, Shanghai)"

  - id: "PROTOCOL:liu-qpcr-001"
    name: "qRT-PCR for P2Y2R"
    description: "TRIzol RNA extraction, Takara cDNA synthesis. P2Y2R-F: 5'-CCTGAGAGGAGAAGCGCAG-3', P2Y2R-R: 5'-GAACTCTGCGGGAAACAGGA-3'. GAPDH-F: 5'-AGATCCCTCCAAAATCAAGTGG-3', GAPDH-R: 5'-GGCAGAGATGATGACCCTTTT-3'."
    equipment_required:
      - "Real-time PCR system"
      - "TRIzol reagent (Sigma)"
      - "Reverse transcription kit (Takara)"

  - id: "PROTOCOL:liu-flowcyt-001"
    name: "Fluo-3/AM calcium measurement by flow cytometry"
    description: "Trypsin digestion (no EDTA), Fluo-3/AM probe (Beyotime) 0.5uL, 37C 30min, FITC channel. Ex 488nm, Em 525nm."
    equipment_required:
      - "BD Accuri C6 Plus flow cytometer"
      - "Fluo-3/AM fluorescent probe (Beyotime)"
      - "FlowJo v10.0"

  - id: "PROTOCOL:liu-ihc-001"
    name: "Immunohistochemistry for P2Y2R and CFTR"
    description: "4% PFA fixation 24h, paraffin 5um sections. P2Y2R (1:500, Abcam), CFTR (1:1000, Abclone). Mouse anti-rabbit IgG + SP complex (ZSGB-BIO), 37C 40min. DAB 0.05% visualization."
    equipment_required:
      - "Microtome"
      - "DAB substrate (ZSGB-BIO, Beijing)"

  - id: "PROTOCOL:liu-pas-001"
    name: "PAS staining for goblet cells"
    description: "Standard PAS staining on 5um paraffin sections. Quantification by percentage of PAS-positive cells."
    equipment_required:
      - "PAS staining reagents (Sigma)"
      - "Light microscope"

  - id: "PROTOCOL:liu-elisa-001"
    name: "ELISA for Th2 cytokines in BALF"
    description: "Mouse ELISA kits (Absin, Shanghai) for IL-4, IL-5, IL-13. Per manufacturer instructions."
    equipment_required:
      - "ELISA plate reader"
      - "Mouse IL-4 ELISA kit (Absin)"
      - "Mouse IL-5 ELISA kit (Absin)"
      - "Mouse IL-13 ELISA kit (Absin)"

  - id: "PROTOCOL:liu-lungfx-001"
    name: "Whole-body plethysmography with methacholine challenge"
    description: "BUXCO whole-body chamber (DSI, Minnesota). Methacholine aerosol at 0, 5, 10, 20 mg/mL. sRaw (cmH2O/mL/s) measured. FLexi Vent software analysis."
    equipment_required:
      - "BUXCO whole-body plethysmograph (DSI, Minnesota)"
      - "Methacholine nebulizer"

