      unit:
        id: UO:0000274
        name: picogram per milliliter
    range_low:
      value: "100.0"
      unit:
        id: UO:0000274
        name: picogram per milliliter
    range_high:
      value: "1500.0"
      unit:
        id: UO:0000274
        name: picogram per milliliter
