# Container-paper-extension-demo.yaml
# Demonstrates new schema classes from the S&T Framework paper extension:
# - Protocol, Assay, Observation
# - Evidence, KEREvidence
# - OutcomeContribution, ContributingElement
# - Enhanced KeyEventRelationship with structured evidence

protocols:
  - id: owg:protocol-teer-measurement
    name: TEER Measurement Protocol v2.1
    description: >-
      Transepithelial electrical resistance measurement protocol for
      air-liquid interface cultures.
    protocol_type: assay_execution
    protocol_version: "2.1"
    sop_reference: "SOP-TEER-001"
    methodology: >-
      Transepithelial electrical resistance measured using EVOM2 with STX2
      electrodes. Cultures equilibrated to room temperature for 30 minutes
      before measurement. Three readings per insert, median reported.
    validation_status: validated
    last_updated: "2024-01-15"

  - id: owg:protocol-cbf-imaging
    name: Ciliary Beat Frequency Imaging Protocol
    description: >-
      High-speed video microscopy protocol for measuring ciliary beat frequency.
    protocol_type: imaging
    protocol_version: "1.3"
    sop_reference: "SOP-CBF-002"
    methodology: >-
      High-speed video microscopy at 200 fps using 40x objective.
      Temperature maintained at 37C. Videos analyzed using automated
      CBF detection algorithm.
    validation_status: validated

assays:
  - id: owg:assay-teer-ali
    name: ALI Culture TEER Assay
    description: >-
      Transepithelial electrical resistance assay for air-liquid interface
      epithelial cultures.
    assay_type: electrophysiology_assay
    assay_protocol:
      id: owg:protocol-teer-measurement
      name: TEER Measurement Protocol v2.1
    assay_instrumentation:
      - EVOM2 Voltohmmeter
      - STX2 Chopstick Electrodes
    target_entity:
      id: GO:0016020
      name: membrane
    measurement_outputs:
      - TEER
    detection_method: electrical_resistance
    throughput: medium

  - id: owg:assay-cbf-video
    name: Ciliary Beat Frequency Video Assay
    description: >-
      High-speed video microscopy assay for measuring ciliary beat frequency.
    assay_type: imaging_assay
    assay_protocol:
      id: owg:protocol-cbf-imaging
      name: Ciliary Beat Frequency Imaging Protocol
    assay_instrumentation:
      - High-speed camera (200+ fps)
      - Inverted microscope with 40x objective
      - Environmental chamber (37C)
    target_entity:
      id: GO:0005929
      name: cilium
    measurement_outputs:
      - ciliary_beat_frequency
      - ciliary_active_area_percentage
    detection_method: video_microscopy

