evidence_collection:
  - id: owg:evidence-oxidative-barrier-001
    name: In vitro evidence for oxidative stress-barrier dysfunction relationship
    description: >-
      Compiled evidence from in vitro ALI studies demonstrating the
      relationship between oxidative stress and epithelial barrier dysfunction.
    evidence_type: experimental
    evidence_strength: strong
    confidence_level: high
    source_references:
      - "PMID:12345678"
      - "PMID:23456789"
      - "PMID:34567890"
    biological_plausibility: >-
      Oxidative stress damages tight junction proteins (ZO-1, occludin) and
      disrupts epithelial barrier function through well-characterized
      mechanisms involving ROS-mediated protein modification.
    empirical_support: >-
      Multiple studies in primary HBEC ALI cultures demonstrate dose-dependent
      reduction in TEER following oxidative stress exposure. Effect is
      reproducible across different oxidative stressors (H2O2, ozone, PM2.5).
    uncertainties:
      - Time course of recovery varies between cell donors
      - Species differences in barrier sensitivity not fully characterized
    quantitative_understanding: >-
      Dose-response relationships established for H2O2 and ozone exposures.
      IC50 for TEER reduction approximately 100 uM H2O2 in ALI cultures.

  - id: owg:evidence-cilia-mcc-001
    name: Evidence for ciliary dysfunction reducing mucociliary clearance
    description: >-
      Evidence linking impaired ciliary function to decreased mucociliary
      clearance from both in vitro and clinical studies.
    evidence_type: mechanistic
    evidence_strength: strong
    confidence_level: high
    source_references:
      - "PMID:45678901"
      - "PMID:56789012"
    biological_plausibility: >-
      Ciliary beating provides the mechanical force for mucus transport.
      Reduced beat frequency or coordination directly impairs clearance.
    empirical_support: >-
      Strong correlation between CBF and particle clearance rates in ALI
      models. Clinical studies confirm reduced CBF in patients with impaired
      mucociliary clearance.
    quantitative_understanding: >-
      Mathematical models predict clearance rates based on CBF and mucus
      properties with good accuracy.

adverse_outcomes:
  - id: owg:ao-decreased-lung-function
    name: Decreased Lung Function
    description: >-
      Complex, composite adverse outcome representing impairment of
      respiratory function. Encompasses multiple dimensions including
      airway obstruction, impaired gas exchange, and reduced lung compliance.
    outcome_level: organ

  - id: owg:ao-asthma-exacerbation
    name: Asthma Exacerbation
    description: >-
      Acute worsening of asthma symptoms including increased inflammation,
      airway hyperresponsiveness, and mucus hypersecretion.
    outcome_level: organ

outcome_contributions:
  - id: owg:oc-barrier-to-lung-function
    name: Epithelial barrier dysfunction contributes to decreased lung function
    description: >-
      Contribution of epithelial barrier dysfunction to the complex outcome
      of decreased lung function.
    outcome:
      id: owg:ao-decreased-lung-function
      name: Decreased Lung Function
    contributing_element:
      id: owg:ce-barrier-dysfunction
      name: Epithelial Barrier Dysfunction
      element_type: key_event
      mechanistic_role: >-
        Barrier dysfunction allows increased penetration of allergens,
        pathogens, and irritants into subepithelial tissue, triggering
        inflammatory responses that impair lung function.
    contribution_type: causal
    necessity: conditionally_necessary
    sufficiency: not_sufficient
    contribution_weight: 0.3
    ker_evidence:
      - id: owg:evidence-oxidative-barrier-001
        name: In vitro evidence for oxidative stress-barrier dysfunction relationship

  - id: owg:oc-mcc-to-lung-function
    name: Impaired mucociliary clearance contributes to decreased lung function
    description: >-
      Contribution of impaired mucociliary clearance to decreased lung function
      through mucus accumulation and increased infection susceptibility.
    outcome:
      id: owg:ao-decreased-lung-function
      name: Decreased Lung Function
    contributing_element:
      id: owg:ce-mcc-impairment
      name: Impaired Mucociliary Clearance
      element_type: key_event
      mechanistic_role: >-
        Reduced clearance leads to mucus accumulation, airway obstruction,
        and increased susceptibility to respiratory infections, all of
        which contribute to decreased lung function.
    contribution_type: causal
    necessity: conditionally_necessary
    sufficiency: not_sufficient
    contribution_weight: 0.4
    ker_evidence:
      - id: owg:evidence-cilia-mcc-001
        name: Evidence for ciliary dysfunction reducing mucociliary clearance

adverse_outcome_pathways:
  - id: owg:aop-asthma-oxidative
    name: Oxidative Stress to Asthma via Barrier Dysfunction
    description: >-
      AOP describing how oxidative stress leads to asthma exacerbation
      through epithelial barrier dysfunction and downstream effects.
    aopwiki_id: "411"
    molecular_initiating_event:
      id: owg:mie-oxidative-stress
      name: Oxidative stress in airway epithelium
      description: >-
        Exposure to oxidants (ozone, PM2.5, cigarette smoke) causes
        oxidative stress in airway epithelial cells.
      biological_process: oxidative stress
      biological_action: increased
    key_events:
      - id: owg:ke-tight-junction-disruption
        name: Tight junction protein disruption
        description: >-
          ROS-mediated damage to tight junction proteins including
          ZO-1, occludin, and claudins.
        biological_process: tight junction assembly
        biological_action: decreased
        level_of_biological_organization: cellular
      - id: owg:ke-barrier-dysfunction
        name: Epithelial barrier dysfunction
        description: >-
          Loss of epithelial barrier integrity leading to increased
          permeability.
        biological_process: regulation of epithelial cell permeability
        biological_action: increased
        level_of_biological_organization: tissue
    key_event_relationships:
      - id: owg:ker-oxidative-to-tj
        name: Oxidative stress leads to tight junction disruption
        upstream_event:
          id: owg:mie-oxidative-stress
          name: Oxidative stress in airway epithelium
        downstream_event:
          id: owg:ke-tight-junction-disruption
          name: Tight junction protein disruption
        relationship_type: leads_to
        evidence_support: Strong empirical support from in vitro studies
        ker_evidence:
          - id: owg:evidence-oxidative-barrier-001
            name: In vitro evidence for oxidative stress-barrier dysfunction relationship
            evidence_type: experimental
            evidence_strength: strong
            confidence_level: high
            biological_plausibility: >-
              ROS directly modify cysteine residues in tight junction proteins.
            empirical_support: >-
              Dose-dependent reduction in ZO-1 and occludin expression following
              oxidative stress exposure in ALI cultures.
        assessments:
          - id: owg:assessment-oxidative-stress
            name: Oxidative Stress Assessment
            description: >-
              Measurement panel for assessing oxidative stress status.
            measurement_types:
              - reactive_oxygen_species
              - lipid_peroxidation
              - glutathione_ratio
      - id: owg:ker-tj-to-barrier
        name: Tight junction disruption leads to barrier dysfunction
        upstream_event:
          id: owg:ke-tight-junction-disruption
          name: Tight junction protein disruption
        downstream_event:
          id: owg:ke-barrier-dysfunction
          name: Epithelial barrier dysfunction
        relationship_type: leads_to
        evidence_support: Strong mechanistic support
        assessments:
          - id: owg:assessment-barrier-integrity
            name: Epithelial Barrier Integrity Assessment
            measurement_types:
              - TEER
              - paracellular_permeability
    adverse_outcome:
      id: owg:ao-asthma-exacerbation
      name: Asthma Exacerbation

