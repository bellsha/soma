# Assessment Examples for Asthma Adverse Outcome Pathway
# Demonstrates how domain-specific measurement type groupings link to KeyEventRelationships
# These assessments capture expert-curated protocols for measuring key events in AOPs

# Example Key Events for an Asthma AOP
adverse_outcome_pathways:
  - id: owg:aop-asthma-001
    name: Toxicant-induced asthma AOP
    description: >-
      Adverse outcome pathway linking environmental toxicant exposure to asthma
      through oxidative stress, epithelial dysfunction, and airway inflammation.
    aopwiki_id: AOPWIKI:123
    molecular_initiating_event:
      id: owg:mie-oxidative-stress
      name: Oxidative stress in airway epithelium
    key_events:
      - id: owg:ke-epithelial-barrier
        name: Epithelial barrier dysfunction
        description: Loss of epithelial barrier integrity
        level_of_biological_organization: cellular
      - id: owg:ke-ciliary-dysfunction
        name: Ciliary dysfunction
        description: Impaired ciliary beat frequency and mucociliary clearance
        level_of_biological_organization: cellular
      - id: owg:ke-mucus-hypersecretion
        name: Mucus hypersecretion
        description: Goblet cell hyperplasia and increased mucin production
        level_of_biological_organization: tissue
      - id: owg:ke-airway-inflammation
        name: Airway inflammation
        description: Recruitment of inflammatory cells and cytokine release
        level_of_biological_organization: tissue
      - id: owg:ke-airway-remodeling
        name: Airway remodeling
        description: Structural changes in airway wall
        level_of_biological_organization: organ
    key_event_relationships:
      - id: owg:ker-001
        name: Oxidative stress leads to epithelial barrier dysfunction
        upstream_event:
          id: owg:mie-oxidative-stress
          name: Oxidative stress in airway epithelium
        downstream_event:
          id: owg:ke-epithelial-barrier
          name: Epithelial barrier dysfunction
        relationship_type: leads_to
        evidence_support: Strong empirical support from in vitro ALI studies
        assessments:
          - id: owg:assessment-oxidative-stress
            name: Oxidative Stress Assessment
            description: >-
              Measurement panel for assessing oxidative stress status in airway epithelium.
              Includes ROS levels, antioxidant capacity, and oxidative damage markers.
            measurement_types:
              - reactive_oxygen_species
              - lipid_peroxidation
              - protein_carbonyls
              - DNA_8ohdg
              - glutathione_ratio
              - superoxide_dismutase_activity
              - catalase_activity
              - glutathione_peroxidase_activity
              - total_antioxidant_capacity
          - id: owg:assessment-barrier-integrity
            name: Epithelial Barrier Integrity Assessment
            description: >-
              Measurement panel for assessing epithelial barrier function.
            measurement_types:
              - TEER
              - paracellular_permeability

      - id: owg:ker-002
        name: Epithelial barrier dysfunction leads to ciliary dysfunction
        upstream_event:
          id: owg:ke-epithelial-barrier
          name: Epithelial barrier dysfunction
        downstream_event:
          id: owg:ke-ciliary-dysfunction
          name: Ciliary dysfunction
        relationship_type: leads_to
        evidence_support: Moderate empirical support
        assessments:
          - id: owg:assessment-ciliary-function
            name: Ciliary Function Assessment
            description: >-
              Measurement panel for assessing ciliary beating and motility.
              Used to evaluate ciliated cell function in airway epithelium.
            measurement_types:
              - ciliary_beat_frequency
              - ciliary_active_area_percentage
              - cilia_per_cell
              - cilia_length
              - percentage_ciliated_cells

      - id: owg:ker-003
        name: Ciliary dysfunction leads to impaired mucociliary clearance
        upstream_event:
          id: owg:ke-ciliary-dysfunction
          name: Ciliary dysfunction
        downstream_event:
          id: owg:ke-mcc-impairment
          name: Impaired mucociliary clearance
        relationship_type: leads_to
        evidence_support: Strong empirical support
        assessments:
          - id: owg:assessment-mcc
            name: Mucociliary Clearance Assessment
            description: >-
              Measurement panel for assessing mucociliary transport function.
              Evaluates the coordinated clearance of mucus from airways.
            measurement_types:
              - mucociliary_transport_rate
              - mucociliary_directionality
              - particle_clearance_rate
              - mucus_layer_thickness
              - bacterial_load
          - id: owg:assessment-asl
            name: Airway Surface Liquid Assessment
            description: >-
              Measurement panel for assessing airway surface liquid hydration.
              Reduced ASL height impairs mucociliary clearance.
            measurement_types:
              - asl_height
              - periciliary_layer_depth
              - mucus_layer_thickness

      - id: owg:ker-004
        name: Epithelial injury leads to mucus hypersecretion
        upstream_event:
          id: owg:ke-epithelial-barrier
          name: Epithelial barrier dysfunction
        downstream_event:
          id: owg:ke-mucus-hypersecretion
          name: Mucus hypersecretion
        relationship_type: leads_to
        evidence_support: Strong empirical support from IL-13 stimulation studies
        assessments:
          - id: owg:assessment-goblet-cell
            name: Goblet Cell Assessment
            description: >-
              Measurement panel for assessing goblet cell hyperplasia and mucin secretion.
              Goblet cell metaplasia is a hallmark of asthmatic airways.
            measurement_types:
              - goblet_cell_count
              - goblet_to_ciliated_ratio
              - mucin_protein_concentration
              - mucus_viscosity
          - id: owg:assessment-mucin-production
            name: Mucin Production Assessment
            description: >-
              Measurement panel for assessing mucin gene and protein expression.
              MUC5AC/MUC5B ratio is altered in asthma.
            measurement_types:
              - mucin_protein_concentration
              - gene_expression
              - protein_expression

      - id: owg:ker-005
        name: Epithelial injury leads to airway inflammation
        upstream_event:
          id: owg:ke-epithelial-barrier
          name: Epithelial barrier dysfunction
        downstream_event:
          id: owg:ke-airway-inflammation
          name: Airway inflammation
        relationship_type: leads_to
        evidence_support: Strong empirical support
        assessments:
          - id: owg:assessment-balf-sputum
            name: BALF/Sputum Inflammation Assessment
            description: >-
              Measurement panel for assessing airway inflammation via BALF or induced sputum.
              Includes inflammatory cell differentials and cytokine profiles.
            measurement_types:
              - neutrophil_percentage
              - eosinophil_percentage
              - macrophage_percentage
              - total_inflammatory_cell
              - IL6_level
              - IL8_level
              - IL13_level
              - TNF_alpha_level

      - id: owg:ker-006
        name: EGFR activation in epithelial repair
        upstream_event:
          id: owg:ke-epithelial-barrier
          name: Epithelial barrier dysfunction
        downstream_event:
          id: owg:ke-egfr-activation
          name: EGFR pathway activation
        relationship_type: leads_to
        evidence_support: Moderate empirical support
        assessments:
          - id: owg:assessment-egfr-signaling
            name: EGFR Signaling Assessment
            description: >-
              Measurement panel for assessing EGFR pathway activation.
              EGFR signaling is involved in epithelial repair and mucin production.
            measurement_types:
              - protein_phosphorylation
              - protein_expression
              - gene_expression

    adverse_outcome:
      id: owg:ao-asthma
      name: Asthma
      description: Chronic inflammatory disease of the airways
      outcome_level: organism

# Standalone assessments that can be referenced by multiple KERs
# These demonstrate the Assessment class without inline nesting

assessments:
  - id: owg:assessment-lung-function
    name: Lung Function Assessment
    description: >-
      Measurement panel for assessing respiratory function in human subjects.
      Standard spirometry and related pulmonary function tests.
    measurement_types:
      - FEV1
      - FVC
      - FEV1_FEC_ratio
      - FEF25_75
      - peak_expiratory_flow
      - DLCO
      - FeNO
      - bronchodilator_response
      - lung_function_decline_rate

  - id: owg:assessment-cftr-function
    name: CFTR Function Assessment
    description: >-
      Measurement panel for assessing CFTR channel activity.
      Used in cystic fibrosis research and CFTR modulator studies.
    measurement_types:
      - CFTR_chloride_secretion
      - inhibitor_sensitive_current
      - sweat_chloride_concentration

  - id: owg:assessment-gene-expression
    name: Gene Expression Assessment
    description: >-
      Measurement panel for assessing transcriptional responses.
      Applicable to qRT-PCR, RNA-seq, and other expression assays.
    measurement_types:
      - gene_expression
      - expression_ratio
      - percentage_positive_cells