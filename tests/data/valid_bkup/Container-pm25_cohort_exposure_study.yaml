      id: CHEBI:141011
      name: PM2.5
      description: Particulate matter less than 2.5 micrometers
    exposure_route: inhalation
    exposure_duration: "2 years continuous"
    exposure_concentration: 28.5
    exposure_medium: air
    environmental_context: >-
      Industrial corridor, within 1km of petrochemical facility.
      Elevated levels of PAHs and metals in PM2.5 composition.

  - id: owg:env-exposure-moderate
