# ============ Phenotypes (Outcomes) ============
phenotypes:
  - id: HP:0002099
    name: Asthma symptoms
    description: Recurrent wheezing, shortness of breath, chest tightness
    severity: moderate
    onset_age: adult

  - id: HP:0006510
    name: Chronic obstructive pulmonary disease
    description: Progressive airflow limitation
    severity: mild

  - id: owg:phenotype-accelerated-decline
    name: Accelerated lung function decline
    description: FEV1 decline rate exceeding age-expected decline by >20 mL/year
    severity: moderate

# ============ Exposure to Phenotype Associations ============
exposure_to_phenotype_associations:
  - id: owg:assoc-pm25-fev1-decline
    name: PM2.5 exposure accelerates lung function decline
    description: >-
      High PM2.5 exposure (>25 ug/m3 annual average) associated with
      accelerated FEV1 decline of 40 mL/year above expected rate.
      Dose-response relationship observed across exposure groups.
    exposure:
      id: owg:env-exposure-high
      name: High PM2.5 Exposure
    phenotype:
      id: owg:phenotype-accelerated-decline
      name: Accelerated lung function decline
    association_type: dose-response
    evidence: >-
      Linear regression adjusted for age, sex, smoking history, and
      occupational exposures. p<0.001 for PM2.5 exposure term.

  - id: owg:assoc-pm25-airway-inflammation
    name: PM2.5 exposure increases airway inflammation
    description: >-
      Elevated PM2.5 exposure associated with increased FeNO levels
      indicating eosinophilic airway inflammation.
    exposure:
      id: owg:env-exposure-high
      name: High PM2.5 Exposure
    phenotype:
      id: HP:0002099
      name: Asthma symptoms
    association_type: risk_factor
    evidence: >-
      Odds ratio 2.3 (95% CI 1.5-3.5) for elevated FeNO (>25 ppb)
      in high vs. low exposure groups.

  - id: owg:assoc-pm25-oxidative-stress
    name: PM2.5 induces systemic oxidative stress
    description: >-
      PM2.5 exposure correlated with elevated urinary 8-OHdG levels,
      indicating oxidative DNA damage.
    exposure:
      id: owg:env-exposure-high
      name: High PM2.5 Exposure
    phenotype:
      id: owg:phenotype-accelerated-decline
      name: Accelerated lung function decline
    association_type: mechanistic
    evidence: >-
      Mediation analysis suggests oxidative stress mediates ~30% of
      the PM2.5-FEV1 decline association.
