# PM2.5 Environmental Exposure Cohort Study
# Demonstrates environmental exposure to air pollution (PM2.5)
# and associated respiratory health outcomes in a community cohort
#
# Study design: Prospective cohort study following residents near
# an industrial area with elevated PM2.5 levels, measuring lung function,
# biomarkers, and respiratory outcomes over 2 years

# ============ Study Definition ============
studies:
  - id: owg:study-pm25-cohort
    name: Industrial Community Air Quality and Respiratory Health Study
    description: >-
      A two-year prospective cohort study examining the relationship between
      ambient PM2.5 exposure and respiratory health outcomes in residents
      living within 5 km of an industrial facility. Participants undergo
      quarterly spirometry, annual biomarker assessment, and continuous
      personal PM2.5 monitoring.
    study_type: cohort
    population: Adults aged 25-65 residing within 5km of industrial facility
    enrollment_period: 2022-2024
    geographic_location: Houston, TX industrial corridor
    principal_investigator: Dr. Maria Santos

# ============ Cohorts ============
cohorts:
  - id: owg:cohort-high-exposure
    name: High PM2.5 Exposure Group
    description: Participants living within 1 km of industrial source
    part_of_study:
      id: owg:study-pm25-cohort
      name: Industrial Community Air Quality Study
    cohort_size: 150
    inclusion_criteria: >-
      Adults 25-65 years, residence within 1km of facility for >2 years,
      no occupational PM exposure, non-smoker or former smoker (quit >5 years)

  - id: owg:cohort-moderate-exposure
    name: Moderate PM2.5 Exposure Group
    description: Participants living 1-3 km from industrial source
    part_of_study:
      id: owg:study-pm25-cohort
      name: Industrial Community Air Quality Study
    cohort_size: 200
    inclusion_criteria: >-
      Adults 25-65 years, residence 1-3km from facility for >2 years,
      no occupational PM exposure, non-smoker or former smoker (quit >5 years)

  - id: owg:cohort-low-exposure
    name: Low PM2.5 Exposure Control Group
    description: Participants living 3-5 km from industrial source (control)
    part_of_study:
      id: owg:study-pm25-cohort
      name: Industrial Community Air Quality Study
    cohort_size: 175
    inclusion_criteria: >-
      Adults 25-65 years, residence 3-5km from facility for >2 years,
      no occupational PM exposure, non-smoker or former smoker (quit >5 years)

# ============ Participants ============
