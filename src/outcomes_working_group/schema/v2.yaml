    inlined: true

  chemical_form:
    range: ChemicalFormEnum
    description: >-
      Physical form of the test substance (solid, aerosol, solution, vapor, etc.)

  nominal_concentration:
    range: QuantityValue
    description: >-
      Nominal or intended concentration of the test substance as prepared.
    inlined: true

  applied_dose:
    range: QuantityValue
    description: >-
      The dose applied to cells or tissue (may differ from nominal concentration).
    inlined: true

  purity:
    range: QuantityValue
    description: >-
      Purity of the test substance as percentage.
    inlined: true

  composition:
    range: string
    description: >-
      Detailed composition of the test material, especially for complex mixtures.

  vehicle_solvent:
    range: string
    description: >-
      Vehicle or solvent used to deliver the test substance (e.g., DMSO, PBS, culture medium).

  particle_properties:
    range: ParticleProperties
    description: >-
      Physical properties of particulate test materials.
    inlined: true

  source_lot_number:
    range: string
    description: >-
      Lot number from the source/manufacturer of the test article.

  # ParticleProperties slots
  particle_size:
    range: QuantityValue
    description: >-
      Primary particle size (e.g., diameter) in nanometers or micrometers.
    inlined: true

  particle_size_distribution:
    range: string
    description: >-
      Description of particle size distribution (e.g., monodisperse, polydisperse, D10/D50/D90 values).

  surface_area:
    range: QuantityValue
    description: >-
      Specific surface area of particles (e.g., m2/g by BET method).
    inlined: true

  zeta_potential:
    range: QuantityValue
    description: >-
      Zeta potential in mV, indicating surface charge in the vehicle/medium.
    inlined: true

  hydrodynamic_diameter:
