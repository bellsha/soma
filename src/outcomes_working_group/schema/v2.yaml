  mucus_removal_method:
    range: string
    description: >-
      Method used to remove mucus (e.g., PBS wash, mucolytic agent, aspiration).

  debris_removal_performed:
    range: boolean
    description: >-
      Whether debris was removed from the sample before exposure.

  debris_removal_method:
    range: string
    description: >-
      Method used to remove debris from samples.

  wash_steps:
    range: string
    description: >-
      Description of wash steps performed before exposure (buffer, number, duration).

  equilibration_time:
    range: QuantityValue
    description: >-
      Time allowed for sample equilibration before exposure.
