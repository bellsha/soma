  exposure_regiment:
    range: ExposureRegimentEnum
    description: >-
      Type of exposure regiment (continuous, repeated, intermittent, etc.)

  time_post_exposure:
    range: QuantityValue
    description: >-
      Time elapsed between end of exposure and measurement (recovery period).
