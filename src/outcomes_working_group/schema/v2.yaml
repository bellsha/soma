  aerosol_generation:
    range: AerosolGeneration
    description: >-
      Parameters for aerosol generation (for inhalation studies).
    inlined: true

  sample_preparation:
    range: SamplePreparation
    description: >-
      Pre-exposure sample preparation procedures.
    inlined: true

  dose_normalization_method:
    range: DoseNormalizationMethodEnum
    description: >-
      Method used to normalize dose (per area, per cell count, per protein, etc.)

  # AerosolGeneration slots
  aerosol_generation_method:
    range: AerosolGenerationMethodEnum
    description: >-
      Method used to generate the aerosol (nebulization, condensation, etc.)

  aerosol_generation_equipment:
    range: string
    description: >-
      Equipment used for aerosol generation (e.g., Vitrocell Cloud, ALICE, nebulizer type).

  aerosol_concentration:
    range: QuantityValue
    description: >-
      Concentration of aerosol in the exposure chamber or at the ALI.
