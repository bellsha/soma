    deprecated: >-
      Use the 'ker_evidence' slot with structured Evidence objects for new data.

  assessments:
    range: Assessment
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: >-
      Domain-specific assessments that group measurement types for evaluating
      key events in adverse outcome pathways. Each assessment defines expert-curated
      measurement protocols for specific biological endpoints.

