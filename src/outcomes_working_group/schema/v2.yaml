name: outcomes_working_group
description: >-
  A LinkML data model for representing biological measurements, assays,
  and experimental protocols in the context of outcomes research.
title: Outcome Measurement Data Model
see_also:
- https://EHS-Data-Standards.github.io/outcomes-working-group
id: https://w3id.org/EHS-Data-Standards/outcomes_working_group
imports:
- linkml:types
license: MIT

prefixes:
  owg: https://w3id.org/EHS-Data-Standards/outcomes-working-group/
  linkml: https://w3id.org/linkml/
  biolink: https://w3id.org/biolink/vocab/
  schema: http://schema.org/
  wikidata: http://www.wikidata.org/entity/
  OMRSE: http://purl.obolibrary.org/obo/OMRSE_

  # 14 Required Ontologies
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  FOODON: http://purl.obolibrary.org/obo/FOODON_
  CL: http://purl.obolibrary.org/obo/CL_
  HP: http://purl.obolibrary.org/obo/HP_
  UPHENO: http://purl.obolibrary.org/obo/UPHENO_
  UBERON: http://purl.obolibrary.org/obo/UBERON_
  MONDO: http://purl.obolibrary.org/obo/MONDO_
  MP: http://purl.obolibrary.org/obo/MP_
  ZP: http://purl.obolibrary.org/obo/ZP_
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  ECTO: http://purl.obolibrary.org/obo/ECTO_
  EFO: http://identifiers.org/efo/
  chear: http://hadatac.org/ont/chear#
  HHEAR: http://hadatac.org/ont/hhear#

  # Supporting OBO ontologies
  PATO: http://purl.obolibrary.org/obo/PATO_
  RO: http://purl.obolibrary.org/obo/RO_
  UO: http://purl.obolibrary.org/obo/UO_
  NCIT: http://purl.obolibrary.org/obo/NCIT_
  OBI: http://purl.obolibrary.org/obo/OBI_
  GO: http://purl.obolibrary.org/obo/GO_
  PR: http://purl.obolibrary.org/obo/PR_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  CLO: http://purl.obolibrary.org/obo/CLO_

  # New Approach Methodologies Ontology
  NAMO: http://purl.obolibrary.org/obo/NAMO_

  fhir: http://hl7.org/fhir/
  qudt: http://qudt.org/vocab/unit/
  UCUM: http://unitsofmeasure.org/

  # 12 Data Repository Prefixes
  DTXSID: https://comptox.epa.gov/dashboard/dsstoxdb/results?search=
  CHEMBL.COMPOUND: http://identifiers.org/chembl.compound/
  CTD.CHEMICAL: http://ctdbase.org/detail.go?type=chem&acc=
  CTD.GENE: http://ctdbase.org/detail.go?type=gene&acc=
  AOPWIKI: https://aopwiki.org/aops/
  GWAS: https://www.ebi.ac.uk/gwas/studies/
  NCBIGENE: https://www.ncbi.nlm.nih.gov/gene/
  GXA: https://www.ebi.ac.uk/gxa/experiments/
  NHANES: https://wwwn.cdc.gov/Nchs/Nhanes/
  USDA.PESTICIDE: https://www.ams.usda.gov/datasets/pdp/
  PUBCHEM.COMPOUND: http://identifiers.org/pubchem.compound/

default_prefix: owg
default_range: string


classes:
  Container:
    tree_root: true
    description: >-
      A container for collections of measurements and related entities.
      Used as the root class for data validation.
    slots:
        - studies
        - cohorts
        - participants
        - exposure_measurements
        - biomarker_measurements
        - phenotype_measurements
        - aggregated_measurements
        - gene_expression_measurements
        - protein_expression_measurements
        - chemical_exposures
        - dietary_exposures
        - environmental_exposures
        - occupational_exposures
        - phenotypes
        - diseases
        - adverse_outcomes
        - adverse_outcome_pathways
        - assessments
        - genes
        - proteins
        - cell_types
        - anatomical_entities
        - organisms
        - exposure_to_phenotype_associations
        # Synthetic population entities
        - states
        - public_use_microdata_areas
        - counties
        - census_tracts
        - block_groups
        - households
        - persons
        - schools
        # Cell culture and model system entities
        - cellular_systems
        - two_d_cell_cultures
        - three_d_cell_cultures
        - co_cultures
        - cell_lines
        - environmental_measurements
        - mechanical_measurements
        # In vitro exposure entities
        - in_vitro_exposures
        - exposure_materials
        - particle_properties_collection
        - aerosol_generations
        - sample_preparations
        - analyses
        # Paper extension entities (S&T Framework)
        - protocols
        - assays
        - observations
        - outcome_contributions
        - evidence_collection


  NamedThing:
    description: >-
      A generic grouping for any identifiable entity in the exposome
    slots:
      - id
      - name
      - description
      - category
      - xref

  Unit:
    is_a: NamedThing
    description: >-
      A unit of measurement from a standard ontology (UO, UCUM, QUDT)
    slots:
      - unit_label
    id_prefixes:
      - UO
      - UCUM
      - qudt

  QuantityValue:
    description: >-
      A quantity with a numeric value and unit of measurement
    class_uri: fhir:Quantity
    attributes:
      unit:
        range: Unit
        description: The unit of measurement
        inlined: true
      value:
        range: string
        description: The numeric value of the quantity

  QuantityRange:
    description: >-
      A range of quantities with lower and upper bounds
    class_uri: fhir:Range
    attributes:
      lower_bound:
        range: QuantityValue
        description: The lower bound of the range
      upper_bound:
        range: QuantityValue
        description: The upper bound of the range

  OntologyTerm:
    is_a: NamedThing
    description: >-
      A reference to an ontology term with both identifier and human-readable name.
      Used for measured entities, phenotypes, and other ontology-backed concepts.

  Tissue:
    is_a: NamedThing
    description: >-
      A reference to an anatomical tissue or structure with identifier and name.
      Used for tissue_context in expression measurements.

  BiologicalEntity:
    abstract: true
    is_a: NamedThing
    description: >-
      Biological entities including genes, proteins, cells, and anatomical structures

  ChemicalEntity:
    is_a: NamedThing
    class_uri: CHEBI:24431
    description: >-
      A chemical entity including compounds, drugs, and metabolites
    slots:
      - chebi_id
      - dtxsid
      - chembl_id
      - pubchem_cid
      - cas_number
      - inchi
      - smiles
      - molecular_formula

  ExposureEvent:
    abstract: true
    is_a: NamedThing
    description: >-
      An event in which an organism is exposed to a chemical or environmental factor
    slots:
      - exposed_subject
      - exposed_to_chemical
      - exposure_route
      - exposure_duration
      - exposure_concentration
      - exposure_medium

  BiologicalResponse:
    abstract: true
    is_a: NamedThing
    slots:
        - response_context
        - temporal_properties
    description: >-
      A biological response at the molecular, cellular, or tissue level.
      Extends Response with biology-specific attributes.

  HealthOutcome:
    abstract: true
    is_a: NamedThing
    description: >-
      A health-related outcome including phenotypes and diseases

  ExposableSubject:
    abstract: true
    is_a: NamedThing
    description: >-
      An entity that can be exposed to a substance or environmental factor.
      This abstract class provides a common parent for both biological model
      systems (cell cultures, organoids) and study participants, enabling
      polymorphic linking from ExposureEvent to any exposable subject.

  StudyEntity:
    abstract: true
    is_a: NamedThing
    description: >-
      Entities related to studies, cohorts, and participants

  Measurement:
    abstract: true
    is_a: NamedThing
    description: >-
      A measurement observation with a typed quantity value and optional reference ranges.
      Can be linked to source Observation and the Assay that generated it.
    slots:
      - observation_type
      - quantity_measured
      - range_low
      - range_high
      - source_observation
      - performed_by_assay
      - measurement_interpretation
      - measurement_quality

  Association:
    abstract: true
    is_a: NamedThing
    description: >-
      A relationship between two entities

  ChemicalExposure:
    is_a: ExposureEvent
    class_uri: ECTO:0000006
    description: >-
      Exposure to a chemical substance

  DietaryExposure:
    is_a: ExposureEvent
    class_uri: FOODON:00002403
    description: >-
      Exposure through dietary consumption
    slots:
      - food_item
      - serving_size

  EnvironmentalExposure:
    is_a: ExposureEvent
    class_uri: ExO:0000002
    description: >-
      Exposure to environmental factors
    slots:
      - environmental_context

  OccupationalExposure:
    is_a: ExposureEvent
    description: >-
      Exposure in an occupational setting
    slots:
      - occupation
      - workplace

  Phenotype:
    is_a: HealthOutcome
    class_uri: UPHENO:0001001
    description: >-
      An observable characteristic or trait
    slots:
      - severity
      - onset_age
    id_prefixes:
      - HP
      - UPHENO
      - MP
      - ZP

  Disease:
    is_a: HealthOutcome
    class_uri: MONDO:0000001
    description: >-
      A disease or medical condition
    slots:
      - disease_category
      - affected_anatomy

  AdverseOutcome:
    is_a: HealthOutcome
    description: >-
      An adverse health outcome in the context of an Adverse Outcome Pathway
    slots:
      - outcome_level


  AdverseOutcomePathway:
    is_a: NamedThing
    description: >-
      A sequence of causally linked events at different levels of biological
      organization that lead from exposure to adverse health outcomes
    slots:
      - aopwiki_id
      - molecular_initiating_event
      - key_events
      - key_event_relationships
      - adverse_outcome
      - stressors

  MolecularInitiatingEvent:
    is_a: BiologicalResponse
    description: >-
      The initial molecular-level perturbation that starts an Adverse Outcome Pathway
    slots:
      - biological_process
      - biological_object
      - biological_action
      - occurs_in_cell_type
      - occurs_in_anatomy

  KeyEvent:
    is_a: BiologicalResponse
    class_uri: ECTO:1000000
    description: >-
      A measurable change in biological state that is a step in an Adverse Outcome Pathway
    slots:
      - biological_process
      - biological_object
      - biological_action
      - level_of_biological_organization
      - occurs_in_cell_type
      - occurs_in_anatomy

  KeyEventRelationship:
    is_a: Association
    description: >-
      A directional relationship between two key events in an AOP.
      Updated to support structured Evidence objects while maintaining
      backward compatibility with string-based evidence_support.
    slots:
      - upstream_event
      - downstream_event
      - relationship_type
      - evidence_support
      - ker_evidence
      - assessments

  Assessment:
    is_a: NamedThing
    description: >-
      A domain-specific grouping of measurement types that together provide
      evidence for assessing whether a key event relationship is supported.
      Captures expert-curated measurement protocols for specific AOP contexts
      such as asthma adverse outcome pathways.
    slots:
      - assessed_key_event_relationship
      - measurement_types

  Study:
    is_a: StudyEntity
    class_uri: EFO:0001444
    description: >-
      A research study or survey
    slots:
      - study_type
      - population
      - enrollment_period
      - geographic_location
      - principal_investigator
      - publications

  Cohort:
    is_a: StudyEntity
    description: >-
      A group of individuals in a study
    slots:
      - part_of_study
      - cohort_size
      - inclusion_criteria

  Participant:
    is_a: StudyEntity
    mixins:
      - ExposableSubject
    description: >-
      A role representing an individual's participation in a study. Links a Person
      to a specific study cohort and captures study-specific identifiers and attributes.
      Age and sex are recorded at enrollment and may differ from the Person's current
      values or values in other study registrations.
    slots:
      - person
      - part_of_cohort
      - participant_id
      - age
      - sex
      - enrollment_date
      - withdrawal_date
      - study_arm
    slot_usage:
      age:
        description: >-
          Age of the participant in years at the time of study enrollment.
          This is a study-specific value that may differ from other study registrations
          or the person's current age.
      sex:
        description: >-
          Biological sex of the participant as recorded at study enrollment.
          This is the value captured during study registration and may be used
          for stratification or eligibility criteria.

  ExposureMeasurement:
    is_a: Measurement
    description: >-
      A measurement of exposure to a chemical or environmental factor
    slots:
      - measured_entity
      - participant
      - measurement_method
      - measurement_date
      - sample_type

  BiomarkerMeasurement:
    is_a: Measurement
    description: >-
      A measurement of a biological marker
    slots:
      - biomarker_type
      - measured_entity
      - participant
      - sample_type
      - measurement_method
      - measurement_date

  PhenotypeMeasurement:
    is_a: Measurement
    description: >-
      A measurement of a phenotypic trait or functional assay
    slots:
      - phenotype
      - measured_entity
      - participant
      - measurement_method
      - measurement_date

  AggregatedMeasurement:
    is_a: Measurement
    description: >-
      An aggregated or summary measurement across a cohort or population
    slots:
      - measured_entity
      - cohort
      - summary_statistic
      - sample_size
      - stratification

  GeneExpressionMeasurement:
    is_a: Measurement
    description: >-
      A measurement of gene expression (mRNA level) in a specific biological context.
      Captures the target gene, tissue/cell type context, and assay methodology.
    slots:
      - target_gene
      - tissue_context
      - cell_type_context
      - assay_method
      - normalization_reference
      - participant
      - measurement_date

  ProteinExpressionMeasurement:
    is_a: Measurement
    description: >-
      A measurement of protein expression or post-translational modification
      (e.g., phosphorylation) in a specific biological context.
    slots:
      - target_protein
      - phosphorylation_site
      - tissue_context
      - cell_type_context
      - assay_method
      - normalization_reference
      - participant
      - measurement_date

  # ==========================================================================
  # Cell Culture Environment and Mechanical Measurements
  # ==========================================================================

  EnvironmentalMeasurement:
    is_a: Measurement
    description: >-
      A measurement of environmental conditions for cell culture systems
      including temperature, CO2, O2 percentage, humidity, and pH.
      Used to document incubator and culture conditions.
      Valid observation_type values include: co2_percentage, o2_percentage,
      temperature, humidity, nitrogen_balance, ph.

  MechanicalMeasurement:
    is_a: Measurement
    description: >-
      A measurement of mechanical stimulation parameters for advanced culture
      systems like organ-on-chip and microphysiological systems. Includes
      stretch frequency/amplitude, shear stress, flow rate, and pressure.
      Valid observation_type values include: stretch_frequency, stretch_amplitude,
      shear_stress, flow_rate, perfusion_rate, pressure.

  MembranePropertyMeasurement:
    is_a: Measurement
    description: >-
      A measurement of membrane properties for transwell, ALI, and
      organ-on-chip culture systems. Includes pore size, pore density,
      thickness, surface area, and TEER.
      Valid observation_type values include: pore_size, pore_density,
      thickness, surface_area, teer.
    slots:
      - membrane_material

  # ==========================================================================
  # Cell Culture Supporting Classes
  # ==========================================================================

  CellLine:
    is_a: NamedThing
    class_uri: CLO:0000031
    description: >-
      A cell line - a genetically stable cultured cell population that
      contains individual cell line cells. Reference to a specific cell line
      with identifiers from cell line repositories.
    slots:
      - cell_culture_type
      - model_species
      - tissue_origin
      - disease_state
      - supplier
      - catalog_number
      - authentication_method
      - mycoplasma_status
    id_prefixes:
      - CLO

  CellCultureConditions:
    is_a: NamedThing
    exact_mappings:
      - CLO:0037334  # Cell culture condition
    description: >-
      Detailed cell culture parameters including medium, environment, and timing.
    slots:
      - culture_media
      - days_at_air_liquid_interface
      - passage_number
      - substrate_type
      - cell_culture_growth_mode
      - environmental_measurements
      - donor_count
      - replicates_per_donor

  CellCultureMedium:
    is_a: NamedThing
    description: >-
      Detailed formulation of cell culture medium including base medium
      and supplements.
    slots:
      - base_medium
      - serum_type
      - serum_concentration
      - supplements
      - osmolality
      - manufacturer
      - catalog_number
      - lot_number
      - preparation_date

  MediumSupplement:
    is_a: NamedThing
    description: >-
      Supplement or additive to cell culture medium.
    slots:
      - supplement_type
      - supplement_entity
      - concentration
      - manufacturer
      - catalog_number

  # ==========================================================================
  # Model System Class Hierarchy
  # ==========================================================================

  ModelSystem:
    abstract: true
    is_a: ExposableSubject
    class_uri: NAMO:0000000
    description: >-
      Abstract base class for model systems used in biomedical research.
      Encompasses cellular systems, microphysiological systems, and in silico models.
    slots:
      - model_species

  CellularSystem:
    abstract: true
    is_a: ModelSystem
    class_uri: NAMO:0000001
    description: >-
      Cell-based model systems that use living cells to model biological processes.
      Includes 2D cultures, 3D systems, and co-cultures. Abstract base class for
      specific culture types.
    slots:
      # Cell identity
      - cell_line
      - cell_line_lineage
      - primary_cultured_cell
      - cell_culture_type
      - anatomical_origin
      # Culture properties
      - cell_culture_growth_mode
      - cell_line_modification
      - induced_pluripotent_stem_cell_line
      - culture_conditions
      - culture_media
      # Measurements
      - environmental_measurements
      - mechanical_measurements
      - membrane_properties

  TwoDCellCulture:
    is_a: CellularSystem
    class_uri: NAMO:0000002
    description: >-
      Conventional monolayer cell cultures grown on flat surfaces.
      Includes adherent and suspension cultures in standard tissue culture vessels.
    slots:
      - substrate_type
      - confluence_level
      - passage_number
      - seeding_density
      - coating
    id_prefixes:
      - owg

  ThreeDCellCulture:
    is_a: CellularSystem
    class_uri: NAMO:0000003
    description: >-
      Three-dimensional cell culture systems including spheroids, organoids,
      and scaffold-based cultures. Provides enhanced physiological relevance
      with 3D architecture.
    slots:
      - three_d_architecture
      - matrix_composition
      - size_range
      - organoid_type
      - substrate_type
    id_prefixes:
      - owg

  CoCulture:
    is_a: CellularSystem
    class_uri: NAMO:0000004
    description: >-
      Co-culture systems combining multiple cell types to simulate tissue
      microenvironments and cell-cell interactions.
    slots:
      - coculture_configuration
      - cell_type_ratios
      - substrate_type
    id_prefixes:
      - owg

  # ==========================================================================
  # In Vitro Exposure and Test Material Classes
  # ==========================================================================

  ExposureMaterial:
    is_a: NamedThing
    description: >-
      Detailed specification of the test article or substance used in an exposure
      experiment. Extends chemical entity information with physical form, purity,
      and particle properties relevant for toxicology studies.
    slots:
      - test_substance
      - chemical_form
      - nominal_concentration
      - applied_dose
      - purity
      - composition
      - vehicle_solvent
      - particle_properties
      - source_lot_number
      - manufacturer
      - catalog_number

  ParticleProperties:
    is_a: NamedThing
    description: >-
      Physical and chemical properties of particulate test materials including
      nanoparticles, aerosols, and other particle-based exposures. Essential for
      characterizing inhaled toxicants and nanomaterials.
    slots:
      - particle_size
      - particle_size_distribution
      - surface_area
      - zeta_potential
      - hydrodynamic_diameter
      - polydispersity_index
      - particle_morphology
      - particle_composition
      - agglomeration_state

  InVitroExposure:
    is_a: ExposureEvent
    description: >-
      An in vitro exposure event describing how cells or tissues were exposed
      to a test substance. Captures exposure timing, frequency, aerosol generation
      parameters, and other in vitro-specific details.
    slots:
      - exposure_material
      - exposure_frequency
      - exposure_regiment
      - time_post_exposure
      - exposure_temperature
      - control_description
      - control_type
      - number_of_replicates
      - effective_deposition
      - deposited_dose
      - baseline_teer
      - aerosol_generation
      - sample_preparation
      - dose_normalization_method

  AerosolGeneration:
    is_a: NamedThing
    description: >-
      Parameters describing aerosol generation for inhalation toxicology studies.
      Includes generation method, equipment, and characterization of the generated
      aerosol for air-liquid interface and other exposure systems.
    slots:
      - aerosol_generation_method
      - aerosol_generation_equipment
      - aerosol_concentration
      - aerosol_flow_rate
      - aerosol_exposure_duration
      - mass_median_aerodynamic_diameter
      - geometric_standard_deviation
      - aerosol_characterization_method

  SamplePreparation:
    is_a: NamedThing
    description: >-
      Pre-exposure sample preparation procedures for in vitro systems.
      Includes ASL-specific preparations like mucus removal and other
      treatments applied before exposure.
    slots:
      - mucus_removal_performed
      - mucus_removal_method
      - debris_removal_performed
      - debris_removal_method
      - wash_steps
      - equilibration_time
      - pre_exposure_treatment
      - surface_preparation

  # ==========================================================================
  # Data Analysis and Processing Classes
  # ==========================================================================

  Analysis:
    is_a: NamedThing
    description: >-
      Data analysis and processing parameters describing how measurement data
      was acquired, processed, normalized, and quality controlled. Links to
      measurements to provide complete provenance of derived values.
    slots:
      # Normalization
      - normalization_performed
      - data_normalization_method
      - viability_normalized
      - baseline_definition
      - dose_normalization_method
      # Data acquisition
      - raw_data_type
      - analysis_software
      - analysis_software_version
      - automation_level
      - algorithm_type
      - pipeline_reference
      # Data transformation
      - data_transformation
      - replicate_combination_method
      - outlier_detection_method
      - outlier_removal_performed
      # Imaging parameters
      - imaging_magnification
      - pixel_size
      - voxel_depth
      - z_step_size
      - number_of_z_slices
      # Video/temporal parameters
      - temporal_resolution
      - acquisition_duration
      - motion_stabilization_applied
      - frame_rate
      # Context-specific
      - flow_profile_during_imaging
      - measurements_per_replicate
      # QC
      - qc_acceptance_criteria
      - qc_passed
      - comparison_to_historical_controls
      # Output
      - final_metric
      - final_metric_unit

  # ==========================================================================
  # Paper Extension Classes: Response Hierarchy
  # ==========================================================================


  TemporalProperties:
    description: >-
      Temporal characteristics of a biological response or event.
    attributes:
      onset_time:
        range: string
        description: Time after exposure when response begins
      duration:
        range: string
        description: Duration of the response
      reversibility:
        range: ReversibilityEnum
        description: Whether the response is reversible

  # ==========================================================================
  # Paper Extension Classes: Evidence Hierarchy
  # ==========================================================================

  Evidence:
    abstract: true
    is_a: NamedThing
    description: >-
      Abstract base class for evidence supporting a scientific claim.
      Provides common attributes for evidence type, strength, and provenance.
    slots:
      - evidence_type
      - evidence_strength
      - source_references
      - confidence_level

  KEREvidence:
    is_a: Evidence
    description: >-
      Evidence specific to Key Event Relationships in Adverse Outcome Pathways.
      Extends base Evidence with KER-specific attributes following AOP-Wiki
      weight of evidence considerations.
    slots:
      - biological_plausibility
      - empirical_support
      - uncertainties
      - quantitative_understanding

  ExperimentalEvidence:
    is_a: Evidence
    description: >-
      Evidence derived from experimental studies including in vitro,
      in vivo, and clinical observations.
    slots:
      - study_type
      - sample_size

  # ==========================================================================
  # Paper Extension Classes: Protocol and Assay
  # ==========================================================================

  ProtocolEquipment:
    description: >-
      Equipment specification for a protocol.
    attributes:
      equipment_name:
        range: string
        description: Name of the equipment
      equipment_type:
        range: string
        description: Type/category of equipment
      manufacturer:
        range: string
        description: Equipment manufacturer
      model:
        range: string
        description: Equipment model
      calibration_requirements:
        range: string
        description: Calibration requirements

  ProtocolParameter:
    description: >-
      A configurable parameter within a protocol.
    attributes:
      parameter_name:
        range: string
        description: Name of the parameter
      parameter_value:
        range: string
        description: Value of the parameter
      parameter_unit:
        range: Unit
        inlined: true
        description: Unit for the parameter value

  Protocol:
    is_a: NamedThing
    description: >-
      A standardized procedure or method for conducting an experiment or assay.
      Captures methodology, equipment, and parameters for reproducibility.
    slots:
      - protocol_type
      - protocol_version
      - sop_reference
      - methodology
      - protocol_equipment
      - protocol_parameters
      - validation_status
      - last_updated

  Assay:
    is_a: NamedThing
    class_uri: OBI:0000070
    description: >-
      A planned process with the objective to produce information about
      the material entity that is the evaluant. Links protocols to measurements
      and captures assay-specific details.
    slots:
      - assay_type
      - assay_protocol
      - assay_instrumentation
      - target_entity
      - measurement_outputs
      - detection_method
      - assay_sensitivity
      - assay_specificity
      - dynamic_range
      - throughput

  # ==========================================================================
  # Paper Extension Classes: Observation
  # ==========================================================================

  Observation:
    is_a: NamedThing
    description: >-
      A raw observation from an assay or measurement procedure. Captures
      the original observation with context before quantification or
      interpretation. Provides provenance for measurements.
    slots:
      - observation_timestamp
      - observer
      - observation_context
      - raw_value
      - raw_unit
      - observation_method
      - observation_notes
      - quality_flags
      - instrument_readings
      - performed_by_assay

  # ==========================================================================
  # Paper Extension Classes: Outcome Contribution
  # ==========================================================================

  ContributingElement:
    is_a: NamedThing
    description: >-
      An element that contributes to an adverse outcome. Can be a KeyEvent,
      BiologicalProcess, Measurement, or other relevant entity.
    slots:
      - element_type
      - element_reference
      - mechanistic_role

  OutcomeContribution:
    is_a: Association
    description: >-
      A relationship linking an AdverseOutcome to elements that contribute
      to it. Follows the KeyEventRelationship pattern to enable decomposition
      of complex outcomes into their contributing components.
    slots:
      - outcome
      - contributing_element
      - contribution_type
      - ker_evidence
      - assessments
      - contribution_weight
      - necessity
      - sufficiency

  Gene:
    is_a: BiologicalEntity
    description: >-
      A gene or genetic element
    slots:
      - ncbigene_id
      - symbol
      - in_taxon

  Protein:
    is_a: BiologicalEntity
    description: >-
      A protein or polypeptide
    slots:
      - encoded_by_gene
      - symbol
      - in_taxon

  CellType:
    is_a: BiologicalEntity
    class_uri: CL:0000000
    description: >-
      A type of cell
    id_prefixes:
      - CL

  AnatomicalEntity:
    is_a: BiologicalEntity
    class_uri: UBERON:0001062
    description: >-
      An anatomical structure or system
    id_prefixes:
      - UBERON

  Organism:
    is_a: BiologicalEntity
    description: >-
      An individual organism
    slots:
      - species
      - taxon_id

  ExposureToPhenotypeAssociation:
    is_a: Association
    description: >-
      An association between an exposure and a phenotype
    slots:
      - exposure
      - phenotype
      - association_type
      - evidence

  ChemicalToGeneAssociation:
    is_a: Association
    description: >-
      An association between a chemical and a gene
    slots:
      - chemical
      - gene
      - interaction_type

  GeneToDiseaseAssociation:
    is_a: Association
    description: >-
      An association between a gene and a disease
    slots:
      - gene
      - disease
      - association_type


  # =============================================================================
  # Synthetic Population Classes
  # Geographic hierarchy and population entities for synthetic population data
  # =============================================================================

  GeographicEntity:
    abstract: true
    is_a: NamedThing
    description: >-
      Abstract base class for geographic entities used in synthetic population modeling.
      Provides common geographic identifier infrastructure.
    slots:
      - federal_information_processing_standard_code

  State:
    is_a: GeographicEntity
    description: >-
      A U.S. state or equivalent territory with associated geographic properties.
      Contains counties and public use microdata areas.
    slots:
      - abbreviation
      - counties
      - public_use_microdata_areas
    exact_mappings:
      - wikidata:Q7275

  PublicUseMicrodataArea:
    aliases:
      - PUMA
    is_a: GeographicEntity
    description: >-
      Public Use Microdata Areas (PUMAs) are non-overlapping, statistical geographic
      areas that partition each state or equivalent entity into geographic areas
      containing no fewer than 100,000 people each. They cover the entirety of the
      United States, Puerto Rico, and Guam.
    slots:
      - state_federal_information_processing_standard_code
    exact_mappings:
      - wikidata:Q7257651

  County:
    is_a: GeographicEntity
    description: >-
      A county or equivalent administrative subdivision with associated properties.
      Contains census tracts.
    slots:
      - state_federal_information_processing_standard_code
      - census_tracts
    exact_mappings:
      - wikidata:Q28575
      - NCIT:C49292

  CensusTract:
    aliases:
      - Tract
    is_a: GeographicEntity
    description: >-
      A census tract is a small, relatively permanent geographic area within a county,
      used to collect and present demographic data from the census, usually containing
      between 2,500 and 8,000 residents and designed to be as homogeneous as possible
      in terms of population characteristics and living conditions.
    slots:
      - state_federal_information_processing_standard_code
      - county_federal_information_processing_standard_code
      - block_groups
    exact_mappings:
      - wikidata:Q107738887
      - NCIT:C67490

  BlockGroup:
    is_a: GeographicEntity
    description: >-
      A statistical division within a census tract, typically containing between
      600 and 3,000 people, which is used by the Census Bureau to present demographic
      data at a smaller, more localized level than the entire census tract.
    slots:
      - census_tract_federal_information_processing_standard_code
      - state_federal_information_processing_standard_code
      - county_federal_information_processing_standard_code
      - households
    exact_mappings:
      - wikidata:Q5058963

  School:
    is_a: NamedThing
    description: >-
      A school entity representing an educational institution where synthetic
      population persons may be assigned for modeling purposes.
    slots:
      - federal_information_processing_standard_code
      - state_federal_information_processing_standard_code
      - county_federal_information_processing_standard_code
      - census_tract_federal_information_processing_standard_code
      - block_group_federal_information_processing_standard_code

  Household:
    is_a: NamedThing
    description: >-
      A household entity representing a group of people living together in a
      single dwelling unit. Used in synthetic population modeling.
    slots:
      - serial_number
      - household_identifier
      - household_head_age
      - household_income
      - household_head_race
      - household_size
      - household_persons
    exact_mappings:
      - wikidata:Q259059
      - OMRSE:00000076

  Person:
    is_a: NamedThing
    description: >-
      A person (individual human being) with demographic and geographic attributes.
      Persons can participate in studies through the Participant role, which links
      a Person to a specific study cohort. In synthetic population contexts, persons
      are members of households within geographic hierarchies. Age and sex on Person
      represent current or snapshot values from the source data (e.g., census),
      distinct from study-specific values captured on Participant at enrollment.
    slots:
      - age
      - sex
      - race
      - species
      - state_federal_information_processing_standard_code
      - county_federal_information_processing_standard_code
      - census_tract_federal_information_processing_standard_code
      - block_group_federal_information_processing_standard_code
      - serial_number
      - household_identifier
      - household_head_age
      - household_income
      - household_head_race
      - household_size
      - assigned_school
      - person_order
      - relationship_to_household_head
    slot_usage:
      age:
        description: >-
          Age of the person in years as recorded in the source data (e.g., census
          or synthetic population). This represents a snapshot value at the time
          of data collection, distinct from study-specific age at enrollment.
      sex:
        description: >-
          Biological sex of the person as recorded in the source data (e.g., census
          or synthetic population). This represents the value from the original
          data source, distinct from study-specific sex recorded at enrollment.
    exact_mappings:
      - schema:Person
      - NCIT:C25190


slots:

  id:
    identifier: true
    slot_uri: schema:identifier
