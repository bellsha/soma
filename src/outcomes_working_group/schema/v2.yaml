  aerosol_flow_rate:
    range: QuantityValue
    description: >-
      Flow rate of aerosol delivery system.
    inlined: true

  aerosol_exposure_duration:
    range: QuantityValue
    description: >-
      Duration of aerosol exposure.
    inlined: true

