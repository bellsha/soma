    description: >-
      Hydrodynamic diameter measured by dynamic light scattering (DLS).
    inlined: true

  polydispersity_index:
    range: float
    description: >-
      Polydispersity index (PDI) from DLS, indicating size distribution width.

  particle_morphology:
    range: string
    description: >-
      Particle shape and morphology (e.g., spherical, rod, fiber, agglomerate).

  particle_composition:
    range: string
    description: >-
      Chemical composition of particles if different from bulk material.

  agglomeration_state:
    range: string
    description: >-
      State of agglomeration/aggregation in the exposure medium.

  # InVitroExposure slots
  exposed_system:
