name: measurement_microschemas
description: >-
  Domain-specific measurement microschemas that implement the Measurement
  interface from measurement_base.yaml. Each microschema constrains
  observation_type to a domain-specific enum and mixes in appropriate
  context (InVitroContext, InVivoContext).
title: Measurement Microschemas
id: https://w3id.org/EHS-Data-Standards/measurement_microschemas

prefixes:
  measurement_microschemas: https://w3id.org/EHS-Data-Standards/measurement_microschemas/
  measurement_base: https://w3id.org/EHS-Data-Standards/measurement_base/
  linkml: https://w3id.org/linkml/
  OBI: http://purl.obolibrary.org/obo/OBI_
  GO: http://purl.obolibrary.org/obo/GO_
  CL: http://purl.obolibrary.org/obo/CL_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  HP: http://purl.obolibrary.org/obo/HP_

default_prefix: measurement_microschemas
default_range: string

imports:
  - linkml:types
  - measurement_base

# =============================================================================
# CLASSES - Domain-Specific Measurement Microschemas
# =============================================================================

classes:

  # ---------------------------------------------------------------------------
  # Ciliary Function Measurements
  # ---------------------------------------------------------------------------

  CiliaryFunctionMeasurement:
    implements:
      - measurement_base:Measurement
    mixins:
      - Measurement
      - InVitroContext
      - InVivoContext
    description: >-
      Measurement of ciliary function including beat frequency, active area,
      cilia morphology, and ciliated cell populations. Can be performed in vitro
      on ALI cultures or in vivo via intranasal imaging (e.g., μOCT).
    slot_usage:
      observation_type:
        range: CiliaryFunctionObservationTypeEnum

  # ---------------------------------------------------------------------------
  # Airway Surface Liquid (ASL) Measurements
  # ---------------------------------------------------------------------------

  ASLMeasurement:
    implements:
      - measurement_base:Measurement
    mixins:
      - Measurement
      - InVitroContext
      - InVivoContext
    description: >-
      Measurement of airway surface liquid properties including ASL height,
      periciliary layer depth, and ion composition. Critical for assessing
      airway hydration status in CF and other mucociliary disorders.
    slot_usage:
      observation_type:
        range: ASLObservationTypeEnum

  # ---------------------------------------------------------------------------
  # Mucociliary Clearance (MCC) Measurements
  # ---------------------------------------------------------------------------

  MCCMeasurement:
    implements:
      - measurement_base:Measurement
    mixins:
      - Measurement
      - InVitroContext
      - InVivoContext
    description: >-
      Measurement of mucociliary clearance and transport including mucus
      transport rate, directionality, and clearance efficiency. Assesses
      the coordinated function of cilia and mucus for pathogen clearance.
    slot_usage:
      observation_type:
        range: MCCObservationTypeEnum

  # ---------------------------------------------------------------------------
  # Oxidative Stress Measurements
  # ---------------------------------------------------------------------------

  OxidativeStressMeasurement:
    implements:
      - measurement_base:Measurement
    mixins:
      - Measurement
      - InVitroContext
      - InVivoContext
    description: >-
      Measurement of oxidative stress markers including reactive oxygen species,
      lipid peroxidation products, protein oxidation, DNA damage, and antioxidant
      capacity. Key molecular initiating event in respiratory toxicology AOPs.
    slot_usage:
      observation_type:
        range: OxidativeStressObservationTypeEnum

  # ---------------------------------------------------------------------------
  # CFTR Function Measurements
  # ---------------------------------------------------------------------------

  CFTRMeasurement:
    implements:
      - measurement_base:Measurement
    mixins:
      - Measurement
      - InVitroContext
      - InVivoContext
    description: >-
      Measurement of CFTR (cystic fibrosis transmembrane conductance regulator)
      function including chloride secretion, CFTR-mediated current, and
      clinical indicators like sweat chloride concentration.
    slot_usage:
      observation_type:
        range: CFTRObservationTypeEnum

  # ---------------------------------------------------------------------------
  # EGFR Phosphorylation Measurements
  # ---------------------------------------------------------------------------


  GeneExpressionMeasurement:
    is_a: Measurement
    description: >-
      A measurement of gene expression (mRNA level) in a specific biological context.
      Captures the target gene, tissue/cell type context, and assay methodology.
    slots:
      - target_gene
      - tissue_context
      - cell_type_context
      - normalization_reference
      - measurement_date
    slot_usage:
      observation_type:
        range: GeneExpressionObservationTypeEnum

  ProteinExpressionMeasurement:
    is_a: Measurement
    description: >-
      A measurement of protein expression or post-translational modification
      (e.g., phosphorylation) in a specific biological context.
    slots:
      - target_protein
      - phosphorylation_site
      - tissue_context
      - cell_type_context
      - normalization_reference
      - participant
      - measurement_date

  EGFRPhosphorylationMeasurement:
    is_a: Measurement
    slots:
      - anatomical_context
      - phosphorylation_site
    implements:
      - measurement_base:Measurement
    mixins:
      - Measurement
      - InVitroContext
    description: >-
      Measurement of EGFR (epidermal growth factor receptor) phosphorylation.
      Phosphorylation site (e.g., Y1068, Y1173) is critical for interpreting
      activation status. Western blot is the most common detection method.
      Phosphorylation measurement provides the most specific evidence for
      EGFR activation; downstream kinase data alone is insufficient without
      direct phosphorylation evidence or inhibitor reversal studies.
    slot_usage:
      observation_type:
        range: EGFRObservationTypeEnum

  # ---------------------------------------------------------------------------
  # Goblet Cell and Mucin Measurements
  # ---------------------------------------------------------------------------

  GobletCellMucinMeasurement:
    implements:
      - measurement_base:Measurement
    mixins:
      - Measurement
      - InVitroContext
      - InVivoContext
    description: >-
      Measurement of goblet cell populations and mucin production including
      goblet cell counts, mucin gene/protein expression, and mucus properties.
      Assesses goblet cell hyperplasia and mucus hypersecretion phenotypes.
    slot_usage:
      observation_type:
        range: GobletCellMucinObservationTypeEnum

  # ---------------------------------------------------------------------------
  # BALF and Sputum Measurements
  # ---------------------------------------------------------------------------

  BALFSputumMeasurement:
    implements:
      - measurement_base:Measurement
    mixins:
      - Measurement
      - InVivoContext
    description: >-
      Measurement of bronchoalveolar lavage fluid (BALF) or sputum components
      including inflammatory cell profiles, cytokine levels, microbiome
      composition, and protein concentrations. Clinical assessment of
      airway inflammation.
    slot_usage:
      observation_type:
        range: BALFSputumObservationTypeEnum

  # ---------------------------------------------------------------------------
  # Lung Function Measurements
  # ---------------------------------------------------------------------------

  LungFunctionMeasurement:
    implements:
      - measurement_base:Measurement
    mixins:
      - Measurement
      - InVivoContext
    description: >-
      Measurement of lung function parameters via spirometry and other
      pulmonary function tests including FEV1, FVC, FEV1/FVC ratio, and
      diffusing capacity. Clinical outcomes for respiratory health assessment.
    slot_usage:
      observation_type:
        range: LungFunctionObservationTypeEnum

  # ---------------------------------------------------------------------------
  # FoxJ1 / Ciliogenesis Measurements
  # ---------------------------------------------------------------------------

  FoxJMeasurement:
    implements:
      - measurement_base:Measurement
    mixins:
      - Measurement
      - InVitroContext
    description: >-
      Measurement of FoxJ1 expression and related ciliogenesis markers.
      FoxJ1 is a master regulator of multiciliogenesis, and its expression
      indicates ciliated cell differentiation status.
    slot_usage:
      observation_type:
        range: FoxJObservationTypeEnum


# =============================================================================
# ENUMS - Domain-Specific Observation Types
# =============================================================================

enums:

  # ---------------------------------------------------------------------------
  # Ciliary Observation Types
  # ---------------------------------------------------------------------------

  CiliaryFunctionObservationTypeEnum:
    description: >-
      Observation types for ciliary function measurements.
    permissible_values:
      ciliary_beat_frequency:
        description: Ciliary beat frequency (Hz)
        meaning: GO:0003341
      ciliary_active_area_percentage:
        description: Percentage of epithelial surface with actively beating cilia
      cilia_length:
        description: Length of cilia (μm)
      cilia_per_cell:
        description: Number of cilia per cell
      percentage_ciliated_cells:
        description: Percentage of cells that are ciliated
      ciliary_motion_pattern:
        description: Pattern of ciliary motion (coordinated, dyskinetic, immotile)
      ciliary_beat_amplitude:
        description: Amplitude of ciliary beat stroke
      cell_type_ratios:
        description: Ratios between different cell types (e.g., ciliated to goblet cell ratio)

  # ---------------------------------------------------------------------------
  # ASL Observation Types
  # ---------------------------------------------------------------------------

  ASLObservationTypeEnum:
    description: >-
      Observation types for airway surface liquid measurements.
    permissible_values:
      asl_height:
        description: Airway surface liquid height/depth (μm)
      periciliary_layer_depth:
        description: Periciliary layer (PCL) depth (μm)
      mucus_layer_thickness:
        description: Thickness of the mucus gel layer (μm)
      asl_chloride_concentration:
        description: Chloride ion concentration in ASL
      asl_sodium_concentration:
        description: Sodium ion concentration in ASL
      asl_potassium_concentration:
        description: Potassium ion concentration in ASL
      asl_ph:
        description: pH of airway surface liquid

  # ---------------------------------------------------------------------------
  # MCC Observation Types
  # ---------------------------------------------------------------------------

  MCCObservationTypeEnum:
    description: >-
      Observation types for mucociliary clearance measurements.
    permissible_values:
      mucociliary_transport_rate:
        description: Rate of mucus/particle transport (mm/min or μm/s)
        meaning: GO:0120197
      transport_directionality:
        description: Directionality of mucociliary transport
      percentage_active_transport:
        description: Percentage of surface with active mucociliary transport
      particle_clearance_time:
        description: Time to clear particles from a defined region
      biofilm_clearance_rate:
        description: Rate of bacterial biofilm clearance
      bacterial_load:
        description: Bacterial load remaining after clearance (CFU)
      viral_spread_rate:
        description: Rate of viral spread across the epithelium

  # ---------------------------------------------------------------------------
  # Oxidative Stress Observation Types
  # ---------------------------------------------------------------------------

  OxidativeStressObservationTypeEnum:
    description: >-
      Observation types for oxidative stress measurements.
    permissible_values:
      reactive_oxygen_species:
        description: Reactive oxygen species level (fluorescence intensity or fold change)
        meaning: CHEBI:26523
      malondialdehyde:
        description: Malondialdehyde (MDA) level - lipid peroxidation marker
        meaning: CHEBI:16213
      four_hydroxynonenal:
        description: 4-Hydroxynonenal (4-HNE) level - lipid peroxidation marker
        meaning: CHEBI:58968
      eight_isoprostane:
        description: 8-Isoprostane level - lipid peroxidation marker
      protein_carbonyl:
        description: Protein carbonyl content - protein oxidation marker
      nitrotyrosine:
        description: Nitrotyrosine level - protein nitration marker
      eight_ohdg:
        description: 8-OHdG level - DNA oxidation marker
      glutathione_ratio:
        description: GSH/GSSG ratio - antioxidant capacity
      superoxide_dismutase_activity:
        description: Superoxide dismutase (SOD) enzyme activity
      catalase_activity:
        description: Catalase enzyme activity
      glutathione_peroxidase_activity:
        description: Glutathione peroxidase (GPx) enzyme activity
      total_antioxidant_capacity:
        description: Total antioxidant capacity of sample
      nrf2_activation:
        description: NRF2 pathway activation level

  # ---------------------------------------------------------------------------
  # CFTR Observation Types
  # ---------------------------------------------------------------------------

  CFTRObservationTypeEnum:
    description: >-
      Observation types for CFTR function measurements.
    permissible_values:
      cftr_chloride_secretion:
        description: CFTR-mediated chloride secretory current (μA/cm²)
      cftr_forskolin_response:
        description: CFTR response to forskolin stimulation
      cftr_inhibitor_sensitive_current:
        description: CFTRinh-172 sensitive current
      sweat_chloride_concentration:
        description: Sweat chloride concentration (mEq/L) - CF diagnostic
      nasal_potential_difference:
        description: Nasal potential difference measurement

  # ---------------------------------------------------------------------------
  # EGFR Observation Types
  # ---------------------------------------------------------------------------

  EGFRObservationTypeEnum:
    description: >-
      Observation types for EGFR signaling measurements.
    permissible_values:
      egfr_phosphorylation:
        description: EGFR phosphorylation level (specify site, e.g., Y1068, Y1173)
      egfr_total_protein:
        description: Total EGFR protein expression
      erk_phosphorylation:
        description: ERK1/2 phosphorylation (downstream kinase)
      akt_phosphorylation:
        description: AKT phosphorylation (downstream kinase)
      egfr_ligand_expression:
        description: EGFR ligand expression (EGF, TGF-α, amphiregulin)
      egfr_membrane_localization:
        description: EGFR membrane localization

  # ---------------------------------------------------------------------------
  # Goblet Cell / Mucin Observation Types
  # ---------------------------------------------------------------------------

  GobletCellMucinObservationTypeEnum:
    description: >-
      Observation types for goblet cell and mucin measurements.
    permissible_values:
      goblet_cell_count:
        description: Number or percentage of goblet cells
        meaning: CL:0000160
      goblet_to_ciliated_ratio:
        description: Ratio of goblet cells to ciliated cells
      muc5ac_expression:
        description: MUC5AC gene or protein expression
      muc5b_expression:
        description: MUC5B gene or protein expression
      muc5ac_muc5b_ratio:
        description: Ratio of MUC5AC to MUC5B expression
      mucin_protein_concentration:
        description: Total mucin protein concentration
      mucin_secretion_rate:
        description: Rate of mucin secretion
      mucus_viscosity:
        description: Viscosity of airway mucus
      percent_solids:
        description: Percent solids in mucus/secretions

  # ---------------------------------------------------------------------------
  # BALF/Sputum Observation Types
  # ---------------------------------------------------------------------------

  BALFSputumObservationTypeEnum:
    description: >-
      Observation types for BALF and sputum measurements.
    permissible_values:
      neutrophil_percentage:
        description: Percentage of neutrophils in differential cell count
      eosinophil_percentage:
        description: Percentage of eosinophils in differential cell count
      macrophage_percentage:
        description: Percentage of macrophages in differential cell count
      lymphocyte_percentage:
        description: Percentage of lymphocytes in differential cell count
      total_cell_count:
        description: Total cell count in sample
      il6_concentration:
        description: IL-6 cytokine concentration
      il8_concentration:
        description: IL-8 (CXCL8) cytokine concentration
      tnf_alpha_concentration:
        description: TNF-α cytokine concentration
      il1_beta_concentration:
        description: IL-1β cytokine concentration
      total_protein_concentration:
        description: Total protein concentration
      alpha_diversity:
        description: Microbiome alpha diversity metric
      beta_diversity:
        description: Microbiome beta diversity metric
      bacterial_load:
        description: Total bacterial load (16S copies or CFU)
      cell_free_dna:
        description: Cell-free DNA concentration in BALF or sputum

  # ---------------------------------------------------------------------------
  # Lung Function Observation Types
  # ---------------------------------------------------------------------------

  LungFunctionObservationTypeEnum:
    description: >-
      Observation types for lung function measurements.
    permissible_values:
      fev1:
        description: Forced expiratory volume in 1 second (L or % predicted)
        meaning: HP:0002088
      fvc:
        description: Forced vital capacity (L or % predicted)
      fev1_fvc_ratio:
        description: Ratio of FEV1 to FVC
      fef25_75:
        description: Forced expiratory flow at 25-75% of FVC
      pef:
        description: Peak expiratory flow
      dlco:
        description: Diffusing capacity for carbon monoxide
      feno:
        description: Fractional exhaled nitric oxide (ppb)
      bronchodilator_response:
        description: Change in FEV1 after bronchodilator administration
      lung_function_decline_rate:
        description: Rate of FEV1 decline over time (mL/year)

  # ---------------------------------------------------------------------------
  # FoxJ1 Observation Types
  # ---------------------------------------------------------------------------

  FoxJObservationTypeEnum:
    description: >-
      Observation types for FoxJ1 and ciliogenesis measurements.
    permissible_values:
      foxj1_mrna_expression:
        description: FoxJ1 mRNA expression level
      foxj1_protein_expression:
        description: FoxJ1 protein expression level
      foxj1_positive_cell_percentage:
        description: Percentage of FoxJ1-positive cells
      foxj1_nuclear_localization:
        description: FoxJ1 nuclear localization

  # ---------------------------------------------------------------------------
  # Gene Expression Observation Types
  # ---------------------------------------------------------------------------

  GeneExpressionObservationTypeEnum:
    description: >-
      Observation types for gene expression measurements.
    permissible_values:
      mrna_level:
        description: mRNA expression level (qRT-PCR, RNA-seq)
      protein_level:
        description: Protein expression level (Western blot, ELISA, mass spec)
      percentage_positive_cells:
        description: Percentage of cells positive for marker expression (IHC, flow cytometry)


# =============================================================================
# SLOTS - Protein Expression Measurement Slots
# =============================================================================

slots:

  # Expression measurement slots
  target_gene:
    range: uriorcurie
    inlined: true
    description: >-
      The gene whose expression is being measured, with identifier, name, and symbol.
      Use this to specify the exact gene target (e.g., MUC5AC, EGFR, IL8).

  target_protein:
    range: uriorcurie
    description: >-
      The protein whose expression or modification is being measured,
      with identifier, name, and optionally the encoding gene.

  tissue_context:
    range: uriorcurie
    description: >-
      The anatomical tissue or structure where expression was measured,
      with identifier and name (e.g., bronchial epithelium, lung, nasal mucosa).

  cell_type_context:
    range: uriorcurie
    description: >-
      The specific cell type where expression was measured,
      with identifier and name (e.g., goblet cell, ciliated cell, basal cell).

  normalization_reference:
    range: string
    description: >-
      The reference gene or protein used for normalization
      (e.g., GAPDH, beta-actin, 18S rRNA, total protein).

  phosphorylation_site:
    range: string
    description: >-
      For protein phosphorylation measurements, the specific amino acid
      residue that is phosphorylated (e.g., Y1068, S473, T308).

  anatomical_context:
    range: uriorcurie
    id_prefixes:
      - UBERON
    description: >-
      The anatomical location or tissue from which the measurement was taken.
      Examples include "lung epithelium", "nasal mucosa", "bronchial tissue".


