name: measurement_base
description: >-
  Base schema defining the Measurement interface and supporting classes
  (Protocol, Method, Assay) for outcomes research. Microschemas implement
  this base to define domain-specific measurement observations.
title: Measurement Base Schema
id: https://w3id.org/EHS-Data-Standards/measurement_base

imports:
  - linkml:types

prefixes:
  measurement_base: https://w3id.org/EHS-Data-Standards/measurement_base/
  linkml: https://w3id.org/linkml/
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  IAO: http://purl.obolibrary.org/obo/IAO_
  PATO: http://purl.obolibrary.org/obo/PATO_
  CLO: http://purl.obolibrary.org/obo/CLO_
  NAMO: http://purl.obolibrary.org/obo/NAMO_
  EFO: http://www.ebi.ac.uk/efo/EFO_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  GO: http://purl.obolibrary.org/obo/GO_
  PR: http://purl.obolibrary.org/obo/PR_
  schema: http://schema.org/

default_prefix: measurement_base
default_range: string

# =============================================================================
# CLASSES
# =============================================================================

classes:

  # ---------------------------------------------------------------------------
  # Core Measurement Interface
  # ---------------------------------------------------------------------------

  Measurement:
    mixin: true
    description: >-
      The result of applying an assay to a specific sample at a specific time,
      producing a value (or values). This is the interface that domain-specific
      measurement microschemas implement.
    slots:
      - id
      - name
      - description
      - observation_type
      - quantity_measured
      - range_low
      - range_high
      - measured_entity
      - measurement_method
      - measurement_date
      - uses

  # ---------------------------------------------------------------------------
  # Protocol / Method / Assay Hierarchy
  # ---------------------------------------------------------------------------

  Assay:
    description: >-
      A test or experiment used to measure a specific biological or chemical
      activity; assays generate data on how a substance affects cells, tissues,
      or systems.
    class_uri: OBI:0000070
    slots:
      - id
      - name
      - description

  Method:
    description: >-
      A general approach or technique used to collect, measure, or analyze data
      (e.g., qPCR, RNA-Seq, high-speed video microscopy, ELISA).
    slots:
      - id
      - name
      - description
      - implements

  Protocol:
    description: >-
      A detailed set of steps for how to perform a test or collect data;
      protocols ensure consistency across laboratories or studies when
      generating exposure or biological data.
    class_uri: OBI:0000272
    slots:
      - id
      - name
      - description
      - specified_by
      - follows
      - study_context
      # Procedural detail slots (generic)
      - imaging_frame_rate
      - imaging_duration
      - spatial_resolution
      - temperature_control
      - humidity_control
      - evaporation_control
      - detection_method
      - staining_type
      - antibody_used
      - probe_type
      - normalization_method
      - replicate_count
      - quality_control_criteria

  # ---------------------------------------------------------------------------
  # Context Mixins (In Vitro / In Vivo)
  # ---------------------------------------------------------------------------

  InVitroContext:
    mixin: true
    description: >-
      Context slots for in vitro measurements using cell culture systems.
      Mix this into microschemas that can be performed on cultured cells.
      The cell_culture_system slot provides a rich reference to the full
      CellularSystem model (TwoDCellCulture, ThreeDCellCulture, or CoCulture).
    slots:
      - cell_culture_system
      - days_at_differentiation
      - donor_info
      - replicates_per_donor

  InVivoContext:
    mixin: true
    description: >-
      Context slots for in vivo measurements from human or animal subjects.
      Mix this into microschemas that can be performed on living subjects.
    slots:
      - participant
      - sample_type
      - collection_site
      - collection_date
      - subject_characteristics

  # ---------------------------------------------------------------------------
  # Supporting Classes
  # ---------------------------------------------------------------------------

  QuantityValue:
    description: >-
      A quantity with a numeric value and unit of measurement.
    slots:
      - value
      - unit

  Unit:
    description: >-
      A unit of measurement from a standard ontology (UO, UCUM, QUDT).
    slots:
      - id
      - name
    id_prefixes:
      - UO
      - UCUM
      - QUDT

  NamedEntity:
    description: >-
      A reference to an entity with an identifier and name.
      Used for measured_entity, participant, etc.
    slots:
      - id
      - name

  # ---------------------------------------------------------------------------
  # Cell Culture Supporting Classes
  # ---------------------------------------------------------------------------

  CellLine:
    class_uri: CLO:0000031
    description: >-
      A cell line - a genetically stable cultured cell population that
      contains individual cell line cells. Reference to a specific cell line
      with identifiers from cell line repositories.
    slots:
      - id
      - name
      - description
      - cell_type
      - model_species
      - tissue_origin
      - disease_state
      - supplier
      - catalog_number
      - authentication_method
      - mycoplasma_status
    id_prefixes:
      - CLO

  CellCultureConditions:
    exact_mappings:
      - CLO:0037334
    description: >-
      Detailed cell culture parameters including medium, environment, and timing.
    slots:
      - id
      - name
      - culture_media
      - days_at_air_liquid_interface
      - passage_number
      - substrate_type
      - cell_culture_growth_mode
      - donor_count
      - replicates_per_donor

  CellCultureMedium:
    description: >-
      Detailed formulation of cell culture medium including base medium
      and supplements.
    slots:
      - id
      - name
      - base_medium
      - serum_type
      - serum_concentration
      - supplements
      - osmolality
      - manufacturer
      - catalog_number
      - lot_number
      - preparation_date

  MediumSupplement:
    description: >-
      Supplement or additive to cell culture medium.
    slots:
      - id
      - name
      - supplement_type
      - concentration
      - manufacturer
      - catalog_number

  # ---------------------------------------------------------------------------
  # Cell Culture Model System Hierarchy
  # ---------------------------------------------------------------------------

  CellularSystem:
    abstract: true
    class_uri: NAMO:0000001
    description: >-
      Cell-based model systems that use living cells to model biological processes.
      Includes 2D cultures, 3D systems, and co-cultures. Abstract base class for
      specific culture types.
    slots:
      - id
      - name
      - description
      # Cell identity
      - cell_line
      - primary_cell
      - cell_type
      - anatomical_origin
      # Culture properties
      - cell_culture_growth_mode
      - culture_conditions
      - culture_media
      - model_species

  TwoDCellCulture:
    is_a: CellularSystem
    class_uri: NAMO:0000002
    description: >-
      Conventional monolayer cell cultures grown on flat surfaces.
      Includes adherent and suspension cultures in standard tissue culture vessels.
    slots:
      - substrate_type
      - confluence_level
      - passage_number
      - seeding_density
      - coating
    id_prefixes:
      - owg

  ThreeDCellCulture:
    is_a: CellularSystem
    class_uri: NAMO:0000003
    description: >-
      Three-dimensional cell culture systems including spheroids, organoids,
      and scaffold-based cultures. Provides enhanced physiological relevance
      with 3D architecture.
    slots:
      - three_d_architecture
      - matrix_composition
      - size_range
      - organoid_type
      - substrate_type
    id_prefixes:
      - owg

  CoCulture:
    is_a: CellularSystem
    class_uri: NAMO:0000004
    description: >-
      Co-culture systems combining multiple cell types to simulate tissue
      microenvironments and cell-cell interactions.
    slots:
      - coculture_configuration
      - cell_type_ratios
      - substrate_type
    id_prefixes:
      - owg

  # ---------------------------------------------------------------------------
  # Additional Supporting Classes for Cell Culture
  # ---------------------------------------------------------------------------

  QuantityRange:
    description: >-
      A range of quantity values with minimum and maximum bounds.
    slots:
      - min_value
      - max_value
      - unit

# =============================================================================
# SLOTS
# =============================================================================

slots:

  # ---------------------------------------------------------------------------
  # Identifier and Metadata Slots
  # ---------------------------------------------------------------------------

  id:
    description: A unique identifier for the entity.
    identifier: true
    range: uriorcurie
    required: true

  name:
    description: A human-readable name for the entity.
    range: string
    slot_uri: schema:name

  description:
    description: A detailed description of the entity.
    range: string
    slot_uri: schema:description

  # ---------------------------------------------------------------------------
  # Measurement Core Slots
  # ---------------------------------------------------------------------------

  observation_type:
    description: >-
      The type of observation being measured. Constrained by domain-specific
      enums in microschemas (e.g., CiliaryObservationTypeEnum).
    range: string

  quantity_measured:
    description: >-
      The measured quantity value with its unit.
    range: QuantityValue
    inlined: true

  range_low:
    description: >-
      Lower bound of the reference range for this measurement type.
    range: QuantityValue
    inlined: true

  range_high:
    description: >-
      Upper bound of the reference range for this measurement type.
    range: QuantityValue
    inlined: true

  measured_entity:
    description: >-
      The biological or chemical entity being measured (e.g., Cilium, CFTR,
      ROS). Reference to an ontology term.
    range: NamedEntity
    inlined: true

  measurement_method:
    description: >-
      Brief description of the method used to obtain the measurement.
    range: string

  measurement_date:
    description: >-
      Date when the measurement was performed.
    range: date

  uses:
    description: >-
      The Assay used to produce this measurement.
    range: Assay
    inlined: true

  # ---------------------------------------------------------------------------
  # Protocol / Method / Assay Relationship Slots
  # ---------------------------------------------------------------------------

  implements:
    description: >-
      The Assay that this Method implements or realizes.
    range: Assay
    inlined: true

  specified_by:
    description: >-
      The Method that this Protocol specifies in detail.
    range: Method
    inlined: true

  follows:
    description: >-
      The Assay that this Protocol provides detailed steps for.
    range: Assay
    inlined: true

  study_context:
    description: >-
      The experimental context for this protocol.
    range: StudyContextEnum

  # ---------------------------------------------------------------------------
  # Protocol Procedural Detail Slots
  # ---------------------------------------------------------------------------

  imaging_frame_rate:
    description: >-
      Frame rate for video/imaging acquisition (e.g., 200 fps).
    range: QuantityValue
    inlined: true

  imaging_duration:
    description: >-
      Duration of imaging session.
    range: QuantityValue
    inlined: true

  spatial_resolution:
    description: >-
      Spatial resolution of imaging (e.g., 1-2 μm axial resolution).
    range: QuantityValue
    inlined: true

  temperature_control:
    description: >-
      Temperature conditions during the procedure (e.g., 37°C).
    range: QuantityValue
    inlined: true

  humidity_control:
    description: >-
      Humidity conditions during the procedure.
    range: QuantityValue
    inlined: true

  evaporation_control:
    description: >-
      Method used to prevent evaporation (e.g., perfluorocarbon overlay, oil).
    range: string

  detection_method:
    description: >-
      Detection method used (e.g., flow cytometry, plate reader, microscopy).
    range: string

  staining_type:
    description: >-
      Type of staining used (e.g., immunofluorescence, histological, AB-PAS).
    range: string

  antibody_used:
    description: >-
      Antibodies used in staining or detection.
    range: string
    multivalued: true

  probe_type:
    description: >-
      Type of probe used (e.g., DCFDA for ROS, Texas Red-dextran for ASL).
    range: string

  normalization_method:
    description: >-
      Method used for data normalization.
    range: string

  replicate_count:
    description: >-
      Number of technical replicates.
    range: integer

  quality_control_criteria:
    description: >-
      Quality control acceptance criteria for the measurement.
    range: string

  # ---------------------------------------------------------------------------
  # In Vitro Context Slots
  # ---------------------------------------------------------------------------

  cell_culture_system:
    description: >-
      The cell culture system used for this measurement. Reference to a
      CellularSystem instance (TwoDCellCulture, ThreeDCellCulture, or CoCulture).
    range: CellularSystem
    inlined: true

  days_at_differentiation:
    description: >-
      Days at air-liquid interface or differentiation stage.
    range: integer

  # ---------------------------------------------------------------------------
  # Cell Culture Identity Slots
  # ---------------------------------------------------------------------------

  cell_line:
    range: CellLine
    description: >-
      Reference to the cell line used in this culture system.
    inlined: true

  primary_cell:
    range: NamedEntity
    description: >-
      Primary cells directly isolated from tissue, not from an established cell line.
    inlined: true

  cell_type:
    range: NamedEntity
    slot_uri: EFO:0000324
    description: >-
      The cell type being cultured, with ontology reference.
    inlined: true

  anatomical_origin:
    range: NamedEntity
    description: >-
      The anatomical location from which cells were derived (e.g., lung, intestine).
    inlined: true

  model_species:
    range: NamedEntity
    description: >-
      The species of origin for the cells in the model system.
    inlined: true

  # ---------------------------------------------------------------------------
  # Cell Culture Property Slots
  # ---------------------------------------------------------------------------

  cell_culture_growth_mode:
    range: CellCultureGrowthModeEnum
    exact_mappings:
      - CLO:0000030
    description: >-
      Mode of cell culture growth (adherent, suspension, ALI, 3D, etc.)

  substrate_type:
    range: SubstrateTypeEnum
    description: >-
      Type of culture substrate or surface material.

  culture_conditions:
    range: CellCultureConditions
    description: >-
      Detailed cell culture conditions including medium, environment, and timing.
    inlined: true

  culture_media:
    range: CellCultureMedium
    description: >-
      Cell culture medium formulation with supplements.
    inlined: true

  passage_number:
    range: integer
    description: >-
      Cell passage number.
    exact_mappings:
      - CLO:0000170

  days_at_air_liquid_interface:
    range: integer
    description: >-
      Number of days cells have been cultured at air-liquid interface (ALI).

  donor_count:
    range: integer
    description: >-
      Number of unique cell donors used in the experiment.

  replicates_per_donor:
    range: integer
    description: >-
      Number of biological replicates per donor.

  # ---------------------------------------------------------------------------
  # 2D Culture Specific Slots
  # ---------------------------------------------------------------------------

  confluence_level:
    range: QuantityValue
    description: >-
      Confluence level of adherent culture as percentage.
    inlined: true

  seeding_density:
    range: QuantityValue
    description: >-
      Cell seeding density (cells per cm2 or per mL).
    inlined: true

  coating:
    range: string
    description: >-
      Surface coating applied to membrane or substrate.

  # ---------------------------------------------------------------------------
  # 3D Culture Specific Slots
  # ---------------------------------------------------------------------------

  three_d_architecture:
    range: ThreeDArchitectureEnum
    description: >-
      Type of 3D culture architecture (spheroid, organoid, scaffold-based, etc.)

  matrix_composition:
    range: string
    description: >-
      Composition of the 3D matrix or scaffold material (e.g., Matrigel,
      collagen, alginate, synthetic hydrogel).

  size_range:
    range: QuantityRange
    description: >-
      Size range of 3D structures (diameter for spheroids/organoids).
    inlined: true

  organoid_type:
    range: string
    description: >-
      Specific type of organoid (e.g., intestinal, cerebral, lung, liver).

  # ---------------------------------------------------------------------------
  # Co-Culture Specific Slots
  # ---------------------------------------------------------------------------

  coculture_configuration:
    range: CoCultureConfigurationEnum
    description: >-
      Physical configuration of co-culture (direct contact, transwell, microfluidic).

  cell_type_ratios:
    range: string
    multivalued: true
    description: >-
      Ratios between different cell types in co-culture (e.g., "epithelial:stromal = 3:1").

  # ---------------------------------------------------------------------------
  # Cell Line Detail Slots
  # ---------------------------------------------------------------------------

  tissue_origin:
    range: string
    description: >-
      Tissue from which the cell line was derived.

  disease_state:
    range: string
    description: >-
      Disease state of the cell line (e.g., normal, cancerous, CF).

  supplier:
    range: string
    description: >-
      Supplier or source of the cell line or reagent.

  catalog_number:
    range: string
    description: >-
      Catalog or product number from the supplier.

  authentication_method:
    range: string
    description: >-
      Method used to authenticate the cell line (e.g., STR profiling).

  mycoplasma_status:
    range: string
    description: >-
      Mycoplasma contamination testing status (e.g., negative, positive, not tested).

  # ---------------------------------------------------------------------------
  # Cell Culture Medium Slots
  # ---------------------------------------------------------------------------

  base_medium:
    range: string
    description: >-
      Base medium type (e.g., DMEM, RPMI 1640, Ham's F-12, BEGM).

  serum_type:
    range: string
    description: >-
      Type of serum used (e.g., FBS, human serum, serum-free).

  serum_concentration:
    range: QuantityValue
    description: >-
      Concentration of serum in the medium.
    inlined: true

  supplements:
    range: MediumSupplement
    multivalued: true
    inlined_as_list: true
    description: >-
      List of supplements added to the culture medium.

  osmolality:
    range: QuantityValue
    description: >-
      Osmolality of the culture medium.
    inlined: true

  manufacturer:
    range: string
    description: >-
      Manufacturer of the product or reagent.

  lot_number:
    range: string
    description: >-
      Lot or batch number of the product.

  preparation_date:
    range: date
    description: >-
      Date when the medium or reagent was prepared.

  # ---------------------------------------------------------------------------
  # Medium Supplement Slots
  # ---------------------------------------------------------------------------

  supplement_type:
    range: SupplementTypeEnum
    description: >-
      Category of supplement (growth factor, antibiotic, hormone, etc.).

  concentration:
    range: QuantityValue
    description: >-
      Concentration of the supplement or reagent.
    inlined: true

  # ---------------------------------------------------------------------------
  # QuantityRange Slots
  # ---------------------------------------------------------------------------

  min_value:
    range: QuantityValue
    description: >-
      Minimum value in the range.
    inlined: true

  max_value:
    range: QuantityValue
    description: >-
      Maximum value in the range.
    inlined: true

  # ---------------------------------------------------------------------------
  # Legacy/Compatibility Slots (kept for backwards compatibility)
  # ---------------------------------------------------------------------------

  donor_info:
    description: >-
      Information about cell donor (e.g., healthy non-smoker, CF patient,
      age, anatomical region).
    range: string

  # ---------------------------------------------------------------------------
  # In Vivo Context Slots
  # ---------------------------------------------------------------------------

  participant:
    description: >-
      The study participant from whom the measurement was taken.
    range: NamedEntity
    inlined: true

  sample_type:
    description: >-
      Type of biological sample (e.g., urine, blood, sputum, nasal epithelium,
      exhaled breath condensate).
    range: SampleTypeEnum

  collection_site:
    description: >-
      Anatomical site of sample collection (e.g., inferior turbinate, bronchus).
    range: string

  collection_date:
    description: >-
      Date when the sample was collected.
    range: date

  subject_characteristics:
    description: >-
      Relevant subject characteristics (e.g., age, sex, disease state,
      medication use, smoking status).
    range: string

  # ---------------------------------------------------------------------------
  # QuantityValue Slots
  # ---------------------------------------------------------------------------

  value:
    description: >-
      The numeric value of the quantity.
    range: string

  unit:
    description: >-
      The unit of measurement.
    range: Unit
    inlined: true

# =============================================================================
# ENUMS
# =============================================================================

enums:

  StudyContextEnum:
    description: >-
      The experimental context for a protocol or measurement.
    permissible_values:
      in_vitro:
        description: Performed on cultured cells or tissues
      in_vivo:
        description: Performed on living human or animal subjects
      ex_vivo:
        description: Performed on tissue removed from an organism

  SampleTypeEnum:
    description: >-
      Types of biological samples for in vivo measurements.
    permissible_values:
      urine:
        description: Urine sample
      blood:
        description: Blood sample (whole blood, serum, or plasma)
      sputum:
        description: Induced or spontaneous sputum
      balf:
        description: Bronchoalveolar lavage fluid
      nasal_epithelium:
        description: Nasal epithelial sample
      bronchial_epithelium:
        description: Bronchial epithelial sample
      exhaled_breath_condensate:
        description: Exhaled breath condensate (EBC)
      biopsy:
        description: Tissue biopsy
      sweat:
        description: Sweat sample (e.g., for sweat chloride test)

  # ---------------------------------------------------------------------------
  # Cell Culture Enums
  # ---------------------------------------------------------------------------

  CellCultureGrowthModeEnum:
    description: >-
      Cell culture growth modes including traditional and advanced systems.
      Based on CLO cell culture growth mode terms.
    permissible_values:
      adherent:
        description: Cells grow attached to a surface
        meaning: CLO:0000028
      suspension:
        description: Cells grow suspended in culture medium
        meaning: CLO:0000029
      air_liquid_interface:
        description: Cells cultured at interface between air and liquid medium (ALI)
        meaning: OBI:0600047
      three_dimensional:
        description: Cells grown in 3D matrix or scaffold
      organoid:
        description: Self-organizing 3D tissue culture from stem cells
      spheroid:
        description: Spherical cellular aggregates formed by self-aggregation

  SubstrateTypeEnum:
    description: >-
      Types of cell culture substrates and surfaces.
      Includes traditional and advanced substrate materials.
    permissible_values:
      plastic:
        description: Standard tissue culture-treated plastic
        broad_mappings:
          - OBI:0000953
      collagen_coated:
        description: Collagen-coated surface for enhanced cell attachment
        related_mappings:
          - CHEBI:3815
        broad_mappings:
          - OBI:0100031
      matrigel:
        description: Basement membrane matrix (Matrigel/Geltrex)
        narrow_mappings:
          - OBI:0100031
        related_mappings:
          - GO:0005604
      fibronectin_coated:
        description: Fibronectin-coated surface
        related_mappings:
          - PR:000007245
        broad_mappings:
          - OBI:0100031
      laminin_coated:
        description: Laminin-coated surface
        related_mappings:
          - GO:0043256
        broad_mappings:
          - OBI:0100031
      transwell_insert:
        description: Permeable support for air-liquid interface culture
        exact_mappings:
          - OBI:0001950
      hydrogel:
        description: Three-dimensional hydrogel matrix
        exact_mappings:
          - CHEBI:17790
      glass:
        description: Glass surface or coverslip
        exact_mappings:
          - CHEBI:131189
      pdms:
        description: Polydimethylsiloxane (for microfluidics/organ-on-chip)
        broad_mappings:
          - CHEBI:46669

  ThreeDArchitectureEnum:
    description: >-
      Types of 3D cell culture architecture.
    permissible_values:
      spheroid:
        description: Spherical cellular aggregates formed by self-aggregation
      organoid:
        description: Self-organizing 3D tissue culture from stem cells
      scaffold_based:
        description: Cells grown on a 3D scaffold structure
      hydrogel_embedded:
        description: Cells embedded within a hydrogel matrix
      hanging_drop:
        description: 3D cultures formed by hanging drop method

  CoCultureConfigurationEnum:
    description: >-
      Physical configurations for co-culture systems.
    permissible_values:
      direct_contact:
        description: Cell types in direct physical contact
      transwell:
        description: Cell types separated by transwell insert membrane
      microfluidic:
        description: Cell types connected via microfluidic channels
      conditioned_medium:
        description: Cells grown in medium conditioned by another cell type
      mixed:
        description: Multiple cell types mixed together in culture

  SupplementTypeEnum:
    description: >-
      Categories of cell culture medium supplements and additives.
    permissible_values:
      growth_factor:
        description: Proteins that stimulate cell growth, proliferation, and differentiation
        meaning: CHEBI:23924
      antibiotic:
        description: Antimicrobial substances used to prevent bacterial contamination
        meaning: CHEBI:33281
      antifungal:
        description: Antifungal agents to prevent fungal contamination
        meaning: CHEBI:35718
      hormone:
        description: Signaling molecules that regulate cell physiology
        meaning: CHEBI:24621
      vitamin:
        description: Organic compounds essential for normal growth and nutrition
        meaning: CHEBI:33229
      amino_acid:
        description: Amino acid supplements
        meaning: CHEBI:33709
      lipid:
        description: Lipid supplements for cell membrane synthesis
        meaning: CHEBI:18059
      trace_element:
        description: Essential trace elements and minerals
      attachment_factor:
        description: Factors that promote cell attachment to substrate
      differentiation_factor:
        description: Factors that promote cell differentiation
