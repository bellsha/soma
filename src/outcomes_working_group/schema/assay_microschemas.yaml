name: assay_microschemas
description: >-
  Domain-specific Assay classes with named measurement slots for respiratory
  outcomes research. Each assay class extends the Assay base class and contains
  named slots for its specific measurements, organized by priority tier from
  user feedback.

  TIER 1 slots are critical for data discovery and comparison.
  TIER 2 slots are important but optional.
  TIER 3 slots are in Protocol class.
title: Assay Microschemas
id: https://w3id.org/EHS-Data-Standards/assay_microschemas

imports:
  - linkml:types
  - assay_base

prefixes:
  assay_microschemas: https://w3id.org/EHS-Data-Standards/assay_microschemas/
  linkml: https://w3id.org/linkml/
  assay_base: https://w3id.org/EHS-Data-Standards/assay_base/
  GO: http://purl.obolibrary.org/obo/GO_
  HP: http://purl.obolibrary.org/obo/HP_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  CL: http://purl.obolibrary.org/obo/CL_
  UO: http://purl.obolibrary.org/obo/UO_
  PR: http://purl.obolibrary.org/obo/PR_

default_prefix: assay_microschemas
default_range: string

# =============================================================================
# CLASSES - Domain-Specific Assay Classes
# =============================================================================

classes:

  # ---------------------------------------------------------------------------
  # CiliaryFunctionAssay
  # Informs on Key Event: Decreased ciliary function
  # ---------------------------------------------------------------------------

  CiliaryFunctionAssay:
    is_a: Assay
    mixins:
      - InVitroAssayMixin
      - InVivoAssayMixin
    annotations:
      supported_contexts: in_vitro_or_in_vivo
    description: >-
      Assay for measuring ciliary function including beat frequency, active area,
      cilia morphology, and ciliated cell populations. Informs on Key Event:
      "Decreased ciliary function" in respiratory AOPs.

      CONTEXT: Can be performed in vitro (tissue slices, 2D cell culture,
      spheroids) or in vivo (often using optical coherence tomography).

      TIER 1 slots (critical): beat_frequency_hz, active_area_percentage,
      cilia_length, cilia_per_cell, percentage_ciliated_cells, cell_type_ratios,
      imaging_protocol.
    slots:
      # TIER 1 - Critical (Rank 1) - Named measurement slots
      - beat_frequency_hz
      - active_area_percentage
      - cilia_length
      - cilia_per_cell
      - percentage_ciliated_cells
      - cell_type_ratios

      # TIER 2 - Important but optional (Rank 2)
      - ciliary_motion_patterns
      - ciliary_beat_amplitude

      # Assay-specific parameters
      - analysis_software
      - airway_region
    slot_usage:
      study_subject:
        range: StudySubject
        description: >-
          Can be ModelSystem (in vitro - ALI cultures, tissue slices, spheroids)
          or InVivoSubject (in vivo - OCT measurements)

  # ---------------------------------------------------------------------------
  # ASLAssay (Airway Surface Liquid)
  # Informs on Key Event: Decreased ASL height / Altered airway hydration
  # ---------------------------------------------------------------------------

  ASLAssay:
    is_a: Assay
    description: >-
      Assay for measuring airway surface liquid properties including ASL height,
      periciliary layer depth, and ion composition. Informs on Key Event:
      "Decreased ASL height" or "Altered airway hydration" in CF-related AOPs.

      TIER 1 slots (critical): asl_height_um, periciliary_layer_depth,
      imaging_protocol.
    slots:
      # TIER 1 - Critical (Rank 1) - Named measurement slots
      - asl_height_um
      - periciliary_layer_depth

      # TIER 2 - Optional on Assay (Rank 2)
      - mucus_layer_thickness

      # TIER 3 - Protocol level but kept for convenience
      - ion_composition
      - asl_ph

  # ---------------------------------------------------------------------------
  # MucociliaryClearanceAssay
  # Informs on Key Event: Impaired mucociliary clearance
  # ---------------------------------------------------------------------------

  MucociliaryClearanceAssay:
    is_a: Assay
    description: >-
      Assay for measuring mucociliary clearance and transport. Informs on
      Key Event: "Impaired mucociliary clearance" in respiratory AOPs.
      TIER 1 slots (critical): transport_rate, directionality.
    slots:
      # TIER 1 - Critical (Rank 1) - Named measurement slots
      - transport_rate
      - transport_directionality

      # TIER 2 - Important context (Rank 2)
      - mucus_layer_thickness
      - mucus_composition
      - percentage_active_transport
      - particle_clearance_time

  # ---------------------------------------------------------------------------
  # OxidativeStressAssay
  # Informs on Key Event: Increased oxidative stress (often MIE)
  # ---------------------------------------------------------------------------

  OxidativeStressAssay:
    is_a: Assay
    description: >-
      Assay for measuring oxidative stress markers. Informs on Key Event:
      "Increased oxidative stress" - often a Molecular Initiating Event (MIE)
      in respiratory toxicology AOPs.

      TIER 1 slots (critical): All surrogate markers for oxidative stress.
      Multiple detection methods expected - no single "best" for lung function.
    slots:
      # TIER 1 - Critical (Rank 1) - Named measurement slots
      - reactive_oxygen_species
      - ros_probe_type
      - lipid_peroxidation
      - malondialdehyde
      - four_hydroxynonenal
      - eight_isoprostane
      - protein_oxidation_markers
      - protein_carbonyl_content
      - nitrotyrosine
      - dna_damage_markers
      - eight_ohdg
      - antioxidant_capacity
      - glutathione_ratio
      - antioxidant_enzyme_activities
      - superoxide_dismutase_activity
      - catalase_activity
      - glutathione_peroxidase_activity
      - total_antioxidant_capacity
      - nrf2_activation

      # Detection method details (TIER 1 per feedback)
      - detection_method_details

      # Protocols
      - molecular_protocol
      - staining_protocol
    slot_usage:
      molecular_protocol:
        required: true

  # ---------------------------------------------------------------------------
  # CFTRFunctionAssay
  # Informs on Key Event: Decreased CFTR function
  # ---------------------------------------------------------------------------

  CFTRFunctionAssay:
    is_a: Assay
    description: >-
      Assay for measuring CFTR (Cystic Fibrosis Transmembrane Conductance
      Regulator) function. Informs on Key Event: "Decreased CFTR function"
      in cystic fibrosis-related AOPs.

      TIER 1 slots (critical): cell_culture_details is critical.
    slots:
      # TIER 1 - Critical (Rank 1) - Named measurement slots
      - cftr_chloride_secretion
      - cftr_forskolin_response
      - inhibitor_sensitive_current
      - cftr_specific_current
      - sweat_chloride_concentration
      - nasal_potential_difference

      # Assay-specific
      - stimulation_agent
      - inhibitor_used

  # ---------------------------------------------------------------------------
  # EGFRSignalingAssay
  # Informs on Key Event: EGFR activation
  # ---------------------------------------------------------------------------

  EGFRSignalingAssay:
    is_a: Assay
    description: >-
      Assay for measuring EGFR phosphorylation and downstream signaling.
      Informs on Key Event: "EGFR activation" in mucus hypersecretion AOPs.

      IMPORTANT: EGFR phosphorylation is the MOST SPECIFIC evidence for
      activation. Downstream kinase data alone is insufficient - needs
      phosphorylation measure OR inhibitor reversal for strong evidence.
      Cell type matters due to receptor location in ALI cultures.

      TIER 1 slots (critical): egfr_phosphorylation with site specification.
    slots:
      # TIER 1 - Critical (Rank 1) - Named measurement slots
      - egfr_phosphorylation_y1068
      - egfr_phosphorylation_y1173
      - total_egfr_protein

      # TIER 2 - Supporting evidence (Rank 2)
      - downstream_kinase_activation
      - erk_phosphorylation
      - akt_phosphorylation
      - pathway_biomarkers
      - egfr_ligand_expression
      - egfr_membrane_localization

      # Assay-specific
      - normalization_reference
      - phosphorylation_site

      # Protocols
      - molecular_protocol
      - staining_protocol
    slot_usage:
      molecular_protocol:
        required: true

  # ---------------------------------------------------------------------------
  # GobletCellAssay (combines GobletCellMeasurement + MucinProductionMeasurement)
  # Informs on Key Event: Goblet cell hyperplasia / Mucin hypersecretion
  # ---------------------------------------------------------------------------

  GobletCellAssay:
    is_a: Assay
    description: >-
      Assay for measuring goblet cell populations and mucin production.
      Informs on Key Event: "Goblet cell hyperplasia" or "Mucin hypersecretion".

      IMPORTANT per domain feedback: Need BOTH cell counts AND mucin secretion
      measurements - cells may stay same but secretion changes. AB-PAS staining
      common for visualizing goblet cells. Some secreted mucins not tethered
      to goblet cells.

      TIER 1 slots (critical): goblet_cell_count, staining_protocol,
      mucin_expression_level, mucin_protein_concentration.
    slots:
      # TIER 1 - Critical (Rank 1) - Named measurement slots
      - goblet_cell_count
      - goblet_cell_percentage
      - muc5ac_mrna_expression
      - muc5ac_protein_expression
      - muc5b_mrna_expression
      - muc5b_protein_expression
      - muc5ac_muc5b_ratio
      - mucin_protein_concentration
      - mucin_secretion_rate
      - percent_solids

      # TIER 2 - Optional (Rank 2)
      - goblet_to_ciliated_ratio
      - mucus_viscosity

  # ---------------------------------------------------------------------------
  # BALFSputumAssay (InVivo only)
  # Informs on Key Event: Airway inflammation
  # ---------------------------------------------------------------------------

  BALFSputumAssay:
    is_a: Assay
    mixins:
      - InVivoAssayMixin
    annotations:
      supported_contexts: in_vivo_only
    description: >-
      Assay for measuring bronchoalveolar lavage fluid (BALF) or sputum
      composition. Informs on Key Event: "Airway inflammation" and provides
      evidence for inflammatory cell populations and cytokine levels.

      This assay is IN VIVO ONLY - requires samples from human or animal subjects.
    slots:
      # Inflammatory cell percentages
      - neutrophil_percentage
      - eosinophil_percentage
      - macrophage_percentage
      - lymphocyte_percentage
      - total_cell_count

      # Cytokine concentrations
      - il6_concentration
      - il8_concentration
      - tnf_alpha_concentration
      - il1_beta_concentration

      # Other markers
      - total_protein_concentration
      - alpha_diversity
      - beta_diversity
      - bacterial_load
      - cell_free_dna

      # Protocol
      - molecular_protocol
    slot_usage:
      study_subject:
        range: InVivoSubject
      molecular_protocol:
        required: true

  # ---------------------------------------------------------------------------
  # LungFunctionAssay (InVivo only)
  # Informs on Adverse Outcome: Decreased lung function
  # ---------------------------------------------------------------------------

  LungFunctionAssay:
    is_a: Assay
    mixins:
      - InVivoAssayMixin
    annotations:
      supported_contexts: in_vivo_only
    description: >-
      Clinical assay for measuring lung function. Informs on Adverse Outcome:
      "Decreased lung function" - the composite clinical outcome.

      IMPORTANT per domain feedback:
      - Subject characteristics (sex, species, age, height) are critical -
        often reported as % of predicted baseline
      - Reference dataset (GLI-2012 for humans) is essential for interpretation
      - Hemoglobin levels pair with DLCO measurements
      - Recent respiratory illness affects spirometry results

      TIER 1 slots (critical): fev1, fvc, subject_characteristics, reference_dataset.
      This assay is IN VIVO ONLY.
    slots:
      # TIER 1 - Critical (Rank 1) - Named measurement slots
      - fev1
      - fvc
      - reference_dataset

      # TIER 2 - Important clinical context (Rank 2)
      - fev1_fvc_ratio
      - feno
      - decline_rate
      - bronchodilator_response
      - dlco
      - hemoglobin_level
      - recent_respiratory_illness
      - peak_expiratory_flow

      # TIER 3 - Specialized tests (often in Protocol)
      - fef25_75
      - total_lung_capacity
      - functional_residual_capacity
      - residual_volume
      - lung_compliance
      - lung_elastance
      - lung_resistance

      # Protocol
      - spirometry_protocol
    slot_usage:
      study_subject:
        range: InVivoSubject
      spirometry_protocol:
        required: true

  # ---------------------------------------------------------------------------
  # FoxJExpressionAssay (InVitro focus)
  # Informs on Key Event: Altered ciliogenesis
  # ---------------------------------------------------------------------------

  FoxJExpressionAssay:
    is_a: Assay
    mixins:
      - InVitroAssayMixin
    annotations:
      supported_contexts: in_vitro_only
    description: >-
      Assay for measuring FoxJ1 expression related to ciliogenesis.
      Informs on Key Event: "Altered ciliogenesis" in respiratory AOPs.
      FoxJ1 is a master transcription factor for motile cilia.

      This assay is primarily IN VITRO focused.
    slots:
      # Named measurement slots
      - foxj1_mrna_expression
      - foxj1_protein_expression
      - foxj1_positive_cell_percentage
      - foxj1_nuclear_localization

      # Protocols
      - molecular_protocol
      - staining_protocol
    slot_usage:
      molecular_protocol:
        required: true

  # ---------------------------------------------------------------------------
  # GeneExpressionAssay (renamed from TranscriptionFactorExpressionMeasurement)
  # Generic assay for gene/protein expression measurements
  # ---------------------------------------------------------------------------

  GeneExpressionAssay:
    is_a: Assay
    mixins:
      - InVitroAssayMixin
    annotations:
      supported_contexts: in_vitro_only
    description: >-
      General assay for gene expression measurements. Renamed from
      TranscriptionFactorExpressionMeasurement per domain feedback -
      gene expression is more commonly the primary output.
    slots:
      # Named measurement slots
      - target_gene
      - mrna_level
      - protein_level
      - percentage_positive_cells
      - gene_expression_method
      - normalization_reference

      # Protocol
      - molecular_protocol
    slot_usage:
      molecular_protocol:
        required: true

# =============================================================================
# SLOTS - Named Measurement Slots for Each Assay
# =============================================================================

slots:

  # ---------------------------------------------------------------------------
  # CiliaryFunctionAssay Named Slots (TIER 1)
  # ---------------------------------------------------------------------------

  beat_frequency_hz:
    description: >-
      Ciliary beat frequency measured in Hz. TIER 1 - critical for
      assessing ciliary function.
    range: QuantityValue
    inlined: true

  active_area_percentage:
    description: >-
      Percentage of epithelial surface with actively beating cilia.
      TIER 1 - critical for assessing ciliary coverage.
    range: QuantityValue
    inlined: true

  cilia_length:
    description: >-
      Length of cilia measured in micrometers. TIER 1 - morphological
      assessment of cilia.
    range: QuantityValue
    inlined: true

  cilia_per_cell:
    description: >-
      Number of cilia per ciliated cell. TIER 1.
    range: QuantityValue
    inlined: true

  percentage_ciliated_cells:
    description: >-
      Percentage of cells that are ciliated. TIER 1 - critical for
      understanding ciliated cell populations.
    range: QuantityValue
    inlined: true

  imaging_protocol:
    description: >-
      Reference to the imaging protocol used. TIER 1 for CBF, ASL assays.
    range: ImagingProtocol
    inlined: true

  ciliary_motion_patterns:
    description: >-
      Patterns of ciliary motion (coordinated, dyskinetic, immotile).
      TIER 2 - supporting information.
    range: CiliaryMotionPatternEnum

  ciliary_beat_amplitude:
    description: >-
      Amplitude of ciliary beat. TIER 2.
    range: QuantityValue
    inlined: true

  analysis_software:
    description: Software used for analysis (e.g., SAVA, Cilia FA).
    range: string

  airway_region:
    description: Region of airway from which cells originated.
    range: string

  # ---------------------------------------------------------------------------
  # ASLAssay Named Slots (TIER 1)
  # ---------------------------------------------------------------------------

  asl_height_um:
    description: >-
      Airway surface liquid height in micrometers. TIER 1 - primary
      measurement for ASL assays.
    range: QuantityValue
    inlined: true

  periciliary_layer_depth:
    description: >-
      Depth of the periciliary layer in micrometers. TIER 1 - helps
      give confidence to the outcome.
    range: QuantityValue
    inlined: true

  mucus_layer_thickness:
    description: >-
      Thickness of the mucus gel layer in micrometers. TIER 2.
    range: QuantityValue
    inlined: true

  ion_composition:
    description: >-
      Ionic composition (Cl-, Na+, K+). TIER 3 - not critical for
      comparison but relevant for mechanism.
    range: string

  asl_ph:
    description: pH of airway surface liquid. TIER 3.
    range: QuantityValue
    inlined: true

  # ---------------------------------------------------------------------------
  # MucociliaryClearanceAssay Named Slots (TIER 1)
  # ---------------------------------------------------------------------------

  transport_rate:
    description: >-
      Mucociliary transport rate. TIER 1 - primary outcome measure
      for MCC assays.
    range: QuantityValue
    inlined: true

  transport_directionality:
    description: >-
      Directionality of mucociliary transport. TIER 1.
    range: DirectionalityEnum

  percentage_active_transport:
    description: >-
      Percentage of area showing active transport. TIER 2.
    range: QuantityValue
    inlined: true

  particle_clearance_time:
    description: >-
      Time for particle clearance. TIER 2.
    range: QuantityValue
    inlined: true

  mucus_composition:
    description: >-
      Composition of mucus. TIER 2 per feedback.
    range: string

  # ---------------------------------------------------------------------------
  # OxidativeStressAssay Named Slots (TIER 1 - all surrogate markers)
  # ---------------------------------------------------------------------------

  reactive_oxygen_species:
    description: >-
      ROS level as fold change or fluorescence intensity. TIER 1.
    range: QuantityValue
    inlined: true

  ros_probe_type:
    description: >-
      Type of ROS probe used (DCFDA, DHE, MitoSOX, etc.). TIER 1 -
      varies by method.
    range: string

  lipid_peroxidation:
    description: >-
      Lipid peroxidation level. TIER 1 - surrogate marker for OS.
    range: QuantityValue
    inlined: true

  malondialdehyde:
    description: >-
      MDA level - lipid peroxidation marker. TIER 1.
    range: QuantityValue
    inlined: true

  four_hydroxynonenal:
    description: >-
      4-HNE level - lipid peroxidation marker. TIER 1.
    range: QuantityValue
    inlined: true

  eight_isoprostane:
    description: >-
      8-isoprostane level. TIER 1.
    range: QuantityValue
    inlined: true

  protein_oxidation_markers:
    description: >-
      Protein oxidation markers (carbonyls, nitrotyrosine). TIER 1.
    range: string
    multivalued: true

  protein_carbonyl_content:
    description: Protein carbonyl content. TIER 1.
    range: QuantityValue
    inlined: true

  nitrotyrosine:
    description: Nitrotyrosine level. TIER 1.
    range: QuantityValue
    inlined: true

  dna_damage_markers:
    description: >-
      DNA damage markers (8-OHdG). TIER 1 - surrogate for OS.
    range: QuantityValue
    inlined: true

  eight_ohdg:
    description: 8-OHdG level (DNA oxidation marker). TIER 1.
    range: QuantityValue
    inlined: true

  antioxidant_capacity:
    description: >-
      Total antioxidant capacity or GSH/GSSG ratio. TIER 1.
    range: QuantityValue
    inlined: true

  glutathione_ratio:
    description: >-
      GSH/GSSG ratio indicating antioxidant status. TIER 1.
    range: QuantityValue
    inlined: true

  antioxidant_enzyme_activities:
    description: >-
      Antioxidant enzyme activities (SOD, catalase, GPx). TIER 1.
    range: string

  superoxide_dismutase_activity:
    description: SOD activity. TIER 1.
    range: QuantityValue
    inlined: true

  catalase_activity:
    description: Catalase activity. TIER 1.
    range: QuantityValue
    inlined: true

  glutathione_peroxidase_activity:
    description: GPx activity. TIER 1.
    range: QuantityValue
    inlined: true

  total_antioxidant_capacity:
    description: Total antioxidant capacity. TIER 1.
    range: QuantityValue
    inlined: true

  nrf2_activation:
    description: Nrf2 activation level. TIER 1.
    range: QuantityValue
    inlined: true

  detection_method_details:
    description: >-
      Detection method details. TIER 1 per feedback - expected to
      have multiple detection methods.
    range: string
    multivalued: true

  # ---------------------------------------------------------------------------
  # CFTRFunctionAssay Named Slots
  # ---------------------------------------------------------------------------

  cftr_chloride_secretion:
    description: >-
      CFTR-mediated chloride secretion in uA/cm2.
    range: QuantityValue
    inlined: true

  cftr_forskolin_response:
    description: Forskolin-stimulated CFTR response.
    range: QuantityValue
    inlined: true

  inhibitor_sensitive_current:
    description: Inhibitor-sensitive current measurement.
    range: QuantityValue
    inlined: true

  cftr_specific_current:
    description: CFTR-specific chloride secretory current.
    range: QuantityValue
    inlined: true

  sweat_chloride_concentration:
    description: >-
      Sweat chloride concentration in mEq/L (CF diagnostic).
    range: QuantityValue
    inlined: true

  nasal_potential_difference:
    description: Nasal potential difference in mV.
    range: QuantityValue
    inlined: true

  stimulation_agent:
    description: Stimulation agent used (e.g., forskolin concentration).
    range: string

  inhibitor_used:
    description: Inhibitor used (e.g., CFTRinh-172).
    range: string

  # ---------------------------------------------------------------------------
  # EGFRSignalingAssay Named Slots
  # ---------------------------------------------------------------------------

  egfr_phosphorylation_y1068:
    description: >-
      EGFR phosphorylation at Y1068 residue (fold change). TIER 1 -
      MOST SPECIFIC evidence for EGFR activation.
    range: QuantityValue
    inlined: true

  egfr_phosphorylation_y1173:
    description: >-
      EGFR phosphorylation at Y1173 residue (fold change). TIER 1.
    range: QuantityValue
    inlined: true

  total_egfr_protein:
    description: >-
      Total EGFR protein level (loading control). TIER 1.
    range: QuantityValue
    inlined: true

  downstream_kinase_activation:
    description: >-
      Activation levels of downstream kinases. TIER 2 - not specific
      to EGFR alone without phosphorylation data.
    range: string

  erk_phosphorylation:
    description: ERK phosphorylation level. TIER 2.
    range: QuantityValue
    inlined: true

  akt_phosphorylation:
    description: AKT phosphorylation level. TIER 2.
    range: QuantityValue
    inlined: true

  pathway_biomarkers:
    description: >-
      Pathway-specific biomarker signatures. TIER 2 - relationship
      to outcome needs further investigation.
    range: string
    multivalued: true

  egfr_ligand_expression:
    description: Expression of EGFR ligands (EGF, TGF-alpha, amphiregulin).
    range: QuantityValue
    inlined: true

  egfr_membrane_localization:
    description: EGFR membrane localization percentage.
    range: QuantityValue
    inlined: true

  normalization_reference:
    description: >-
      Normalization reference (beta-actin, GAPDH, total EGFR).
    range: string

  phosphorylation_site:
    description: >-
      Specific phosphorylation site being measured.
    range: string

  # ---------------------------------------------------------------------------
  # GobletCellAssay Named Slots
  # ---------------------------------------------------------------------------

  goblet_cell_count:
    description: >-
      Number of goblet cells (raw count). TIER 1 - want both raw
      and relative information.
    range: QuantityValue
    inlined: true

  goblet_cell_percentage:
    description: Percentage of goblet cells. TIER 1.
    range: QuantityValue
    inlined: true

  staining_protocol:
    description: >-
      Reference to staining protocol (AB-PAS, immunochem). TIER 1.
    range: StainingProtocol
    inlined: true

  muc5ac_mrna_expression:
    description: MUC5AC mRNA expression level (fold change). TIER 1.
    range: QuantityValue
    inlined: true

  muc5ac_protein_expression:
    description: MUC5AC protein expression level. TIER 1.
    range: QuantityValue
    inlined: true

  muc5b_mrna_expression:
    description: MUC5B mRNA expression level (fold change). TIER 1.
    range: QuantityValue
    inlined: true

  muc5b_protein_expression:
    description: MUC5B protein expression level. TIER 1.
    range: QuantityValue
    inlined: true

  muc5ac_muc5b_ratio:
    description: >-
      MUC5AC to MUC5B ratio. TIER 1 - important for disease state.
    range: QuantityValue
    inlined: true

  mucin_protein_concentration:
    description: >-
      Total mucin protein concentration. TIER 1 - want both direct
      and comparative measures.
    range: QuantityValue
    inlined: true

  mucin_secretion_rate:
    description: Mucin secretion rate. TIER 1.
    range: QuantityValue
    inlined: true

  percent_solids:
    description: >-
      Percent solids in apical secretion (overall secretion). TIER 1.
    range: QuantityValue
    inlined: true

  goblet_to_ciliated_ratio:
    description: >-
      Ratio of goblet cells to ciliated cells. TIER 2 - related to
      transdifferentiation but not critical for outcome.
    range: QuantityValue
    inlined: true

  mucus_viscosity:
    description: Mucus viscosity in centipoise. TIER 2.
    range: QuantityValue
    inlined: true

  # ---------------------------------------------------------------------------
  # BALFSputumAssay Named Slots
  # ---------------------------------------------------------------------------

  neutrophil_percentage:
    description: Neutrophil percentage in BALF/sputum.
    range: QuantityValue
    inlined: true

  eosinophil_percentage:
    description: Eosinophil percentage in BALF/sputum.
    range: QuantityValue
    inlined: true

  macrophage_percentage:
    description: Macrophage percentage in BALF/sputum.
    range: QuantityValue
    inlined: true

  lymphocyte_percentage:
    description: Lymphocyte percentage in BALF/sputum.
    range: QuantityValue
    inlined: true

  total_cell_count:
    description: Total cell count in BALF/sputum.
    range: QuantityValue
    inlined: true

  il6_concentration:
    description: IL-6 concentration.
    range: QuantityValue
    inlined: true

  il8_concentration:
    description: IL-8 concentration.
    range: QuantityValue
    inlined: true

  tnf_alpha_concentration:
    description: TNF-alpha concentration.
    range: QuantityValue
    inlined: true

  il1_beta_concentration:
    description: IL-1 beta concentration.
    range: QuantityValue
    inlined: true

  total_protein_concentration:
    description: Total protein concentration.
    range: QuantityValue
    inlined: true

  alpha_diversity:
    description: Alpha diversity (microbiome).
    range: QuantityValue
    inlined: true

  beta_diversity:
    description: Beta diversity (microbiome).
    range: QuantityValue
    inlined: true

  bacterial_load:
    description: Bacterial load (16S copies or CFU).
    range: QuantityValue
    inlined: true

  cell_free_dna:
    description: Cell-free DNA concentration.
    range: QuantityValue
    inlined: true

  # ---------------------------------------------------------------------------
  # LungFunctionAssay Named Slots
  # ---------------------------------------------------------------------------

  fev1:
    description: >-
      Forced expiratory volume in 1 second. TIER 1 - primary
      spirometry measurement.
    range: QuantityValue
    inlined: true

  fvc:
    description: >-
      Forced vital capacity. TIER 1 - primary spirometry measurement.
    range: QuantityValue
    inlined: true

  reference_dataset:
    description: >-
      Reference dataset for interpretation (GLI-2012 for humans).
      TIER 1 - essential for interpretation.
    range: string

  fev1_fvc_ratio:
    description: >-
      Ratio of FEV1 to FVC (Tiffeneau-Pinelli index). TIER 2 -
      can be calculated from FEV1 and FVC.
    range: QuantityValue
    inlined: true

  feno:
    description: >-
      Fractional exhaled nitric oxide in ppb. TIER 2 - marker
      for airway inflammation.
    range: QuantityValue
    inlined: true

  decline_rate:
    description: >-
      Longitudinal decline rate in mL/year. TIER 2 - useful for
      pre/post comparisons.
    range: QuantityValue
    inlined: true

  bronchodilator_response:
    description: >-
      Response to bronchodilator (% change in FEV1). TIER 2 -
      informs reversibility.
    range: QuantityValue
    inlined: true

  dlco:
    description: >-
      Diffusing capacity for carbon monoxide. TIER 2 - measure
      of fibrosis, needs hemoglobin level.
    range: QuantityValue
    inlined: true

  hemoglobin_level:
    description: >-
      Hemoglobin level. TIER 2 - pairs with DLCO.
    range: QuantityValue
    inlined: true

  recent_respiratory_illness:
    description: >-
      Recent respiratory illness (affects spirometry). TIER 2.
    range: string

  peak_expiratory_flow:
    description: Peak expiratory flow. TIER 2.
    range: QuantityValue
    inlined: true

  fef25_75:
    description: >-
      Forced expiratory flow 25-75%. TIER 3 - more variable
      than FEV1, FVC.
    range: QuantityValue
    inlined: true

  total_lung_capacity:
    description: >-
      Total lung capacity. TIER 3 - requires more equipment.
    range: QuantityValue
    inlined: true

  functional_residual_capacity:
    description: >-
      Functional residual capacity. TIER 3 - requires more equipment.
    range: QuantityValue
    inlined: true

  residual_volume:
    description: >-
      Residual volume. TIER 3 - requires more equipment.
    range: QuantityValue
    inlined: true

  lung_compliance:
    description: >-
      Lung compliance. TIER 3 - most often reported for animals,
      difficult to relate to human exposure.
    range: QuantityValue
    inlined: true

  lung_elastance:
    description: >-
      Lung elastance. TIER 3 - most often reported for animals.
    range: QuantityValue
    inlined: true

  lung_resistance:
    description: >-
      Lung resistance. TIER 3 - most often reported for animals.
    range: QuantityValue
    inlined: true

