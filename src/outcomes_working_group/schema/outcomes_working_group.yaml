name: outcomes_working_group
description: >-
  A LinkML data model for representing biological measurements, assays,
  and experimental protocols in the context of outcomes research.
  This is the main entry point that imports the measurement base schema
  and domain-specific microschemas.
title: Outcomes Working Group Schema
see_also:
  - https://EHS-Data-Standards.github.io/outcomes-working-group
id: https://w3id.org/EHS-Data-Standards/outcomes_working_group

imports:
  - linkml:types
  - measurement_base
  - measurement_microschemas

license: MIT

prefixes:
  outcomes_working_group: https://w3id.org/EHS-Data-Standards/outcomes_working_group/
  measurement_base: https://w3id.org/EHS-Data-Standards/measurement_base/
  measurement_microschemas: https://w3id.org/EHS-Data-Standards/measurement_microschemas/
  linkml: https://w3id.org/linkml/
  biolink: https://w3id.org/biolink/
  OBI: http://purl.obolibrary.org/obo/OBI_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PATO: http://purl.obolibrary.org/obo/PATO_
  UO: http://purl.obolibrary.org/obo/UO_
  GO: http://purl.obolibrary.org/obo/GO_
  CL: http://purl.obolibrary.org/obo/CL_
  HP: http://purl.obolibrary.org/obo/HP_
  schema: http://schema.org/

default_prefix: outcomes_working_group
default_range: string

# =============================================================================
# CLASSES
# =============================================================================

classes:

  Container:
    tree_root: true
    description: >-
      A container for collections of measurements and related entities.
      Used as the root class for data validation.
    slots:
      # Measurement collections by domain
      - ciliary_measurements
      - asl_measurements
      - mcc_measurements
      - oxidative_stress_measurements
      - cftr_measurements
      - egfr_phosphorylation_measurements
      - goblet_cell_mucin_measurements
      - balf_sputum_measurements
      - lung_function_measurements
      - foxj_measurements
      # Supporting entities
      - protocols
      - methods
      - assays

# =============================================================================
# SLOTS
# =============================================================================

slots:

  # ---------------------------------------------------------------------------
  # Measurement Collection Slots
  # ---------------------------------------------------------------------------

  ciliary_measurements:
    range: CiliaryFunctionMeasurement
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of ciliary function measurements.

  asl_measurements:
    range: ASLMeasurement
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of airway surface liquid measurements.

  mcc_measurements:
    range: MCCMeasurement
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of mucociliary clearance measurements.

  oxidative_stress_measurements:
    range: OxidativeStressMeasurement
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of oxidative stress measurements.

  cftr_measurements:
    range: CFTRMeasurement
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of CFTR function measurements.

  egfr_phosphorylation_measurements:
    range: EGFRPhosphorylationMeasurement
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of EGFR signaling measurements.

  goblet_cell_mucin_measurements:
    range: GobletCellMucinMeasurement
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of goblet cell and mucin measurements.

  balf_sputum_measurements:
    range: BALFSputumMeasurement
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of BALF and sputum measurements.

  lung_function_measurements:
    range: LungFunctionMeasurement
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of lung function measurements.

  foxj_measurements:
    range: FoxJMeasurement
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of FoxJ1/ciliogenesis measurements.


  # ---------------------------------------------------------------------------
  # Supporting Entity Collection Slots
  # ---------------------------------------------------------------------------

  protocols:
    range: Protocol
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of protocols.

  methods:
    range: Method
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of methods.

  assays:
    range: Assay
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of assays.
