  # =============================================================================
  # Synthetic Population Slots
  # Geographic identifiers and population-related attributes
  # =============================================================================

  # Geographic identifier slots
  federal_information_processing_standard_code:
    aliases:
      - fips_code
    description: >-
      Federal Information Processing Standard (FIPS) code, a unique numeric identifier
      assigned to geographic areas like states and counties within the United States,
      used primarily by the Census Bureau to identify locations when analyzing population data.
    range: string
    exact_mappings:
      - wikidata:Q917824

  state_federal_information_processing_standard_code:
    aliases:
      - state_fips_code
    is_a: federal_information_processing_standard_code
    description: >-
      State-level Federal Information Processing Standard (FIPS) code.
      A two-digit code uniquely identifying each U.S. state and territory.
    range: string
    exact_mappings:
      - wikidata:Q5440257

  county_federal_information_processing_standard_code:
    aliases:
      - county_fips_code
    is_a: federal_information_processing_standard_code
    description: >-
      County-level Federal Information Processing Standard (FIPS) code.
      A three-digit code uniquely identifying a county within a state.
    range: string
    exact_mappings:
      - wikidata:P882

  census_tract_federal_information_processing_standard_code:
    aliases:
      - tract_fips_code
    is_a: federal_information_processing_standard_code
    description: >-
      Census tract-level Federal Information Processing Standard (FIPS) code.
      Identifies a specific census tract within a county.
    range: string

  block_group_federal_information_processing_standard_code:
    aliases:
      - block_group_fips_code
    is_a: federal_information_processing_standard_code
    description: >-
      Block group-level Federal Information Processing Standard (FIPS) code.
      Identifies a specific block group within a census tract.
    range: string

  # State slots
  abbreviation:
    description: >-
      Standard two-letter abbreviation for a U.S. state or territory.
    range: string

  # Geographic hierarchy collection slots
  counties:
    range: County
    multivalued: true
    inlined_as_list: true
    description: >-
      Counties within a state or geographic region.

  public_use_microdata_areas:
    aliases:
      - pumas
    range: PublicUseMicrodataArea
    multivalued: true
    inlined_as_list: true
    description: >-
      Public Use Microdata Areas (PUMAs) within a state.
      PUMAs are non-overlapping statistical geographic areas containing
      no fewer than 100,000 people each.

  census_tracts:
    aliases:
      - tracts
    range: CensusTract
    multivalued: true
    inlined_as_list: true
    description: >-
      Census tracts within a county.

  block_groups:
    range: BlockGroup
    multivalued: true
    inlined_as_list: true
    description: >-
      Block groups within a census tract.

  households:
    range: Household
    multivalued: true
    inlined_as_list: true
    description: >-
      Households within a block group or geographic area.

  # Household slots
  serial_number:
    aliases:
      - serialno
    description: >-
      Serial number linking to the original PUMS (Public Use Microdata Sample) record.
      Used to connect synthetic population records to source census microdata.
    range: string

  household_identifier:
    aliases:
      - hh_id
    description: >-
      Unique identifier for a household within the synthetic population.
    range: string
    identifier: true

  household_head_age:
    aliases:
      - hh_age
    description: >-
      Age of the household head (householder) in years.
      Used as one of the four matching variables in synthetic population generation.
    range: integer

  household_income:
    aliases:
      - hh_income
    description: >-
      Annual household income in dollars.
      Used as one of the four matching variables in synthetic population generation.
    range: float

  household_head_race:
    aliases:
      - hh_race
    description: >-
      Race category of the household head.
      Used as one of the four matching variables in synthetic population generation.
    range: string

  household_size:
    aliases:
      - size
    description: >-
      Number of persons in the household.
      Used as one of the four matching variables in synthetic population generation.
    range: integer

  household_persons:
    aliases:
      - persons
    range: Person
    multivalued: true
    inlined_as_list: true
    description: >-
      Persons (individuals) within the household.

  # Person slots
  assigned_school:
    aliases:
      - school
    range: School
    description: >-
      School assigned to a person for modeling purposes.
      Assignment is based on school/grade capacity and proximity.

  person_order:
    aliases:
      - sporder
    description: >-
      Person's order within the household, starting from 1.
      The householder is typically person 1.
    range: integer

  relationship_to_household_head:
    aliases:
      - relp
    description: >-
      Relationship of the person to the household head (householder).
      Values: 1=Householder, 2=Spouse, 3=Child, 4=Other relative,
      5=Nonrelative, 6=Foster child, 7=Foster parent, 8=Other nonrelative.
    range: RelationshipToHouseholdHeadEnum

  race:
    aliases:
      - rac1p
    description: >-
      Race of the person. Derived from census race categories.
    range: string

