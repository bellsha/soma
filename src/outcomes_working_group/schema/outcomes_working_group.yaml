name: outcomes_working_group
description: >-
  A LinkML data model for representing biological assays, measurements,
  and experimental protocols in the context of outcomes research. The schema
  is centered around ASSAYS that inform on Key Events in Adverse Outcome
  Pathways (AOPs), with named slots for specific measurements.

  This is the main entry point that imports the AOP framework, assay base
  schema, and domain-specific assay microschemas.
title: Outcomes Working Group Schema
see_also:
  - https://EHS-Data-Standards.github.io/outcomes-working-group
id: https://w3id.org/EHS-Data-Standards/outcomes_working_group

imports:
  - linkml:types
  - aop_framework
  - assay_base
  - assay_microschemas

license: MIT

prefixes:
  outcomes_working_group: https://w3id.org/EHS-Data-Standards/outcomes_working_group/
  aop_framework: https://w3id.org/EHS-Data-Standards/aop_framework/
  assay_base: https://w3id.org/EHS-Data-Standards/assay_base/
  assay_microschemas: https://w3id.org/EHS-Data-Standards/assay_microschemas/
  linkml: https://w3id.org/linkml/
  biolink: https://w3id.org/biolink/
  OBI: http://purl.obolibrary.org/obo/OBI_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PATO: http://purl.obolibrary.org/obo/PATO_
  UO: http://purl.obolibrary.org/obo/UO_
  GO: http://purl.obolibrary.org/obo/GO_
  CL: http://purl.obolibrary.org/obo/CL_
  UBERON: http://purl.obolibrary.org/obo/UBERON_
  HP: http://purl.obolibrary.org/obo/HP_
  ECTO: http://purl.obolibrary.org/obo/ECTO_
  schema: http://schema.org/

default_prefix: outcomes_working_group
default_range: string

# =============================================================================
# CLASSES
# =============================================================================

classes:

  Container:
    tree_root: true
    description: >-
      Root container for outcomes research data. Organized around ASSAYS
      that inform on Key Events in Adverse Outcome Pathways (AOPs).

      The schema is assay-centric: each assay class contains named slots
      for its specific measurements, with an explicit connection to the
      Key Event it informs via the informs_on_key_event slot.
    slots:
      # AOP Framework Collections
      - key_events
      - adverse_outcome_pathways

      # Domain-specific Assay Collections (renamed from *_measurements)
      - ciliary_function_assays
      - asl_assays
      - mcc_assays
      - oxidative_stress_assays
      - cftr_assays
      - egfr_signaling_assays
      - goblet_cell_assays
      - balf_sputum_assays
      - lung_function_assays
      - foxj_assays
      - gene_expression_assays

      # Supporting entities
      - protocols
      - methods

# =============================================================================
# SLOTS
# =============================================================================

slots:

  # ---------------------------------------------------------------------------
  # AOP Framework Collection Slots
  # ---------------------------------------------------------------------------

  adverse_outcome_pathways:
    range: AdverseOutcomePathway
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of Adverse Outcome Pathways. AOPs describe sequences
      of causally linked events from molecular initiating events to
      adverse outcomes.

  # ---------------------------------------------------------------------------
  # Assay Collection Slots (renamed from measurement collections)
  # ---------------------------------------------------------------------------

  ciliary_function_assays:
    range: CiliaryFunctionAssay
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of ciliary function assays. Informs on Key Event:
      "Decreased ciliary function". Contains named slots for beat
      frequency, active area, cilia length, etc.

  asl_assays:
    range: ASLAssay
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of airway surface liquid assays. Informs on Key Event:
      "Decreased ASL height" or "Altered airway hydration".

  mcc_assays:
    range: MucociliaryClearanceAssay
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of mucociliary clearance assays. Informs on Key Event:
      "Impaired mucociliary clearance".

  oxidative_stress_assays:
    range: OxidativeStressAssay
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of oxidative stress assays. Informs on Key Event:
      "Increased oxidative stress" - often a Molecular Initiating Event.

  cftr_assays:
    range: CFTRFunctionAssay
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of CFTR function assays. Informs on Key Event:
      "Decreased CFTR function".

  egfr_signaling_assays:
    range: EGFRSignalingAssay
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of EGFR signaling assays. Informs on Key Event:
      "EGFR activation". Note: EGFR phosphorylation is the most
      specific evidence for activation.

  goblet_cell_assays:
    range: GobletCellAssay
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of goblet cell and mucin assays. Informs on Key Event:
      "Goblet cell hyperplasia" or "Mucin hypersecretion". Combined
      from previous GobletCellMeasurement and MucinProductionMeasurement.

  balf_sputum_assays:
    range: BALFSputumAssay
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of BALF and sputum assays. In vivo only. Informs on
      Key Event: "Airway inflammation".

  lung_function_assays:
    range: LungFunctionAssay
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of lung function assays. In vivo only. Informs on
      Adverse Outcome: "Decreased lung function" - the composite
      clinical outcome.

  foxj_assays:
    range: FoxJExpressionAssay
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of FoxJ1/ciliogenesis assays. Informs on Key Event:
      "Altered ciliogenesis".

  gene_expression_assays:
    range: GeneExpressionAssay
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of gene expression assays. Generic assay for
      gene/protein expression measurements.

  # ---------------------------------------------------------------------------
  # Supporting Entity Collection Slots
  # ---------------------------------------------------------------------------

  protocols:
    range: Protocol
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of protocols. Contains Tier 2/3 procedural details
      important for reproducibility.

  methods:
    range: Method
    multivalued: true
    inlined_as_list: true
    description: >-
      Collection of methods. Methods describe general approaches or
      techniques used to perform assays.

