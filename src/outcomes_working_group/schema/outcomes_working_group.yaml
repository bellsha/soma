name: outcomes_working_group
description: >-
  A LinkML data model for representing biological measurements, assays,
  and experimental protocols in the context of outcomes research.
title: Outcome Measurement Data Model
see_also:
- https://EHS-Data-Standards.github.io/outcomes-working-group
id: https://w3id.org/EHS-Data-Standards/outcomes_working_group
imports:
- linkml:types
license: MIT

prefixes:
  owg: https://w3id.org/diatomsRcool/exposome-schema/
  linkml: https://w3id.org/linkml/
  biolink: https://w3id.org/biolink/vocab/
  schema: http://schema.org/

  # 14 Required Ontologies
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  FOODON: http://purl.obolibrary.org/obo/FOODON_
  CL: http://purl.obolibrary.org/obo/CL_
  HP: http://purl.obolibrary.org/obo/HP_
  UPHENO: http://purl.obolibrary.org/obo/UPHENO_
  UBERON: http://purl.obolibrary.org/obo/UBERON_
  MONDO: http://purl.obolibrary.org/obo/MONDO_
  MP: http://purl.obolibrary.org/obo/MP_
  ZP: http://purl.obolibrary.org/obo/ZP_
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  ECTO: http://purl.obolibrary.org/obo/ECTO_
  EFO: http://identifiers.org/efo/
  chear: http://hadatac.org/ont/chear#
  HHEAR: http://hadatac.org/ont/hhear#

  # Supporting OBO ontologies
  PATO: http://purl.obolibrary.org/obo/PATO_
  RO: http://purl.obolibrary.org/obo/RO_
  UO: http://purl.obolibrary.org/obo/UO_
  NCIT: http://purl.obolibrary.org/obo/NCIT_
  OBI: http://purl.obolibrary.org/obo/OBI_
  GO: http://purl.obolibrary.org/obo/GO_
  PR: http://purl.obolibrary.org/obo/PR_
  fhir: http://hl7.org/fhir/
  qudt: http://qudt.org/vocab/unit/
  UCUM: http://unitsofmeasure.org/

  # 12 Data Repository Prefixes
  DTXSID: https://comptox.epa.gov/dashboard/dsstoxdb/results?search=
  CHEMBL.COMPOUND: http://identifiers.org/chembl.compound/
  CTD.CHEMICAL: http://ctdbase.org/detail.go?type=chem&acc=
  CTD.GENE: http://ctdbase.org/detail.go?type=gene&acc=
  AOPWIKI: https://aopwiki.org/aops/
  GWAS: https://www.ebi.ac.uk/gwas/studies/
  NCBIGENE: https://www.ncbi.nlm.nih.gov/gene/
  GXA: https://www.ebi.ac.uk/gxa/experiments/
  NHANES: https://wwwn.cdc.gov/Nchs/Nhanes/
  USDA.PESTICIDE: https://www.ams.usda.gov/datasets/pdp/
  PUBCHEM.COMPOUND: http://identifiers.org/pubchem.compound/

default_prefix: owg
default_range: string


classes:
  Container:
    tree_root: true
    description: >-
      A container for collections of measurements and related entities.
      Used as the root class for data validation.
    attributes:
      exposure_measurements:
        range: ExposureMeasurement
        multivalued: true
        inlined_as_list: true
      biomarker_measurements:
        range: BiomarkerMeasurement
        multivalued: true
        inlined_as_list: true
      phenotype_measurements:
        range: PhenotypeMeasurement
        multivalued: true
        inlined_as_list: true
      gene_expression_measurements:
        range: GeneExpressionMeasurement
        multivalued: true
        inlined_as_list: true
      protein_expression_measurements:
        range: ProteinExpressionMeasurement
        multivalued: true
        inlined_as_list: true
      aggregated_measurements:
        range: AggregatedMeasurement
        multivalued: true
        inlined_as_list: true
      studies:
        range: Study
        multivalued: true
        inlined_as_list: true
      cohorts:
        range: Cohort
        multivalued: true
        inlined_as_list: true
      participants:
        range: Participant
        multivalued: true
        inlined_as_list: true
      chemicals:
        range: ChemicalEntity
        multivalued: true
        inlined_as_list: true
      genes:
        range: Gene
        multivalued: true
        inlined_as_list: true
      proteins:
        range: Protein
        multivalued: true
        inlined_as_list: true
      # Aliases for in-vitro measurement collections
      ciliary_measurements:
        range: PhenotypeMeasurement
        multivalued: true
        inlined_as_list: true
      asl_measurements:
        range: PhenotypeMeasurement
        multivalued: true
        inlined_as_list: true
      mcc_measurements:
        range: PhenotypeMeasurement
        multivalued: true
        inlined_as_list: true
      goblet_cell_measurements:
        range: PhenotypeMeasurement
        multivalued: true
        inlined_as_list: true
      oxidative_stress_measurements:
        range: BiomarkerMeasurement
        multivalued: true
        inlined_as_list: true
      barrier_measurements:
        range: BiomarkerMeasurement
        multivalued: true
        inlined_as_list: true
      cytotoxicity_measurements:
        range: BiomarkerMeasurement
        multivalued: true
        inlined_as_list: true

  NamedThing:
    description: >-
      A generic grouping for any identifiable entity in the exposome
    slots:
      - id
      - name
      - description
      - category
      - xref

  # ============ Quantity & Unit Classes ============

  UnitConcept:
    description: >-
      A unit of measurement from a standard ontology (UO, UCUM, QUDT)
    attributes:
      id:
        range: uriorcurie
        description: The unit identifier (e.g., UO:0000009 for kilogram)
      label:
        range: string
        description: Human-readable label for the unit (e.g., "kg")
    id_prefixes:
      - UO
      - UCUM
      - qudt

  Quantity:
    description: >-
      A quantity with a numeric value and unit of measurement
    class_uri: fhir:Quantity
    attributes:
      value:
        range: float
        description: The numeric value of the quantity
      unit:
        range: uriorcurie
        description: The unit identifier (e.g., UO:0000009 for kilogram)
      unit_label:
        range: string
        description: Human-readable label for the unit (e.g., "kg")

  QuantityRange:
    description: >-
      A range of quantities with lower and upper bounds
    class_uri: fhir:Range
    attributes:
      lower_bound:
        range: Quantity
        description: The lower bound of the range
      upper_bound:
        range: Quantity
        description: The upper bound of the range

  # ============ Reference Classes (for inline id + name) ============
  # These classes allow structured references with both identifier and human-readable name,
  # improving readability and AI-friendliness of data files.

  OntologyReference:
    description: >-
      A reference to an ontology term with both identifier and human-readable name.
      Used for measured entities, phenotypes, and other ontology-backed concepts.
    attributes:
      id:
        range: uriorcurie
        description: The ontology term identifier (e.g., CHEBI:25016, GO:0005929)
      name:
        range: string
        description: Human-readable name for the term (e.g., "Lead", "Cilium")

  GeneReference:
    description: >-
      A reference to a gene with identifier, name, and symbol.
      Used for target_gene in expression measurements.
    attributes:
      id:
        range: uriorcurie
        description: The gene identifier (e.g., NCBIGENE:4586)
      name:
        range: string
        description: Full gene name (e.g., "Mucin 5AC, oligomeric mucus/gel-forming")
      symbol:
        range: string
        description: Gene symbol (e.g., "MUC5AC")

  ProteinReference:
    description: >-
      A reference to a protein with identifier, name, and encoding gene.
      Used for target_protein in expression measurements.
    attributes:
      id:
        range: uriorcurie
        description: The protein identifier (e.g., PR:000007223)
      name:
        range: string
        description: Protein name (e.g., "Epidermal growth factor receptor")
      encoded_by_gene:
        range: GeneReference
        inlined: true
        description: The gene that encodes this protein

  TissueReference:
    description: >-
      A reference to an anatomical tissue or structure with identifier and name.
      Used for tissue_context in expression measurements.
    attributes:
      id:
        range: uriorcurie
        description: The anatomy identifier (e.g., UBERON:0002031)
      name:
        range: string
        description: Tissue/anatomy name (e.g., "bronchial epithelium")

  CellTypeReference:
    description: >-
      A reference to a cell type with identifier and name.
      Used for cell_type_context in expression measurements.
    attributes:
      id:
        range: uriorcurie
        description: The cell type identifier (e.g., CL:0000160)
      name:
        range: string
        description: Cell type name (e.g., "goblet cell")

  ParticipantReference:
    description: >-
      A reference to a study participant with identifier.
      Used when referring to participants in measurements.
    attributes:
      id:
        range: uriorcurie
        description: The participant identifier (e.g., owg:participant-001)

  BiologicalEntity:
    abstract: true
    is_a: NamedThing
    description: >-
      Biological entities including genes, proteins, cells, and anatomical structures

  ChemicalEntity:
    is_a: NamedThing
    class_uri: CHEBI:24431
    description: >-
      A chemical entity including compounds, drugs, and metabolites
    slots:
      - chebi_id
      - dtxsid
      - chembl_id
      - pubchem_cid
      - cas_number
      - inchi
      - smiles
      - molecular_formula

  ExposureEvent:
    abstract: true
    is_a: NamedThing
    description: >-
      An event in which an organism is exposed to a chemical or environmental factor
    slots:
      - exposed_to_chemical
      - exposure_route
      - exposure_duration
      - exposure_concentration
      - exposure_medium

  BiologicalResponse:
    abstract: true
    is_a: NamedThing
    description: >-
      A biological response at the molecular, cellular, or tissue level

  HealthOutcome:
    abstract: true
    is_a: NamedThing
    description: >-
      A health-related outcome including phenotypes and diseases

  StudyEntity:
    abstract: true
    is_a: NamedThing
    description: >-
      Entities related to studies, cohorts, and participants

  Measurement:
    abstract: true
    is_a: NamedThing
    description: >-
      A measurement observation with a typed quantity value and optional reference ranges
    slots:
      - observation_type
      - quantity_measured
      - range_low
      - range_high

  Association:
    abstract: true
    is_a: NamedThing
    description: >-
      A relationship between two entities

  # ============ Exposure Classes ============

  ChemicalExposure:
    is_a: ExposureEvent
    class_uri: ECTO:0000006
    description: >-
      Exposure to a chemical substance

  DietaryExposure:
    is_a: ExposureEvent
    class_uri: FOODON:00002403
    description: >-
      Exposure through dietary consumption
    slots:
      - food_item
      - serving_size

  EnvironmentalExposure:
    is_a: ExposureEvent
    class_uri: ECTO:0000001
    description: >-
      Exposure to environmental factors
    slots:
      - environmental_context

  OccupationalExposure:
    is_a: ExposureEvent
    class_uri: ECTO:0000002
    description: >-
      Exposure in an occupational setting
    slots:
      - occupation
      - workplace

  # ============ Health Outcome Classes ============

  Phenotype:
    is_a: HealthOutcome
    class_uri: UPHENO:0001001
    description: >-
      An observable characteristic or trait
    slots:
      - severity
      - onset_age
    id_prefixes:
      - HP
      - UPHENO
      - MP
      - ZP

  Disease:
    is_a: HealthOutcome
    class_uri: MONDO:0000001
    description: >-
      A disease or medical condition
    slots:
      - disease_category
      - affected_anatomy

  AdverseOutcome:
    is_a: HealthOutcome
    description: >-
      An adverse health outcome in the context of an Adverse Outcome Pathway
    slots:
      - outcome_level

  # ============ AOP Framework Classes ============

  AdverseOutcomePathway:
    is_a: NamedThing
    description: >-
      A sequence of causally linked events at different levels of biological
      organization that lead from exposure to adverse health outcomes
    slots:
      - aopwiki_id
      - molecular_initiating_event
      - key_events
      - key_event_relationships
      - adverse_outcome
      - stressors

  MolecularInitiatingEvent:
    is_a: BiologicalResponse
    class_uri: ECTO:3000000
    description: >-
      The initial molecular-level perturbation that starts an Adverse Outcome Pathway
    slots:
      - biological_process
      - biological_object
      - biological_action
      - occurs_in_cell_type
      - occurs_in_anatomy

  KeyEvent:
    is_a: BiologicalResponse
    class_uri: ECTO:1000000
    description: >-
      A measurable change in biological state that is a step in an Adverse Outcome Pathway
    slots:
      - biological_process
      - biological_object
      - biological_action
      - level_of_biological_organization
      - occurs_in_cell_type
      - occurs_in_anatomy

  KeyEventRelationship:
    is_a: Association
    description: >-
      A directional relationship between two key events in an AOP
    slots:
      - upstream_event
      - downstream_event
      - relationship_type
      - evidence_support

  # ============ Study & Measurement Classes ============

  Study:
    is_a: StudyEntity
    class_uri: EFO:0001444
    description: >-
      A research study or survey
    slots:
      - study_type
      - population
      - enrollment_period
      - geographic_location
      - data_source
      - principal_investigator
      - publications

  Cohort:
    is_a: StudyEntity
    description: >-
      A group of individuals in a study
    slots:
      - part_of_study
      - cohort_size
      - inclusion_criteria

  Participant:
    is_a: StudyEntity
    description: >-
      An individual participant in a study
    slots:
      - part_of_cohort
      - participant_id
      - age
      - sex
      - species

  ExposureMeasurement:
    is_a: Measurement
    description: >-
      A measurement of exposure to a chemical or environmental factor
    slots:
      - measured_entity
      - participant
      - measurement_method
      - measurement_date
      - sample_type
      - source_database_record

  BiomarkerMeasurement:
    is_a: Measurement
    description: >-
      A measurement of a biological marker
    slots:
      - biomarker_type
      - measured_entity
      - participant
      - measurement_method
      - measurement_date

  PhenotypeMeasurement:
    is_a: Measurement
    description: >-
      A measurement of a phenotypic trait or functional assay
    slots:
      - phenotype
      - measured_entity
      - participant
      - measurement_method
      - measurement_date

  AggregatedMeasurement:
    is_a: Measurement
    description: >-
      An aggregated or summary measurement across a cohort or population
    slots:
      - measured_entity
      - cohort
      - summary_statistic
      - sample_size
      - stratification

  # ============ Expression Measurement Classes ============

  GeneExpressionMeasurement:
    is_a: Measurement
    description: >-
      A measurement of gene expression (mRNA level) in a specific biological context.
      Captures the target gene, tissue/cell type context, and assay methodology.
    slots:
      - target_gene
      - tissue_context
      - cell_type_context
      - assay_method
      - normalization_reference
      - participant
      - measurement_date

  ProteinExpressionMeasurement:
    is_a: Measurement
    description: >-
      A measurement of protein expression or post-translational modification
      (e.g., phosphorylation) in a specific biological context.
    slots:
      - target_protein
      - phosphorylation_site
      - tissue_context
      - cell_type_context
      - assay_method
      - normalization_reference
      - participant
      - measurement_date

  # ============ Biological Entity Classes ============

  Gene:
    is_a: BiologicalEntity
    description: >-
      A gene or genetic element
    slots:
      - ncbigene_id
      - symbol
      - in_taxon

  Protein:
    is_a: BiologicalEntity
    description: >-
      A protein or polypeptide
    slots:
      - encoded_by_gene

  CellType:
    is_a: BiologicalEntity
    class_uri: CL:0000000
    description: >-
      A type of cell
    slots:
      - cl_id

  AnatomicalEntity:
    is_a: BiologicalEntity
    class_uri: UBERON:0001062
    description: >-
      An anatomical structure or system
    slots:
      - uberon_id

  Organism:
    is_a: BiologicalEntity
    description: >-
      An individual organism
    slots:
      - species
      - taxon_id

  # ============ Association Classes ============

  ExposureToPhenotypeAssociation:
    is_a: Association
    description: >-
      An association between an exposure and a phenotype
    slots:
      - exposure
      - phenotype
      - association_type
      - evidence

  ChemicalToGeneAssociation:
    is_a: Association
    description: >-
      An association between a chemical and a gene
    slots:
      - chemical
      - gene
      - interaction_type

  GeneToDiseaseAssociation:
    is_a: Association
    description: >-
      An association between a gene and a disease
    slots:
      - gene
      - disease
      - association_type

  GeneticVariantToPhenotypeAssociation:
    is_a: Association
    description: >-
      An association between a genetic variant and a phenotype (e.g., from GWAS)
    slots:
      - genetic_variant
      - phenotype
      - p_value
      - effect_size


slots:
  # Core slots
  id:
    identifier: true
    slot_uri: schema:identifier
    range: uriorcurie
    description: A unique identifier for a thing

  name:
    slot_uri: schema:name
    description: A human-readable name for a thing

  description:
    slot_uri: schema:description
    description: A human-readable description for a thing

  category:
    description: A category or type for a thing
    multivalued: true

  xref:
    range: uriorcurie
    multivalued: true
    description: External database cross-references

  # Chemical entity slots
  chebi_id:
    range: uriorcurie
    pattern: "^CHEBI:\\d+$"
    description: ChEBI identifier

  dtxsid:
    range: string
    pattern: "^DTXSID\\d{7,9}$"
    description: EPA CompTox Dashboard identifier

  chembl_id:
    range: string
    pattern: "^CHEMBL\\d+$"
    description: ChEMBL compound identifier

  pubchem_cid:
    range: integer
    description: PubChem Compound identifier

  cas_number:
    range: string
    description: CAS Registry Number

  inchi:
    range: string
    description: InChI chemical identifier

  smiles:
    range: string
    description: SMILES chemical structure

  molecular_formula:
    range: string
    description: Molecular formula

  # Exposure slots
  exposed_to_chemical:
    range: ChemicalEntity
    slot_uri: CHEBI:24431
    description: The chemical entity involved in the exposure

  exposure_route:
    range: ExposureRouteEnum
    description: Route of exposure

  exposure_duration:
    range: string
    description: Duration of exposure

  exposure_concentration:
    range: float
    description: Concentration of exposure

  exposure_medium:
    range: ExposureMediumEnum
    description: Medium through which exposure occurs

  food_item:
    range: string
    description: Food item consumed

  serving_size:
    range: string
    description: Serving size

  environmental_context:
    range: string
    description: Environmental context of exposure

  occupation:
    range: string
    description: Occupation related to exposure

  workplace:
    range: string
    description: Workplace where exposure occurs

  severity:
    range: string
    description: Severity of phenotype or disease

  onset_age:
    range: string
    description: Age of onset

  disease_category:
    range: string
    description: Category of disease

  affected_anatomy:
    range: AnatomicalEntity
    description: Anatomical location affected

  outcome_level:
    range: BiologicalOrganizationLevelEnum
    description: Level of biological organization

  # AOP slots
  aopwiki_id:
    range: string
    description: AOP Wiki identifier

  molecular_initiating_event:
    range: MolecularInitiatingEvent
    description: The molecular initiating event of an AOP

  key_events:
    range: KeyEvent
    multivalued: true
    description: Key events in an AOP

  key_event_relationships:
    range: KeyEventRelationship
    multivalued: true
    description: Relationships between key events

  adverse_outcome:
    range: AdverseOutcome
    description: The adverse outcome of an AOP

  stressors:
    range: ChemicalEntity
    multivalued: true
    description: Chemical stressors that trigger the AOP

  biological_process:
    range: string
    description: Biological process involved

  biological_object:
    range: string
    description: Biological object involved

  biological_action:
    range: string
    description: Biological action or change

  occurs_in_cell_type:
    range: CellType
    slot_uri: CL:0000000
    description: Cell type where event occurs

  occurs_in_anatomy:
    range: AnatomicalEntity
    slot_uri: UBERON:0001062
    description: Anatomical location where event occurs

  level_of_biological_organization:
    range: BiologicalOrganizationLevelEnum
    description: Level of biological organization

  upstream_event:
    range: KeyEvent
    description: Upstream key event

  downstream_event:
    range: KeyEvent
    description: Downstream key event

  relationship_type:
    range: string
    description: Type of relationship

  evidence_support:
    range: string
    description: Evidence supporting the relationship

  # Study slots
  study_type:
    range: StudyTypeEnum
    description: Type of study

  population:
    range: string
    description: Study population description

  enrollment_period:
    range: string
    description: Time period of enrollment

  geographic_location:
    range: string
    description: Geographic location of study

  data_source:
    range: DataSourceEnum
    description: Source database or repository

  principal_investigator:
    range: string
    description: Principal investigator name

  publications:
    range: string
    multivalued: true
    description: Related publications

  part_of_study:
    range: Study
    description: Study that this cohort is part of

  cohort_size:
    range: integer
    description: Number of participants in cohort

  inclusion_criteria:
    range: string
    description: Criteria for cohort inclusion

  part_of_cohort:
    range: Cohort
    slot_uri: biolink:member_of
    description: Cohort that this participant is part of

  participant_id:
    range: string
    description: Participant identifier

  age:
    range: integer
    description: Age in years

  sex:
    range: SexEnum
    description: Biological sex

  species:
    range: string
    description: Species name

  # Measurement slots
  observation_type:
    range: MeasurementTypeEnum
    description: >-
      The type of observation being represented (e.g., 'blood lead level', 'BMI').
      This field holds the key in the core key-value pair.

  quantity_measured:
    range: Quantity
    inlined: true
    description: >-
      The measured quantity value with its unit

  range_low:
    range: Quantity
    inlined: true
    description: >-
      Lower bound of reference range (e.g., from a laboratory).
      Set to NULL if not provided.

  range_high:
    range: Quantity
    inlined: true
    description: >-
      Upper bound of reference range (e.g., from a laboratory).
      Set to NULL if not provided.

  measured_entity:
    range: OntologyReference
    inlined: true
    description: >-
      The entity being measured, with both identifier and human-readable name.
      Examples: chemical compounds (CHEBI), cell types (CL), biological processes (GO).

  participant:
    range: ParticipantReference
    inlined: true
    description: The participant being measured, with identifier.

  measurement_method:
    range: string
    description: Method used for measurement

  measurement_date:
    range: date
    description: Date of measurement

  sample_type:
    range: SampleTypeEnum
    description: Type of biological sample

  source_database_record:
    range: uriorcurie
    description: Link to original database record (URI or CURIE)

  biomarker_type:
    range: string
    description: Type of biomarker

  phenotype:
    range: OntologyReference
    inlined: true
    description: The phenotype being measured, with identifier and name.

  cohort:
    range: Cohort
    description: The cohort for aggregated measurements

  summary_statistic:
    range: SummaryStatisticEnum
    description: Type of summary statistic

  sample_size:
    range: integer
    description: Number of samples

  stratification:
    range: string
    description: Stratification variables

  # Expression measurement slots
  target_gene:
    range: GeneReference
    inlined: true
    description: >-
      The gene whose expression is being measured, with identifier, name, and symbol.
      Use this to specify the exact gene target (e.g., MUC5AC, EGFR, IL8).

  target_protein:
    range: ProteinReference
    inlined: true
    description: >-
      The protein whose expression or modification is being measured,
      with identifier, name, and optionally the encoding gene.

  tissue_context:
    range: TissueReference
    inlined: true
    description: >-
      The anatomical tissue or structure where expression was measured,
      with identifier and name (e.g., bronchial epithelium, lung, nasal mucosa).

  cell_type_context:
    range: CellTypeReference
    inlined: true
    description: >-
      The specific cell type where expression was measured,
      with identifier and name (e.g., goblet cell, ciliated cell, basal cell).

  assay_method:
    range: ExpressionAssayMethodEnum
    description: >-
      The experimental method used to measure expression.
      Captures whether this was qRT-PCR, RNA-seq, Western blot, IHC, etc.

  phosphorylation_site:
    range: string
    description: >-
      For protein phosphorylation measurements, the specific amino acid
      residue that is phosphorylated (e.g., Y1068, S473, T308).

  normalization_reference:
    range: string
    description: >-
      The reference gene or protein used for normalization
      (e.g., GAPDH, beta-actin, 18S rRNA, total protein).

  # Biological entity slots
  ncbigene_id:
    range: string
    pattern: "^\\d+$"
    description: NCBI Gene identifier

  symbol:
    range: string
    description: Gene symbol

  in_taxon:
    range: string
    description: Taxonomic group

  encoded_by_gene:
    range: Gene
    description: Gene that encodes this protein

  cl_id:
    range: uriorcurie
    pattern: "^CL:\\d{7}$"
    description: Cell Ontology identifier

  uberon_id:
    range: uriorcurie
    pattern: "^UBERON:\\d{7}$"
    description: UBERON anatomical identifier

  taxon_id:
    range: string
    description: NCBI Taxonomy identifier

  # Association slots
  exposure:
    range: ExposureEvent
    description: Exposure in association

  chemical:
    range: ChemicalEntity
    description: Chemical in association

  gene:
    range: Gene
    description: Gene in association

  disease:
    range: Disease
    description: Disease in association

  association_type:
    range: string
    description: Type of association

  evidence:
    range: string
    description: Evidence for association

  interaction_type:
    range: string
    description: Type of interaction

  genetic_variant:
    range: string
    description: Genetic variant identifier

  p_value:
    range: float
    description: Statistical p-value

  effect_size:
    range: float
    description: Effect size of association

