name: aop_framework
description: >-
  AOP (Adverse Outcome Pathway) framework classes for representing mechanistic
  knowledge linking key events to adverse outcomes. Based on AOP-Wiki (https://aopwiki.org/) structure.
title: AOP Framework Schema
id: https://w3id.org/EHS-Data-Standards/aop_framework

imports:
  - linkml:types

prefixes:
  aop_framework: https://w3id.org/EHS-Data-Standards/aop_framework/
  linkml: https://w3id.org/linkml/
  ECTO: http://purl.obolibrary.org/obo/ECTO_
  GO: http://purl.obolibrary.org/obo/GO_
  CL: http://purl.obolibrary.org/obo/CL_
  UBERON: http://purl.obolibrary.org/obo/UBERON_
  AOPWIKI: https://aopwiki.org/aops/
  schema: http://schema.org/

default_prefix: aop_framework
default_range: string

# =============================================================================
# CLASSES
# =============================================================================

classes:

  # ---------------------------------------------------------------------------
  # Base Classes
  # ---------------------------------------------------------------------------

  NamedThing:
    description: >-
      A generic entity with an identifier and name. Base class for all
      named entities in the schema.
    slots:
      - id
      - name
      - description

  # ---------------------------------------------------------------------------
  # AOP Core Classes
  # ---------------------------------------------------------------------------

  KeyEvent:
    is_a: NamedThing
    class_uri: ECTO:1000000
    description: >-
      A measurable change in biological state that is a step in an Adverse
      Outcome Pathway. Key Events reflect the measurable and essential biological perturbations that  
      provide evidence for progression leading to a specific adverse outcome.
      Key events can be Molecular Initiating Events (MIEs), intermediate Key
      Events, or Adverse Outcomes at the organism/population level.
    slots:
      - biological_process
      - biological_object
      - biological_action
      - level_of_biological_organization
      - occurs_in_cell_type
      - occurs_in_anatomy
      - aopwiki_id
      - upstream_key_events
      - downstream_key_events

  KeyEventRelationship:
    is_a: NamedThing
    description: >-
      A directional relationship between two key events in an AOP.
      Represents the causal linkage between an upstream event and a
      downstream event with supporting evidence.
    slots:
      - upstream_event
      - downstream_event
      - relationship_type
      - evidence_support
      - quantitative_understanding

  AdverseOutcome:
    is_a: NamedThing
    description: >-
      A specialized type of key event that represents the apical endpoint of an Adverse Outcome Pathway.
      The outcome may be defined at the individual or population level, and is relevant biomedical, clinical, regulator, or ecologically applications.
    slots:
      - outcome_level
      - biological_process
      - occurs_in_anatomy
      - aopwiki_id

  AdverseOutcomePathway:
    is_a: NamedThing
    description: >-
      A sequence of causally linked events at different levels of biological
      organization that lead from a molecular initiating event through
      intermediate key events to an adverse health outcome. AOPs provide
      a structured framework for organizing mechanistic evidence.
    slots:
      - aopwiki_id
      - molecular_initiating_event
      - key_events
      - key_event_relationships
      - adverse_outcome
      - stressors

  MolecularInitiatingEvent:
    is_a: KeyEvent
    description: >-
      The initial molecular-level perturbation that starts an Adverse Outcome
      Pathway. The MIE is the direct interaction between a stressor and a
      biological target (e.g., receptor binding, enzyme inhibition).
    slots:
      - target_molecule

# =============================================================================
# SLOTS
# =============================================================================

slots:

  # ---------------------------------------------------------------------------
  # Identifier and Metadata Slots
  # ---------------------------------------------------------------------------

  id:
    description: A unique identifier for the entity.
    identifier: true
    range: uriorcurie
    required: true

  name:
    description: A human-readable name for the entity.
    range: string
    slot_uri: schema:name

  description:
    description: A detailed description of the entity.
    range: string
    slot_uri: schema:description

  # ---------------------------------------------------------------------------
  # Key Event Slots
  # ---------------------------------------------------------------------------

  biological_process:
    description: >-
      The biological process affected by this key event. Should reference
      a GO biological process term.
    range: uriorcurie
    pattern: "^GO:\\d{7}$"

  biological_object:
    description: >-
      The biological entity affected (protein, cell, tissue, organ).
    range: string

  biological_action:
    description: >-
      The type of change (increased, decreased, altered, impaired).
    range: BiologicalActionEnum

  level_of_biological_organization:
    description: >-
      The level of biological organization at which this key event occurs.
    range: BiologicalOrganizationLevelEnum

  occurs_in_cell_type:
    description: >-
      The cell type in which this key event occurs. Should reference a
      Cell Ontology (CL) term.
    range: uriorcurie
    pattern: "^CL:\\d{7}$"

  occurs_in_anatomy:
    description: >-
      The anatomical location where this key event occurs. Should reference
      a UBERON anatomy term.
    range: uriorcurie
    pattern: "^UBERON:\\d{7}$"

  aopwiki_id:
    description: >-
      The AOP-Wiki identifier for this entity (e.g., "AOP:411" for an AOP,
      "KE:1234" for a key event).
    range: string

  upstream_key_events:
    description: >-
      Key events that lead to this key event (upstream in the pathway).
    range: KeyEvent
    multivalued: true
    inlined_as_list: true

  downstream_key_events:
    description: >-
      Key events that follow this key event (downstream in the pathway).
    range: KeyEvent
    multivalued: true
    inlined_as_list: true

  # ---------------------------------------------------------------------------
  # Key Event Relationship Slots
  # ---------------------------------------------------------------------------

  upstream_event:
    description: >-
      The upstream key event in this relationship (cause).
    range: KeyEvent
    inlined: true

  downstream_event:
    description: >-
      The downstream key event in this relationship (effect).
    range: KeyEvent
    inlined: true

  relationship_type:
    description: >-
      The type of causal relationship (directly leads to, indirectly leads to).
    range: string

  evidence_support:
    description: >-
      Level of evidence supporting this key event relationship.
    range: EvidenceSupportEnum

  quantitative_understanding:
    description: >-
      Level of quantitative understanding of the relationship.
    range: QuantitativeUnderstandingEnum

  # ---------------------------------------------------------------------------
  # Adverse Outcome Slots
  # ---------------------------------------------------------------------------

  outcome_level:
    description: >-
      The level at which the adverse outcome manifests (individual, population).
    range: OutcomeLevelEnum

  # ---------------------------------------------------------------------------
  # AOP Slots
  # ---------------------------------------------------------------------------

  molecular_initiating_event:
    description: >-
      The molecular initiating event that starts this AOP.
    range: MolecularInitiatingEvent
    inlined: true

  key_events:
    description: >-
      The key events in this AOP (intermediate events between MIE and AO).
    range: KeyEvent
    multivalued: true
    inlined_as_list: true

  key_event_relationships:
    description: >-
      The key event relationships connecting events in this AOP.
    range: KeyEventRelationship
    multivalued: true
    inlined_as_list: true

  adverse_outcome:
    description: >-
      The adverse outcome that is the apical endpoint of this AOP.
    range: AdverseOutcome
    inlined: true

  stressors:
    description: >-
      Chemical or physical stressors that can trigger this AOP.
    range: string
    multivalued: true

  target_molecule:
    description: >-
      The molecular target of the stressor in the MIE (e.g., receptor, enzyme).
    range: string

# =============================================================================
# ENUMS
# =============================================================================

enums:

  BiologicalActionEnum:
    description: >-
      Types of biological changes or actions in key events.
    permissible_values:
      increased:
        description: Increased level or activity
      decreased:
        description: Decreased level or activity
      altered:
        description: Altered function or state (not quantitative)
      impaired:
        description: Impaired function
      disrupted:
        description: Disrupted process or structure
      activated:
        description: Activated process or pathway
      inhibited:
        description: Inhibited process or pathway

  BiologicalOrganizationLevelEnum:
    description: >-
      Levels of biological organization for key events.
    permissible_values:
      molecular:
        description: Molecular level (genes, proteins, metabolites)
      cellular:
        description: Cellular level (cell function, signaling)
      tissue:
        description: Tissue level (tissue structure, function)
      organ:
        description: Organ level (organ function)
      organism:
        description: Whole organism level (systemic effects)
      population:
        description: Population level (ecological effects)

  EvidenceSupportEnum:
    description: >-
      Levels of evidence support for key event relationships.
    permissible_values:
      strong:
        description: Strong empirical support with mechanistic understanding
      moderate:
        description: Moderate support with some mechanistic evidence
      weak:
        description: Limited evidence or indirect support
      not_specified:
        description: Evidence level not specified

  QuantitativeUnderstandingEnum:
    description: >-
      Levels of quantitative understanding for key event relationships.
    permissible_values:
      high:
        description: Response-response relationship well characterized
      moderate:
        description: Some quantitative data available
      low:
        description: Limited quantitative understanding
      not_specified:
        description: Quantitative understanding not specified

  OutcomeLevelEnum:
    description: >-
      Levels at which adverse outcomes manifest.
    permissible_values:
      individual:
        description: Adverse outcome in an individual organism
      population:
        description: Adverse outcome at the population level
