name: assay_base
description: >-
  Base schema defining the Assay interface and supporting classes (Protocol,
  Method) for outcomes research. Domain-specific assay microschemas extend
  this base to define assays with named measurement slots.
title: Assay Base Schema
id: https://w3id.org/EHS-Data-Standards/assay_base

imports:
  - linkml:types
  - aop_framework

prefixes:
  assay_base: https://w3id.org/EHS-Data-Standards/assay_base/
  linkml: https://w3id.org/linkml/
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  IAO: http://purl.obolibrary.org/obo/IAO_
  PATO: http://purl.obolibrary.org/obo/PATO_
  CLO: http://purl.obolibrary.org/obo/CLO_
  NAMO: http://purl.obolibrary.org/obo/NAMO_
  EFO: http://www.ebi.ac.uk/efo/EFO_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  GO: http://purl.obolibrary.org/obo/GO_
  CL: http://purl.obolibrary.org/obo/CL_
  UBERON: http://purl.obolibrary.org/obo/UBERON_
  PR: http://purl.obolibrary.org/obo/PR_
  schema: http://schema.org/
  aop_framework: https://w3id.org/EHS-Data-Standards/aop_framework/
  UCUM: http://unitsofmeasure.org/
  QUDT: http://qudt.org/vocab/unit/
  owg: https://w3id.org/EHS-Data-Standards/soma/

default_prefix: assay_base
default_range: string

# =============================================================================
# CLASSES
# =============================================================================

classes:

  # ---------------------------------------------------------------------------
  # Core Assay Class (Abstract Base)
  # ---------------------------------------------------------------------------

  Assay:
    is_a: NamedThing
    abstract: true
    class_uri: OBI:0000070
    description: >-
      A planned process with the objective to produce information about
      biological state relevant to a Key Event in an Adverse Outcome Pathway.
      Assays are organized by the functional domain they assess (e.g., ciliary
      function, oxidative stress), and each domain-specific assay class contains
      named slots for the specific measurements it can produce. Assays inform on
      key events and contain the measurement data as named slots.
    slots:
      - informs_on_key_event
      - study_subject
      - has_exposure_condition
      - follows_protocols
      - has_specified_output
      - assay_date

  # ---------------------------------------------------------------------------
  # Assay Output Measurement (Abstract Base)
  # ---------------------------------------------------------------------------

  AssayOutputMeasurement:
    is_a: NamedThing
    abstract: true
    exact_mappings:
      - IAO:0000109
    description: >-
      The measurement results produced by an assay. The specified output
      of a planned process. Each domain-specific assay class has a
      corresponding AssayOutputMeasurement subclass containing the named
      measurement slots for that assay type. This class represents the "output" in the Input/Process/Output
      model: what was measured and what values were obtained.

  # ---------------------------------------------------------------------------
  # Study Subject Hierarchy
  # ---------------------------------------------------------------------------

  StudySubject:
    is_a: NamedThing
    description: >-
      The subject of a study — what the assay is performed on. Subclasses
      capture different experimental contexts (model systems, living subjects,
      populations) with context-appropriate slots. The type of subject
      determines which slots are available, replacing the old mixin pattern.
    slots:
      - subject_type
      - model_species

  ModelSystem:
    is_a: StudySubject
    description: >-
      An in vitro or ex vivo model system used to study biological processes.
      Parent class for cell-based and other model systems.

  InVivoSubject:
    is_a: StudySubject
    description: >-
      A living human or animal subject from whom measurements are taken.
      Used for clinical assays (lung function, BALF/sputum) and any assay
      performed on living subjects.
    slots:
      - age
      - sex
      - subject_characteristics
      - disease_state
      - sample_type
      - collection_site
      - collection_date
      - sample_collection_method
      - clinical_context

  PopulationSubject:
    is_a: StudySubject
    description: >-
      A population or cohort of subjects studied in aggregate. Used for
      epidemiological or population-level analyses. Can optionally hold
      references to individual InVivoSubject members.
    slots:
      - cohort_size
      - inclusion_criteria
      - age_range
      - subjects

  # ---------------------------------------------------------------------------
  # Protocol Classes
  # ---------------------------------------------------------------------------

  Protocol:
    is_a: NamedThing
    class_uri: OBI:0000272
    description: >-
      A detailed set of steps for how to perform a specific assay.
      Protocols ensure reproducibility across laboratories.
      Contains universal slots; domain-specific details are in protocol
      subclasses (ImagingProtocol, StainingProtocol, etc.). Protocols can reference other protocols via sub_protocols to represent
      composite workflows (e.g., sample preparation, wash steps, or
      post-processing protocols that are shared across assays).
    slots:
      # Type designator for polymorphism
      - protocol_type
      - protocol_version
      - equipment_required
      - sub_protocols
      - quality_control_criteria
      - replicate_requirements
      - protocol_author
      - institution
      - publication_reference
      - last_updated
      - validation_status

  ImagingProtocol:
    is_a: Protocol
    description: >-
      Protocol for imaging-based assays (CBF, ASL, MCC). Captures frame rate,
      duration, resolution, and tracer/labeling details.
    slots:
      - imaging_frame_rate
      - imaging_duration
      - spatial_resolution
      - fluorescent_labeling
      - fluorescent_tracer
      - evaporation_prevention
      - particle_tracking_method
      - temperature_control
      - humidity_control
      - particle_size

  StainingProtocol:
    is_a: Protocol
    description: >-
      Protocol for staining-based assays (goblet cell, immunofluorescence).
      Captures staining type, antibodies, fixation, and detection details.
    slots:
      - staining_type
      - antibodies_used
      - detection_method
      - normalization_method
      - fixation_method
      - counterstain

  SpirometryProtocol:
    is_a: Protocol
    description: >-
      Protocol for lung function / spirometry assays. Captures spirometry
      standards, bronchodilator details, and plethysmography method.
    slots:
      - spirometry_standard
      - bronchodilator_agent
      - bronchodilator_dose
      - plethysmography_method

  MolecularAssayProtocol:
    is_a: Protocol
    description: >-
      Protocol for molecular biology assays (qRT-PCR, Western blot, ELISA).
      Captures detection method, normalization, primers, and platform details.
    slots:
      - detection_method
      - normalization_method
      - antibodies_used
      - primer_sequences
      - reference_gene
      - lysis_buffer
      - platform

  # ---------------------------------------------------------------------------
  # Supporting Value Classes
  # ---------------------------------------------------------------------------

  QuantityValue:
    description: >-
      A quantity with a numeric value and unit of measurement.
      Used for all measurement values in assays.
    slots:
      - value
      - unit

  Unit:
    description: >-
      A unit of measurement from a standard ontology (UO, UCUM, QUDT).
    slots:
      - id
      - name
    id_prefixes:
      - UO
      - UCUM
      - QUDT

  NamedEntity:
    description: >-
      A reference to an entity with an identifier and name.
      Used for cell_type, tissue_context, participant references, etc.
    slots:
      - id
      - name

  # ---------------------------------------------------------------------------
  # Exposure Condition Class
  # ---------------------------------------------------------------------------

  ExposureCondition:
    is_a: NamedEntity
    description: >-
      A structured description of an exposure or treatment applied to a
      biological system. Captures what agent was applied, at what concentration,
      for how long, and when the measurement was taken relative to exposure.
    slots:
      - exposure_agent
      - exposure_concentration
      - exposure_duration
      - timing_post_exposure

  # ---------------------------------------------------------------------------
  # Cell Culture Model System Classes
  # ---------------------------------------------------------------------------

  CellularSystem:
    is_a: ModelSystem
    description: >-
      Cell-based model systems that use living cells to model biological
      processes.
    slots:
      # Cell identity
      - cell_line
      - primary_cell
      - cell_type
      - anatomical_origin
      # Culture properties
      - cell_culture_growth_mode
      - substrate_type
      - confluence_level
      - passage_number
      - seeding_density
      - coating
      - matrix_composition
      - size_range
      - organoid_type
      - cell_type_ratios
      - culture_conditions
      - culture_media
      # Subject info (moved from Assay base)
      - days_at_differentiation
      - donor_info
      - replicates_per_donor

  # ---------------------------------------------------------------------------
  # Cell Culture Supporting Classes
  # ---------------------------------------------------------------------------

  CellLine:
    is_a: NamedEntity
    description: >-
      A cell line - a genetically stable cultured cell population.
    slots:
      - cell_type
      - model_species
      - tissue_origin
      - disease_state
      - supplier
      - catalog_number
      - authentication_method
      - mycoplasma_status
    id_prefixes:
      - CLO

  CellCultureConditions:
    is_a: NamedEntity
    exact_mappings:
      - CLO:0037334
    description: >-
      Detailed cell culture parameters including medium, environment, and timing.
    slots:
      - culture_media
      - days_at_air_liquid_interface
      - passage_number
      - substrate_type
      - cell_culture_growth_mode
      - donor_count
      - replicates_per_donor

  CellCultureMedium:
    is_a: NamedEntity
    description: >-
      Detailed formulation of cell culture medium including base medium
      and supplements.
    slots:
      - base_medium
      - serum_type
      - serum_concentration
      - supplements
      - osmolality
      - manufacturer
      - catalog_number
      - lot_number
      - preparation_date

  MediumSupplement:
    is_a: NamedEntity
    description: >-
      Supplement or additive to cell culture medium.
    slots:
      - supplement_type
      - concentration
      - manufacturer
      - catalog_number

  QuantityRange:
    description: >-
      A range of quantity values with minimum and maximum bounds.
    slots:
      - min_value
      - max_value
      - unit

# =============================================================================
# SLOTS
# =============================================================================

slots:

  # ---------------------------------------------------------------------------
  # AOP Connection Slot (CRITICAL NEW SLOT)
  # ---------------------------------------------------------------------------

  informs_on_key_event:
    description: >-
      The Key Event that this assay provides evidence for. This establishes
      the mechanistic connection between the assay measurements and the
      Adverse Outcome Pathway framework. Multiple assays can inform on the
      same key event, providing converging evidence.
    range: KeyEvent
    inlined: true

  # ---------------------------------------------------------------------------
  # Assay Output Slot
  # ---------------------------------------------------------------------------

  has_specified_output:
    description: >-
      The measurement results produced by this assay — the specified output
      of a planned process (OBI). Contains the domain-specific measurement
      values (e.g., beat frequency, cilia length for CiliaryFunctionAssay).
    range: AssayOutputMeasurement
    exact_mappings:
      - OBI:0000299
    inlined: true

  # ---------------------------------------------------------------------------
  # Context Slots
  # ---------------------------------------------------------------------------

  cell_type:
    description: >-
      The cell type being studied. Reference to a Cell Ontology (CL) term.
      Used on CellularSystem and CellLine to describe the cell identity.
    range: NamedEntity
    inlined: true
    slot_uri: EFO:0000324

  target_cell_type:
    description: >-
      The specific cell type that is the primary focus of this assay's
      analysis, when the assay examines multiple cell populations in a
      sample (e.g., neutrophils in a BALF differential).
    range: NamedEntity
    inlined: true

  model_species:
    description: >-
      The species of origin for the cells or organism being studied.
      Reference to NCBITaxon term.
    range: NamedEntity
    inlined: true

  # ---------------------------------------------------------------------------
  # Study Subject Slots
  # ---------------------------------------------------------------------------

  subject_type:
    description: >-
      The specific type of study subject. Used to designate which concrete
      class (e.g., CellularSystem, InVivoSubject) is instantiated for
      polymorphic study_subject slots.
    designates_type: true
    range: string

  study_subject:
    description: >-
      The subject of the study — what the assay is performed on. Can be a
      ModelSystem (e.g., CellularSystem), an InVivoSubject, or a
      PopulationSubject. The type of subject determines which context
      slots are available.
    range: StudySubject
    inlined: true

  sample_collection_method:
    description: >-
      Method used for sample collection in vivo (e.g., bronchoscopy,
      induced sputum, spirometry).
    range: string

  clinical_context:
    description: >-
      Clinical context for in vivo measurements (e.g., routine screening,
      post-exposure assessment, disease monitoring, baseline spirometry).
    range: string

  # ---------------------------------------------------------------------------
  # Test System Slots
  # ---------------------------------------------------------------------------

  has_exposure_condition:
    description: >-
      The exposure condition(s) applied to the study subject. Captures the
      agent, concentration, duration, and timing of exposure/treatment.
      Multivalued to support co-exposures or dose-response series.
    range: ExposureCondition
    multivalued: true
    inlined_as_list: true

  # ---------------------------------------------------------------------------
  # Methodology Slots
  # ---------------------------------------------------------------------------

  protocol_type:
    description: >-
      The specific type of protocol. Used to designate which concrete
      class (e.g., ImagingProtocol, StainingProtocol, SpirometryProtocol,
      MolecularAssayProtocol) is instantiated for polymorphic protocol slots.
    designates_type: true
    range: string

  follows_protocols:
    description: >-
      The Protocol(s) that this assay follows. Any Protocol or Protocol
      subclass (ImagingProtocol, StainingProtocol, SpirometryProtocol,
      MolecularAssayProtocol) is valid. Use this for general protocol
      references; assay subclasses also have typed protocol slots for
      domain-specific protocols.
    range: Protocol
    multivalued: true
    inlined_as_list: true

  sub_protocols:
    description: >-
      Other protocols that are part of this protocol's workflow. Use this
      to compose protocols from reusable steps (e.g., sample preparation,
      wash steps, fixation, post-processing). Any Protocol or Protocol
      subclass is valid.
    range: Protocol
    multivalued: true
    inlined_as_list: true

  # ---------------------------------------------------------------------------
  # Sample/Subject Info Slots (now on CellularSystem)
  # ---------------------------------------------------------------------------

  days_at_differentiation:
    description: >-
      Days at air-liquid interface or differentiation stage.
    range: integer

  donor_info:
    description: >-
      Information about cell donor (e.g., healthy non-smoker, CF patient,
      age, anatomical region).
    range: string

  replicates_per_donor:
    description: >-
      Number of biological replicates per donor.
    range: integer

  # ---------------------------------------------------------------------------
  # Timing Slots
  # ---------------------------------------------------------------------------

  assay_date:
    description: >-
      Date when the assay was performed.
    range: date

  # ---------------------------------------------------------------------------
  # InVivoSubject Slots
  # ---------------------------------------------------------------------------

  age:
    description: >-
      Age of the subject.
    range: QuantityValue
    inlined: true

  sex:
    description: >-
      Biological sex of the subject.
    range: string

  subject_characteristics:
    description: >-
      Relevant subject characteristics (disease state, medications, etc.).
      TIER 1 for LungFunctionAssay per user feedback.
    range: string

  sample_type:
    description: Type of biological sample (e.g., sputum, BALF, blood).
    range: SampleTypeEnum

  collection_site:
    description: Anatomical site of sample collection.
    range: string

  collection_date:
    description: Date when the sample was collected.
    range: date

  # ---------------------------------------------------------------------------
  # PopulationSubject Slots
  # ---------------------------------------------------------------------------

  cohort_size:
    description: >-
      Number of subjects in the cohort or population.
    range: integer

  inclusion_criteria:
    description: >-
      Criteria for inclusion in the study population.
    range: string

  age_range:
    description: >-
      Age range of the study population.
    range: QuantityRange
    inlined: true

  subjects:
    description: >-
      Individual subjects in the population or cohort. Optional — use when
      individual-level data is available alongside aggregate cohort metadata.
    range: InVivoSubject
    multivalued: true
    inlined_as_list: true

  # ---------------------------------------------------------------------------
  # Protocol Detail Slots (Tier 2/3)
  # ---------------------------------------------------------------------------

  protocol_version:
    description: Version of the protocol.
    range: string

  sop_reference:
    description: Reference to standard operating procedure document.
    range: string

  imaging_frame_rate:
    description: Frame rate for video/imaging acquisition (e.g., 200 fps).
    range: QuantityValue
    inlined: true

  imaging_duration:
    description: Duration of imaging session.
    range: QuantityValue
    inlined: true

  spatial_resolution:
    description: Spatial resolution of imaging (e.g., 1-2 um axial resolution).
    range: QuantityValue
    inlined: true

  temperature_control:
    description: Temperature conditions during the procedure (e.g., 37C).
    range: QuantityValue
    inlined: true

  humidity_control:
    description: Humidity conditions during the procedure.
    range: QuantityValue
    inlined: true

  evaporation_prevention:
    description: Method used to prevent evaporation (e.g., perfluorocarbon overlay).
    range: string

  fluorescent_labeling:
    description: Fluorescent label or tracer used.
    range: string

  fluorescent_tracer:
    description: Fluorescent tracer used for tracking (MCC assays).
    range: string

  particle_tracking_method:
    description: Method used for tracking particles or mucus.
    range: string

  particle_size:
    description: Size of tracking particles.
    range: QuantityValue
    inlined: true

  spirometry_standard:
    description: Spirometry standard followed (e.g., ATS/ERS 2019).
    range: string

  bronchodilator_agent:
    description: Bronchodilator agent used (e.g., albuterol).
    range: string

  bronchodilator_dose:
    description: Dose of bronchodilator administered.
    range: QuantityValue
    inlined: true

  plethysmography_method:
    description: Method for plethysmography measurement.
    range: string

  detection_method:
    description: Detection method used (e.g., flow cytometry, plate reader).
    range: string

  staining_type:
    description: Type of staining used (e.g., immunofluorescence, AB-PAS).
    range: string

  antibodies_used:
    description: Antibodies used in staining or detection.
    range: string
    multivalued: true

  normalization_method:
    description: Method used for data normalization.
    range: string

  quality_control_criteria:
    description: Quality control acceptance criteria.
    range: string

  replicate_requirements:
    description: Number of replicates required.
    range: integer

  protocol_author:
    description: Author of the protocol.
    range: string

  institution:
    description: Institution where protocol was developed.
    range: string

  publication_reference:
    description: Reference to protocol publication.
    range: string

  last_updated:
    description: Date protocol was last updated.
    range: date

  validation_status:
    description: Validation status of the protocol.
    range: string

  fixation_method:
    description: Fixation method used for tissue/cell preparation.
    range: string

  counterstain:
    description: Counterstain used (e.g., hematoxylin, DAPI).
    range: string

  primer_sequences:
    description: Primer sequences used for PCR-based methods.
    range: string
    multivalued: true

  reference_gene:
    description: Reference/housekeeping gene used for normalization.
    range: string

  lysis_buffer:
    description: Lysis buffer used for sample preparation.
    range: string

  platform:
    description: Assay platform or instrument used (e.g., QuantStudio, Illumina).
    range: string

  # ---------------------------------------------------------------------------
  # Protocol Equipment Slots
  # ---------------------------------------------------------------------------

  equipment_required:
    description: Equipment required for this protocol.
    range: string
    multivalued: true

  key_reagents:
    description: Key reagents needed for this protocol.
    range: string
    multivalued: true

  general_procedure:
    description: High-level description of the procedure.
    range: string

  obi_mapping:
    description: OBI ontology term for this method.
    range: uriorcurie

  # ---------------------------------------------------------------------------
  # Exposure Condition Slots
  # ---------------------------------------------------------------------------

  exposure_agent:
    description: >-
      The chemical, biological, or environmental agent used for exposure
      or treatment. Reference to a CHEBI or ECTO ontology term.
    range: NamedEntity
    inlined: true

  exposure_duration:
    description: Duration of exposure or treatment.
    range: QuantityValue
    inlined: true

  exposure_concentration:
    description: Concentration of the exposure agent applied.
    range: QuantityValue
    inlined: true

  timing_post_exposure:
    description: >-
      Time after exposure when the measurement was taken. Used to capture
      the temporal relationship between exposure and assay readout.
    range: QuantityValue
    inlined: true

  # ---------------------------------------------------------------------------
  # Cell Culture Slots
  # ---------------------------------------------------------------------------

  cell_line:
    range: CellLine
    inlined: true

  primary_cell:
    range: NamedEntity
    inlined: true

  anatomical_origin:
    range: NamedEntity
    inlined: true

  cell_culture_growth_mode:
    range: CellCultureGrowthModeEnum

  culture_conditions:
    range: CellCultureConditions
    inlined: true

  culture_media:
    range: CellCultureMedium
    inlined: true

  substrate_type:
    range: SubstrateTypeEnum

  passage_number:
    range: integer

  days_at_air_liquid_interface:
    range: integer

  donor_count:
    range: integer

  confluence_level:
    range: QuantityValue
    inlined: true

  seeding_density:
    range: QuantityValue
    inlined: true

  coating:
    range: string


  matrix_composition:
    range: string

  size_range:
    range: QuantityRange
    inlined: true

  organoid_type:
    range: string

  cell_type_ratios:
    range: string
    multivalued: true

  # ---------------------------------------------------------------------------
  # Cell Line Detail Slots
  # ---------------------------------------------------------------------------

  tissue_origin:
    range: string

  disease_state:
    range: string

  supplier:
    range: string

  catalog_number:
    range: string

  authentication_method:
    range: string

  mycoplasma_status:
    range: string

  # ---------------------------------------------------------------------------
  # Medium Slots
  # ---------------------------------------------------------------------------

  base_medium:
    range: string

  serum_type:
    range: string

  serum_concentration:
    range: QuantityValue
    inlined: true

  supplements:
    range: MediumSupplement
    multivalued: true
    inlined_as_list: true

  osmolality:
    range: QuantityValue
    inlined: true

  manufacturer:
    range: string

  lot_number:
    range: string

  preparation_date:
    range: date

  supplement_type:
    range: SupplementTypeEnum

  concentration:
    range: QuantityValue
    inlined: true

  # ---------------------------------------------------------------------------
  # QuantityValue and Range Slots
  # ---------------------------------------------------------------------------

  value:
    description: The numeric value of the quantity.
    range: string

  unit:
    description: The unit of measurement.
    range: Unit
    inlined: true

  min_value:
    range: QuantityValue
    inlined: true

  max_value:
    range: QuantityValue
    inlined: true

# =============================================================================
# ENUMS
# =============================================================================

enums:

  SampleTypeEnum:
    description: Types of biological samples for in vivo assays.
    permissible_values:
      urine:
        description: Urine sample
      blood:
        description: Blood sample
      sputum:
        description: Induced or spontaneous sputum
      balf:
        description: Bronchoalveolar lavage fluid
      nasal_epithelium:
        description: Nasal epithelial sample
      bronchial_epithelium:
        description: Bronchial epithelial sample
      exhaled_breath_condensate:
        description: Exhaled breath condensate
      biopsy:
        description: Tissue biopsy
      sweat:
        description: Sweat sample

  CellCultureGrowthModeEnum:
    description: Cell culture growth modes.
    permissible_values:
      adherent:
        description: Cells grow attached to a surface
        meaning: CLO:0000028
      suspension:
        description: Cells grow suspended in culture medium
        meaning: CLO:0000029
      air_liquid_interface:
        description: Cells cultured at air-liquid interface (ALI)
        meaning: OBI:0600047
      three_dimensional:
        description: Cells grown in 3D matrix or scaffold
      organoid:

        description: Self-organizing 3D tissue culture
      spheroid:
        description: Spherical cellular aggregates

  SubstrateTypeEnum:
    description: Types of cell culture substrates.
    permissible_values:
      plastic:
        description: Standard tissue culture-treated plastic
      collagen_coated:
        description: Collagen-coated surface
      matrigel:
        description: Basement membrane matrix
      fibronectin_coated:
        description: Fibronectin-coated surface
      laminin_coated:
        description: Laminin-coated surface
      transwell_insert:
        description: Permeable support for ALI culture
      hydrogel:
        description: Three-dimensional hydrogel matrix
      glass:
        description: Glass surface or coverslip
      pdms:
        description: Polydimethylsiloxane (microfluidics)

  SupplementTypeEnum:
    description: Categories of cell culture medium supplements.
    permissible_values:
      growth_factor:
        description: Proteins that stimulate cell growth
        meaning: CHEBI:23924
      antibiotic:
        description: Antimicrobial substances
        meaning: CHEBI:33281
      antifungal:
        description: Antifungal agents
        meaning: CHEBI:35718
      hormone:
        description: Signaling molecules
        meaning: CHEBI:24621
      vitamin:
        description: Essential vitamins
        meaning: CHEBI:33229
      amino_acid:
        description: Amino acid supplements
        meaning: CHEBI:33709
      lipid:
        description: Lipid supplements
        meaning: CHEBI:18059
      trace_element:
        description: Essential trace elements
      attachment_factor:
        description: Factors promoting cell attachment
      differentiation_factor:
        description: Factors promoting cell differentiation

  # ---------------------------------------------------------------------------
  # Assay Context Capability Enum
  # ---------------------------------------------------------------------------

  AssayContextCapabilityEnum:
    description: >-
      Indicates what experimental contexts an assay class supports.
      Used to constrain valid study_subject types and enable
      context-appropriate slots.
    permissible_values:
      in_vitro_only:
        description: >-
          Assay can only be performed in vitro (cell cultures, tissue slices,
          organoids, etc.)
      in_vivo_only:
        description: >-
          Assay can only be performed in vivo (requires samples from or
          measurements on living human or animal subjects)
      in_vitro_or_in_vivo:
        description: >-
          Assay can be performed in either in vitro or in vivo contexts
          depending on the experimental design
